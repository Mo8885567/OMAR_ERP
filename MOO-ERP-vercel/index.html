  /**
   * initCustomSelects — تحويل كل select.input داخل container لـ custom dropdown
   */
  function initCustomSelects(container) {
    var selects = (container || document).querySelectorAll("select.input");
    selects.forEach(function (sel) {
      // تجنب التحويل المزدوج
      if (sel.dataset.csInit) return;
      sel.dataset.csInit = "1";

      // إخفاء الـ select الأصلي مع الاحتفاظ بقيمته
      sel.style.display = "none";

      // بناء الـ wrapper
      var wrap = document.createElement("div");
      wrap.className = "cs-wrap";

      var trigger = document.createElement("div");
      trigger.className = "cs-trigger";
      trigger.setAttribute("tabindex", "0");
      trigger.setAttribute("role", "combobox");

      var trigText = document.createElement("span");
      trigText.className = "cs-trigger-text";

      var arrow = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      arrow.setAttribute("class", "cs-arrow");
      arrow.setAttribute("viewBox", "0 0 24 24");
      arrow.setAttribute("fill", "none");
      arrow.setAttribute("stroke", "currentColor");
      arrow.setAttribute("stroke-width", "2.5");
      arrow.setAttribute("stroke-linecap", "round");
      arrow.setAttribute("stroke-linejoin", "round");
      arrow.innerHTML = "<polyline points='6 9 12 15 18 9'></polyline>";

      trigger.appendChild(trigText);
      trigger.appendChild(arrow);

      var dropdown = document.createElement("div");
      dropdown.className = "cs-dropdown";

      // بناء الـ options
      function buildOptions() {
        dropdown.innerHTML = "";
        Array.from(sel.options).forEach(function (opt) {
          var item = document.createElement("div");
          item.className = "cs-option" + (opt.selected ? " selected" : "");
          item.dataset.value = opt.value;
          item.textContent = opt.text;
          item.addEventListener("click", function (e) {
            e.stopPropagation();
            sel.value = opt.value;
            sel.dispatchEvent(new Event("change", { bubbles: true }));
            updateTrigger();
            closeDropdown();
          });
          dropdown.appendChild(item);
        });
      }

      function updateTrigger() {
        var selected = sel.options[sel.selectedIndex];
        trigText.textContent = selected ? selected.text : "";
        dropdown.querySelectorAll(".cs-option").forEach(function (o) {
          o.classList.toggle("selected", o.dataset.value === sel.value);
        });
      }

      function openDropdown() {
        // أغلق أي custom select آخر مفتوح
        document.querySelectorAll(".cs-wrap.open").forEach(function (w) {
          if (w !== wrap) w.classList.remove("open");
        });
        wrap.classList.add("open");
      }

      function closeDropdown() {
        wrap.classList.remove("open");
      }

      trigger.addEventListener("click", function (e) {
        e.stopPropagation();
        wrap.classList.contains("open") ? closeDropdown() : openDropdown();
      });

      trigger.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          wrap.classList.contains("open") ? closeDropdown() : openDropdown();
        }
        if (e.key === "Escape") closeDropdown();
        if (e.key === "ArrowDown") {
          e.preventDefault();
          var cur = sel.selectedIndex;
          if (cur < sel.options.length - 1) {
            sel.selectedIndex = cur + 1;
            sel.dispatchEvent(new Event("change", { bubbles: true }));
            updateTrigger();
          }
        }
        if (e.key === "ArrowUp") {
          e.preventDefault();
          var cur = sel.selectedIndex;
          if (cur > 0) {
            sel.selectedIndex = cur - 1;
            sel.dispatchEvent(new Event("change", { bubbles: true }));
            updateTrigger();
          }
        }
      });

      // أغلق عند الضغط خارج
      document.addEventListener("click", function () {
        closeDropdown();
      });

      wrap.appendChild(trigger);
      wrap.appendChild(dropdown);
      sel.parentNode.insertBefore(wrap, sel.nextSibling);

      // مراقبة أي تغيير برمجي على الـ select الأصلي
      var observer = new MutationObserver(function () {
        buildOptions();
        updateTrigger();
      });
      observer.observe(sel, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ["value"],
      });

      buildOptions();
      updateTrigger();
    });
  }

  /**
   * ══════════════════════════════════════════════════════════════
   *  [SEARCH-DROPDOWN] مكوّن عام قابل لإعادة الاستخدام لأي دروب داون

  /**

  // [REFACTOR-P7] renderSearchDropdown اتنقلت لـ Core_UIManagers.html (Global، بنفس الاسم)

  /**

  // [REFACTOR-P7] renderWarehouseDropdown اتنقلت لـ Core_UIManagers.html (Global، بنفس الاسم)

  // ── معالج عام واحد لكل دروب داونات البحث (data-target-select) ──
  (function () {
    function _closeSearchDropdown(wrap) {
      var list = wrap.querySelector(".wh-dropdown-list");
      var btn = wrap.querySelector(".wh-dropdown-btn");
      if (list) list.classList.remove("open");
      if (btn) btn.classList.remove("active");
    }

    document.addEventListener("click", function (e) {
      // 1) الضغط على الزرار → فتح/قفل
      var btn = e.target.closest(".wh-dropdown-btn");
      if (btn) {
        var wrap = btn.closest(".wh-dropdown");
        if (!wrap || !wrap.hasAttribute("data-target-select")) return; // مش من نوعنا — سيبها لمعالجها القديم
        var list = wrap.querySelector(".wh-dropdown-list");
        var wasOpen = list.classList.contains("open");
        document
          .querySelectorAll(
            ".wh-dropdown[data-target-select] .wh-dropdown-list.open",
          )
          .forEach(function (l) {
            if (l !== list) _closeSearchDropdown(l.closest(".wh-dropdown"));
          });
        list.classList.toggle("open", !wasOpen);
        btn.classList.toggle("active", !wasOpen);
        if (!wasOpen) {
          var inp = list.querySelector(".wh-search-input");
          if (inp) {
            inp.value = "";
            list.querySelectorAll(".wh-option").forEach(function (o) {
              o.style.display = "flex";
            });
            setTimeout(function () {
              inp.focus();
            }, 0);
          }
        }
        return;
      }

      // 2) الضغط على خيار → تحديد القيمة
      var opt = e.target.closest(".wh-option");
      if (opt) {
        var wrap2 = opt.closest(".wh-dropdown");
        if (!wrap2 || !wrap2.hasAttribute("data-target-select")) return;
        wrap2.querySelectorAll(".wh-option").forEach(function (o) {
          o.classList.remove("selected");
        });
        opt.classList.add("selected");
        var label = opt.getAttribute("data-label") || "";
        var val = opt.getAttribute("data-value") || "";
        var labelEl = wrap2.querySelector(".wh-label");
        if (labelEl) labelEl.textContent = label;
        var selId = wrap2.getAttribute("data-target-select");
        if (selId) {
          var sel = document.getElementById(selId);
          if (sel) {
            sel.value = val;
            sel.dispatchEvent(new Event("change", { bubbles: true }));
          }
        }
        _closeSearchDropdown(wrap2);
        return;
      }

      // 3) الضغط في أي مكان تاني → اقفل أي دروب داون من نوعنا مفتوحة
      if (!e.target.closest(".wh-dropdown[data-target-select]")) {
        document
          .querySelectorAll(
            ".wh-dropdown[data-target-select] .wh-dropdown-list.open",
          )
          .forEach(function (l) {
            _closeSearchDropdown(l.closest(".wh-dropdown"));
          });
      }
    });

    // 4) الكتابة في مربع البحث → فلترة الخيارات
    document.addEventListener("input", function (e) {
      if (!e.target.classList.contains("wh-search-input")) return;
      var wrap = e.target.closest(".wh-dropdown[data-target-select]");
      if (!wrap) return;
      var q = (e.target.value || "").toLowerCase();
      wrap.querySelectorAll(".wh-option[data-value]").forEach(function (o) {
        var n =
          (o.getAttribute("data-label") || "") +
          " " +
          (o.getAttribute("data-code") || "");
        o.style.display = n.toLowerCase().indexOf(q) > -1 ? "flex" : "none";
      });
    });
  })();

      : "ti-layout-list";

    // اكتشاف لون مناسب من أيقونة الـ confirm

      "ti-user": "blue",
      "ti-package": "teal",
      "ti-settings": "slate",
      "ti-lock": "purple",
    };
    var detectedColor = "blue";
    for (var k in colorMap) {
      if (iconCls.indexOf(k) !== -1) {
        detectedColor = colorMap[k];
        break;
      }
    }

    // لو مفيش عنوان واضح → اعرض المحتوى كما هو في body بدون تحويل

  (function _startDrawerOrphanWatcher() {
    setInterval(function () {
      // لو في backdrop بس من غير drawer — يبقى orphan → شيله فوراً
      var bg = document.getElementById("drawer-backdrop");
      var drawer = document.getElementById("edit-drawer");
      if (bg && !drawer) {
        bg.style.pointerEvents = "none";
        bg.style.transition = "opacity .15s";
        bg.style.opacity = "0";
        setTimeout(function () {
          if (bg.parentNode) bg.remove();
        }, 160);
      }
      // لو في drawer بيحاول يتغلق من فترة طويلة (drawer-closing + وقت كافي)
      // شيله كمان
      if (drawer && drawer.classList.contains("drawer-closing")) {
        // هو المفروض يتشال في 200ms — لو لسه بعد 500ms اشيله قسراً
        if (!drawer._forceRemoveTimer) {
          drawer._forceRemoveTimer = setTimeout(function () {
            if (drawer && drawer.parentNode) drawer.remove();
          }, 500);
        }
      }
    }, 1000);
  })();

  // ─────────────────────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // [M-01 FIX] دالة debounce عامة — تُستخدم على معالجات input لحقول البحث/الفلترة
  // لمنع إعادة الفلترة/الرسم الكاملة على كل ضغطة مفتاح في جداول كبيرة
  // الاستخدام: el.addEventListener("input", debounce(function(e){ ... }, 250));
  function debounce(fn, wait) {
    var t = null;
    return function () {
      var args = arguments,
        ctx = this;
      clearTimeout(t);
      t = setTimeout(function () {
        fn.apply(ctx, args);
      }, wait || 250);
    };
  }

  // [DATE-STD] فورمات التاريخ الموحد للسيستم كله
  // ⚠️ دالة مشتركة واحدة يستخدمها كل موديول (HR، المحاسبة، المخازن...) —
  // أي تغيير في تنسيق التاريخ مطلوب على مستوى النظام كله يتم هنا فقط.
  // ── [إصلاح P2 - تفعيل date_format] ──────────────────────────────────
  // كان الشكل dd/mm/yyyy مفروضًا يدويًا بغض النظر عن تفضيل date_format
  // المخزَّن فعليًا في شاشة التفضيلات (Dead Setting رغم وجود نقطة مركزية
  // واحدة جاهزة بالفعل لربطه — كان ناقصها سطر واحد فقط).
  function fmtDate(d) {
    if (!d) return "—";
    try {
      var dt = d instanceof Date ? d : new Date(d);
      if (isNaN(dt)) return String(d).substring(0, 10);
      var y = dt.getFullYear();
      var m = String(dt.getMonth() + 1).padStart(2, "0");
      var day = String(dt.getDate()).padStart(2, "0");
      var fmt =
        typeof PreferenceService !== "undefined"
          ? PreferenceService.get("date_format", "DD/MM/YYYY")
          : "DD/MM/YYYY";
      switch (fmt) {
        case "MM/DD/YYYY":
          return m + "/" + day + "/" + y;
        case "YYYY-MM-DD":
          return y + "-" + m + "-" + day;
        case "D MMMM YYYY":
          var monthsAr = [
            I18N.t("SHELL_MONTH_1"),
            I18N.t("SHELL_MONTH_2"),
            I18N.t("SHELL_MONTH_3"),
            I18N.t("SHELL_MONTH_4"),
            I18N.t("SHELL_MONTH_5"),
            I18N.t("SHELL_MONTH_6"),
            I18N.t("SHELL_MONTH_7"),
            I18N.t("SHELL_MONTH_8"),
            I18N.t("SHELL_MONTH_9"),
            I18N.t("SHELL_MONTH_10"),
            I18N.t("SHELL_MONTH_11"),
            I18N.t("SHELL_MONTH_12"),
          ];
          return dt.getDate() + " " + monthsAr[dt.getMonth()] + " " + y;
        case "DD/MM/YYYY":
        default:
          return day + "/" + m + "/" + y;
      }
    } catch (e) {
      return String(d).substring(0, 10);
    }
  }

  // يحوّل أي تاريخ قادم من حقل <input type="date"> (yyyy-mm-dd)
  // إلى شكل العرض الموحّد الحالي — لاستخدامه في أي عرض read-only (بطاقات، PDF، طباعة)
  function fmtDateInput(isoStr) {
    if (!isoStr) return "—";
    var parts = String(isoStr).split("-");
    if (parts.length !== 3) return fmtDate(isoStr);
    // نمرّرها لـ fmtDate عشان تُطبّق عليها date_format الحالي بنفس المنطق
    return fmtDate(parts[0] + "-" + parts[1] + "-" + parts[2]);
  }

  // فورمات الوقت — يحترم تفضيل time_format (12h / 24h) بدل افتراض HH:MM دايمًا
  function fmtTime(t) {
    if (!t) return "—";
    try {
      var dt = t instanceof Date ? t : new Date(t);
      var h, mi;
      if (isNaN(dt)) {
        // fallback: لو القيمة نص فيه T (ISO) ناخد الوقت مباشرة منه
        var s = String(t);
        var m2 = s.match(/T(\d{2}):(\d{2})/);
        if (!m2) return s;
        h = Number(m2[1]);
        mi = m2[2];
      } else {
        h = dt.getHours();
        mi = String(dt.getMinutes()).padStart(2, "0");
      }
      var format =
        typeof PreferenceService !== "undefined"
          ? PreferenceService.get("time_format", "12h")
          : "12h";
      if (format === "24h") {
        return String(h).padStart(2, "0") + ":" + mi;
      }
      var period = h >= 12 ? "م" : "ص";
      var h12 = h % 12 || 12;
      return h12 + ":" + mi + " " + period;
    } catch (e) {
      return String(t);
    }
  }

  // ─────────────────────────────────────────────────────────────
  // [DATE-STD-INPUT 2026-07-14] توحيد شكل عرض حقول input[type=date]
  // مع تفضيل date_format الفعلي للمستخدم — بدل الإجبار الثابت السابق
  // على lang="ja" (yyyy/mm/dd) بغض النظر عن اختيار المستخدم في شاشة
  // التفضيلات، وهو ما كان يسبب تعارضًا واضحًا: مثلاً فاتورة بيع تعرض
  // 07/14/2026 (mm/dd/yyyy افتراضي المتصفح لما الحقل يفلت من الوسم)
  // بينما تفضيل النظام المحفوظ فعليًا DD/MM/YYYY.
  //
  // ملاحظة: input[type=date] لا يقبل صياغة عرض حرة (custom pattern) —
  // المتصفح (Chrome/Edge) بيحدد ترتيب الحقول حسب locale الـ lang فقط،
  // فبنمّم أقرب locale متاح لكل خيار من خيارات date_format:
  //   DD/MM/YYYY  → en-GB  → dd/mm/yyyy
  //   MM/DD/YYYY  → en-US  → mm/dd/yyyy
  //   YYYY-MM-DD  → sv     → yyyy-mm-dd (الوحيد اللي بيدي شرطة - مطابق تمامًا)
  //   D MMMM YYYY → لا يوجد شكل أسماء شهور في input[type=date]؛ أقرب تمثيل
  //                 هو dd/mm/yyyy (en-GB) كافتراضي احتياطي.
  //
  // القيمة الفعلية المخزّنة في .value تبقى دايمًا ISO (yyyy-mm-dd) كما
  // يفرضها معيار HTML — التعديل هنا بصري فقط على شكل العرض داخل الحقل.
  // ─────────────────────────────────────────────────────────────
  (function () {
    var DATE_FORMAT_TO_LANG = {
      "DD/MM/YYYY": "en-GB",
      "MM/DD/YYYY": "en-US",
      "YYYY-MM-DD": "sv",
      "D MMMM YYYY": "en-GB",
    };

    function _currentInputLang() {
      var fmt =
        typeof PreferenceService !== "undefined"
          ? PreferenceService.get("date_format", "DD/MM/YYYY")
          : "DD/MM/YYYY";
      return DATE_FORMAT_TO_LANG[fmt] || "en-GB";
    }

    function _tagDateInputs(root, lang) {
      if (!root || !root.querySelectorAll) return;
      var list = root.querySelectorAll('input[type="date"]');
      for (var i = 0; i < list.length; i++) list[i].lang = lang;
    }

    function _retagAll() {
      _tagDateInputs(document, _currentInputLang());
    }

    function _init() {
      _retagAll();
      // [DATE-STD-INPUT] لما المستخدم يغيّر date_format من شاشة التفضيلات،
      // نعيد وسم كل الحقول الحالية فورًا (بدون الحاجة لإعادة تحميل الصفحة).
      if (
        typeof PreferenceService !== "undefined" &&
        typeof PreferenceService.subscribe === "function"
      ) {
        PreferenceService.subscribe("date_format", _retagAll);
      }
      if (typeof MutationObserver === "undefined" || !document.body) return;
      var obs = new MutationObserver(function (mutations) {
        var lang = _currentInputLang();
        for (var i = 0; i < mutations.length; i++) {
          var added = mutations[i].addedNodes;
          for (var j = 0; j < added.length; j++) {
            var node = added[j];
            if (node.nodeType !== 1) continue;
            if (node.matches && node.matches('input[type="date"]')) {
              node.lang = lang;
            }
            _tagDateInputs(node, lang);
          }
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", _init);
    } else {
      _init();
    }
  })();

  // §AS — Global Button Click Sound (event delegation)

  // ====================== Helper لإيجاد المخزن من الصنف ======================
  function getWarehouseForItem(itemId) {
    if (!itemId) return null;

    var item = APP.data.items.find(function (i) {
      return String(i.id) === String(itemId);
    });
    if (!item || !item.group) return null;

    var group = APP.data.groups.find(function (g) {

    });
    if (!group || !group.warehouse_id) return null;

    var wh = APP.data.warehouses.find(function (w) {

    return wh ? wh.name : group.warehouse_id;

  // ─────────────────────────────────────────────────────────────

  // ====================== DEBUG: Overflow Detector ======================
  /**
   * يكتشف العناصر التي تتجاوز عرض الشاشة
   * الاستخدام: APP.debugOverflow()
   * أو من Console: debugOverflow()
   */
  function debugOverflow() {
    var offenders = [];
    var pageW = document.documentElement.clientWidth;

    // إزالة marks قديمة
    document.querySelectorAll("[data-overflow]").forEach(function (el) {
      el.removeAttribute("data-overflow");
    });

    document.querySelectorAll("*").forEach(function (el) {
      var rect = el.getBoundingClientRect();
      if (rect.right > pageW + 2 || rect.left < -2) {
        el.setAttribute("data-overflow", "true");
        offenders.push({
          element: el,
          tag: el.tagName,
          id: el.id || "",
          classes:
            el.className && typeof el.className === "string"
              ? el.className.split(" ").slice(0, 3).join(".")
              : "",
          width: Math.round(rect.width),
          left: Math.round(rect.left),
          right: Math.round(rect.right),
          pageWidth: pageW,
        });
      }
    });

    if (offenders.length === 0) {
      console.log("%c✅ No overflow detected!", "color:green;font-weight:bold");
      return [];
    }

    console.group(
      "%c🔴 Overflow Elements (" + offenders.length + ")",
      "color:red;font-weight:bold",
    );
    offenders.forEach(function (o) {
      console.log(
        o.tag + (o.id ? "#" + o.id : "") + (o.classes ? "." + o.classes : ""),
        "| width:",
        o.width + "px",
        "| left:",
        o.left + "px",
        "| right:",
        o.right + "px",
        "| overflow by:",
        Math.round(o.right - o.pageWidth) + "px",
      );
      console.log(o.element);
    });
    console.groupEnd();

    return offenders;
  }

  // تصدير للـ console
  window.debugOverflow = debugOverflow;

  // إضافة للـ APP object
  if (typeof APP !== "undefined") {
    APP.debugOverflow = debugOverflow;
  }
  // ─────────────────────────────────────────────────────────────
</script>

  function initSearchableIdPanel(trigger, panel, searchEl) {

  // ════════════════════════════════════════════════════════════════
  // ✅ [SIDEBAR-COLLAPSE] طي/فتح السايدبار (نمط ERP احترافي — ديسكتوب)
  // - الحالة بتتحفظ في localStorage وترجع تلقائياً بعد أي تحديث/لوجين.
  // - شغالة بس فوق 860px (Desktop). تحت كده السايدبار بيرجع لنظام

  // ════════════════════════════════════════════════════════════════
  var SIDEBAR_COLLAPSE_KEY = "moo_sidebar_collapsed";

  function _isSidebarDesktopViewport() {
    return window.innerWidth > 860;
  }

  function _getSidebarCollapsedPref() {
    try {
      return localStorage.getItem(SIDEBAR_COLLAPSE_KEY) === "1";
    } catch (e) {
      return false;
    }
  }

  function _setSidebarCollapsedPref(collapsed) {
    try {
      localStorage.setItem(SIDEBAR_COLLAPSE_KEY, collapsed ? "1" : "0");
    } catch (e) {}
  }

  // بيطبّق الحالة على الـ DOM فعليًا. save=false يُستخدم وقت المزامنة
  // مع تغيير حجم الشاشة عشان منكتبش نفس القيمة في localStorage تاني.
  function applySidebarCollapsed(collapsed, save) {
    var sb = document.getElementById("main-sidebar");
    var layout = document.querySelector(".app-layout");
    var btn = document.getElementById("sidebar-collapse-btn");
    if (!sb) return;

    if (collapsed) {
      sb.classList.add("collapsed");
      if (layout) layout.classList.add("sidebar-collapsed");
      // ✅ نضبط المتغير على documentElement مش بس .app-layout، عشان أي
      // عنصر بيتحط على document.body مباشرة (Drawers/Modals اللي بتحسب
      // مساحتها بناءً على --sidebar-w) يتوسّع هو كمان تلقائيًا ومنسيبش
      // مساحة بيضاء فاضية بين السايدبار المطوي وبين هذه العناصر.
      if (_isSidebarDesktopViewport()) {
        document.documentElement.style.setProperty("--sidebar-w", "68px");
      }
    } else {
      sb.classList.remove("collapsed");
      if (layout) layout.classList.remove("sidebar-collapsed");
      document.documentElement.style.removeProperty("--sidebar-w");
    }
    if (btn) {
      btn.classList.toggle("is-collapsed", collapsed);
      btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
      btn.title = collapsed
        ? I18N.t("UI_SIDEBAR_OPEN")
        : I18N.t("UI_SIDEBAR_COLLAPSE");
      btn.setAttribute(
        "aria-label",
        collapsed ? I18N.t("UI_SIDEBAR_OPEN") : I18N.t("UI_SIDEBAR_COLLAPSE"),
      );
    }
    if (save !== false) _setSidebarCollapsedPref(collapsed);
  }

  function toggleSidebarCollapse() {
    if (!_isSidebarDesktopViewport()) return; // على الموبايل مفيش طي — Drawer بس
    var sb = document.getElementById("main-sidebar");
    var isCollapsed = !!(sb && sb.classList.contains("collapsed"));
    applySidebarCollapsed(!isCollapsed);

  // بيتنادى مرة واحدة بعد أول renderLayout() — يرجّع آخر حالة محفوظة
  function _initSidebarCollapseState() {

    if (wantsCollapsed && _isSidebarDesktopViewport()) {
      applySidebarCollapsed(true, false);
    }
  }

  // بيزامن حالة الطي مع تغيير حجم الشاشة (Desktop ⇄ Mobile) عشان
  // العرض المطوي (68px) ميتسربش لنظام الـ Drawer على الموبايل
  function _syncSidebarCollapseWithViewport() {
    var sb = document.getElementById("main-sidebar");
    if (!sb) return;
    if (_isSidebarDesktopViewport()) {
      if (_getSidebarCollapsedPref()) applySidebarCollapsed(true, false);

  function _enqueueToast(msg, type, duration, urgent) {
    type = type || "info";
    // مدة الإشعار: افتراضي 5000ms، الحد الأقصى 8000ms
    var _DEFAULT_DURATIONS = {
      error: 6000,
      warning: 5000,
      success: 4500,
      info: 5000,
    };
    duration = Math.min(duration || _DEFAULT_DURATIONS[type] || 5000, 8000);
    var now = Date.now();

    // لو urgent (خطأ حرج) — امسح كل ما هو أقل أولوية وضعه أولاً
    if (urgent) {
      _toastQueue = _toastQueue.filter(function (it) {
        return _TOAST_PRIORITY[it.type] >= _TOAST_PRIORITY.error;
      });
    }

    // ① منع التكرار: لو نفس الرسالة (نفس النص + النوع) ظهرت/مُجدولة
    //    خلال _DEDUP_WINDOW_MS الأخيرة — تجاهل التكرار
    var dupInQueue = _toastQueue.find(function (it) {
      return it.msg === msg && it.type === type;
    });
    if (dupInQueue) {
      dupInQueue.count = (dupInQueue.count || 1) + 1;
      _sortToastQueue();
      return;
    }
    if (
      _lastShownToast &&
      _lastShownToast.msg === msg &&
      _lastShownToast.type === type &&
      now - _lastShownToast.at < _DEDUP_WINDOW_MS
    ) {
      return;
    }

    // ② دمج الإشعارات المتشابهة من نفس "العائلة" (نفس الـ groupKey)
    var groupKey = _toastGroupKey(msg, type);
    if (groupKey) {
      var sameGroup = _toastQueue.find(function (it) {
        return it.groupKey === groupKey;
      });
      if (sameGroup) {
        sameGroup.count = (sameGroup.count || 1) + 1;
        sameGroup.msg = _mergeToastMsg(sameGroup, msg);
        _sortToastQueue();
        return;
      }
    }

    _toastQueue.push({
      msg: msg,
      type: type,
      duration: duration,
      groupKey: groupKey,
      count: 1,
      enqueuedAt: now,
    });

    _sortToastQueue();
    _bumpUnreadBadge();
    _processToastQueue();
  }

  function _sortToastQueue() {
    _toastQueue = _toastQueue
      .map(function (it, idx) {
        it._idx = idx;
        return it;
      })
      .sort(function (a, b) {
        var pa = _TOAST_PRIORITY[a.type] || 0;
        var pb = _TOAST_PRIORITY[b.type] || 0;
        if (pa !== pb) return pb - pa; // الأعلى أولوية أولاً
        return a._idx - b._idx; // ثبات الترتيب
      });
  }

  function _toastGroupKey(msg, type) {
    if (type === "info" || type === "success") {
      // مثال: "✅ تم حفظ الصنف" + "✅ تم حفظ الصنف" → نفس المجموعة
      return type + "::" + msg.replace(/[\d٠-٩]+/g, "#");

    return null; // الأخطاء/التحذيرات لا تُدمج — كل واحدة مهمة
  }

  function _mergeToastMsg(item, newMsg) {
    var base = newMsg.replace(/\s*\(×\d+\)\s*$/, "");
    return base + " (×" + item.count + ")";

    _lastShownToast = { msg: item.msg, type: item.type, at: Date.now() };
    _showToastImmediate(item.msg, item.type, item.duration, function () {
      _toastBusy = false;
      _consumeUnreadBadge();
      // فاصل قصير 150ms بين الرسايل يريح العين
      setTimeout(_processToastQueue, 150);
    });
  }

  function showToast(msg, type, duration, urgent) {
    type = type || "info";
    // 🎨 [FIX] أي استدعاء لـ showToast برسالة فاضية/undefined (زي e.message
    // اللي بيرجع فاضي أحيانًا من google.script.run، أو r.message مفقودة من
    // رد الباك إند) كان بيطلّع فقاعة فاضية بصوت بس من غير نص — فحسّها
    // المستخدم "صوت من غير رسالة". دلوقتي أي رسالة فاضية بتاخد نص افتراضي
    // واضح حسب نوعها، فمفيش أي حالة الفقاعة تظهر فاضية.
    if (!msg || !String(msg).trim()) {
      msg = _toastFallbackMsgs()[type] || _toastFallbackMsgs().info;
    }
    // §AS — تشغيل صوت حسب نوع الإشعار
    if (typeof AS !== "undefined") {
      try {
        AS._onToastType(type || "info", msg);
      } catch (e) {}
    }
    _enqueueToast(msg, type, duration, urgent);
  }

  function _showToastImmediate(msg, type, duration, onDone) {
    type = type || "info";
    // مدة الإشعار: افتراضي حسب النوع، الحد الأقصى 8000ms
    var _DEFAULT_DURATIONS = {
      error: 6000,
      warning: 5000,
      success: 4500,
      info: 5000,
    };
    duration = Math.min(duration || _DEFAULT_DURATIONS[type] || 5000, 8000);

    var icons = { success: "✅", error: "❌", warning: "⚠️", info: "ℹ️" };
    var icon = icons[type] || "ℹ️";

    // أوقف أي timer متبقي
    if (_aiFabToastTimer) {
      clearTimeout(_aiFabToastTimer);
      _aiFabToastTimer = null;
    }
    if (_fabMsgTimer) {
      clearTimeout(_fabMsgTimer);
      _fabMsgTimer = null;
    }

    var seq = ++_aiFabToastSeq;
    var bubble = _ensureBubble();

    // أوقف animation قديم وأخفِ فوراً
    bubble.style.animation = "none";
    bubble.style.display = "none";
    bubble.offsetHeight; // reflow

    // اكتب المحتوى وحدّد النوع للتلوين
    bubble.setAttribute("data-type", type);
    bubble.innerHTML =
      '<span class="fab-bubble-stem"></span>' +
      '<button class="fab-bubble-close" aria-label="' +
      I18N.t("BTN_CLOSE") +
      '">✕</button>' +
      '<span class="fab-bubble-icon">' +
      icon +
      "</span>" +
      '<span class="fab-bubble-text">' +
      msg +
      "</span>" +
      '<span class="fab-bubble-progress"><span class="fab-bubble-progress-bar"></span></span>';

    // [FIX-UI] الروبوت ثابت — نعرض الـ bubble مباشرة بدون تأخير
    bubble.style.visibility = "hidden";
    bubble.style.display = "block";
    var bW = Math.min(300, window.innerWidth - 32);
    bubble.style.width = bW + "px";
    bubble.offsetHeight;
    _positionBubble(bubble);
    bubble.style.visibility = "";
    bubble.style.animation =
      "fabBubbleIn 0.38s cubic-bezier(0.34,1.4,0.64,1) forwards";

    // ── progress bar animation ──
    var progressBar = bubble.querySelector(".fab-bubble-progress-bar");
    if (progressBar) {
      progressBar.style.transition = "none";
      progressBar.style.width = "100%";
      bubble.offsetHeight; // reflow
      progressBar.style.transition = "width " + duration + "ms linear";
      progressBar.style.width = "0%";
    }

    // ── دالة الإغلاق الفعلية ──
    function _dismissBubble() {
      if (seq !== _aiFabToastSeq) return;
      if (_aiFabToastTimer) {
        clearTimeout(_aiFabToastTimer);
        _aiFabToastTimer = null;
      }
      bubble.style.animation =
        "fabBubbleOut 0.28s cubic-bezier(0.55,0,1,0.8) forwards";
      setTimeout(function () {
        if (seq !== _aiFabToastSeq) return;
        bubble.style.display = "none";
        _aiFabToastTimer = null;
        // نظّف event listeners
        bubble.removeEventListener("mouseenter", _onHoverIn);
        bubble.removeEventListener("mouseleave", _onHoverOut);
        if (typeof onDone === "function") onDone();
      }, 300);
    }

    // ── زر الإغلاق الفوري ──
    var closeBtn = bubble.querySelector(".fab-bubble-close");
    if (closeBtn) {
      closeBtn.onclick = function (e) {
        e.stopPropagation();
        _dismissBubble();
      };
    }

    // ── Hover Pause / Resume ──
    var _remainingMs = duration;
    var _hoverStartAt = null;
    var _isPaused = false;

    function _onHoverIn() {
      if (_isPaused || seq !== _aiFabToastSeq) return;
      _isPaused = true;
      _hoverStartAt = Date.now();
      if (_aiFabToastTimer) {
        clearTimeout(_aiFabToastTimer);
        _aiFabToastTimer = null;
      }
      // أوقف الـ progress bar
      if (progressBar) {
        var computed = window.getComputedStyle(progressBar);
        var currentWidth = computed.width;
        var parentWidth =
          bubble.querySelector(".fab-bubble-progress").offsetWidth || bW;
        progressBar.style.transition = "none";
        progressBar.style.width = currentWidth;
        _remainingMs = Math.round(
          _remainingMs * (parseFloat(currentWidth) / parentWidth),
        );
      }
      bubble.setAttribute("data-paused", "true");
    }

    function _onHoverOut() {
      if (!_isPaused || seq !== _aiFabToastSeq) return;
      _isPaused = false;
      bubble.removeAttribute("data-paused");
      // استأنف الـ progress bar
      if (progressBar) {
        progressBar.style.transition = "width " + _remainingMs + "ms linear";
        progressBar.style.width = "0%";
      }
      _aiFabToastTimer = setTimeout(_dismissBubble, _remainingMs);
    }

    bubble.addEventListener("mouseenter", _onHoverIn);
    bubble.addEventListener("mouseleave", _onHoverOut);

    // ── Timer الاختفاء التلقائي ──
    _aiFabToastTimer = setTimeout(_dismissBubble, duration);
  }

      '<div style="display:flex;align-items:center;justify-content:center;' +
      'padding:48px 0;height:100%;opacity:.4">' +
      '<i class="ti ti-loader-2" style="font-size:28px;animation:spin 0.8s linear infinite"></i>' +
      "</div>";
    inner.setAttribute("data-pending-html", "1");

    drawer.appendChild(inner);
    // ⚡ نضيف للـ DOM أولاً عشان الـ animation تبدأ
    document.body.appendChild(drawer);

    // ⚡ في الـ frame التاني نحشو المحتوى الحقيقي
    requestAnimationFrame(function () {
      inner.removeAttribute("data-pending-html");
      inner.innerHTML = html;
      // 🔒 حماية تلقائية لأي حقل هاتف/كود/SKU/Barcode داخل هذا الدرج
      autoProtectTextNumberInputs(inner);
    });

    // ESC to close
    drawer._escHandler = function (e) {
      if (e.key === "Escape") closeDrawer();
    };
    document.addEventListener("keydown", drawer._escHandler);
  }

  function renderModalBox(opts) {
    opts = opts || {};
    var headerClass =
      "modal-header" + (opts.color ? " header-accent " + opts.color : "");
    var iconClass = "modal-icon" + (opts.iconClass ? " " + opts.iconClass : "");
    var closeFn = opts.closeFn || "closeModal()";

    var html = '<div class="modal-box">';
    html += '<div class="' + headerClass + '">';
    html += '<div class="modal-header-left">';
    if (opts.icon) {
      html +=
        '<div class="' +
        iconClass +
        '"' +
        (opts.iconStyle ? ' style="' + opts.iconStyle + '"' : "") +
        '><i class="ti ' +
        opts.icon +
        '"></i></div>';
    }
    html += "<div><h2>" + (opts.title || "") + "</h2>";
    if (opts.subtitle) {
      html += '<div class="modal-header-sub">' + opts.subtitle + "</div>";
    }
    html += "</div></div>";
    html +=
      '<button class="modal-close" onclick="' +
      closeFn +
      '"><i class="ti ti-x"></i></button>';
    html += "</div>";
    html += '<div class="modal-body">' + (opts.body || "") + "</div>";
    if (opts.footer) {
      html += '<div class="modal-actions">' + opts.footer + "</div>";
    }
    html += "</div>";
    return html;
  }

  function closeDrawer(immediate) {
    var drawer = document.getElementById("edit-drawer");
    var bg = document.getElementById("drawer-backdrop");
    if (!drawer && !bg) return;

    // إعادة ظهور زرار المساعد الذكي
    var fab = document.getElementById("ai-fab");
    if (fab) fab.style.display = "";

    // [FIX-BACKDROP-BLOCK] أوقف pointer-events فوراً عشان الـ backdrop
    // ميبلوكش الكليكات أثناء animation الإغلاق
    if (bg) bg.style.pointerEvents = "none";

    if (immediate) {
      if (drawer) drawer.remove();
      if (bg) bg.remove();
      return;
    }

    // Animate out — match 0.18s optimized animation
    if (drawer) {
      if (drawer._escHandler)
        document.removeEventListener("keydown", drawer._escHandler);
      drawer.classList.add("drawer-closing");
      setTimeout(function () {
        if (drawer && drawer.parentNode) drawer.remove();
      }, 200);
    }
    if (bg) {
      bg.style.transition = "opacity .18s ease";
      bg.style.opacity = "0";
      setTimeout(function () {
        if (bg && bg.parentNode) bg.remove();
      }, 190);
    }
  }
</script>


    <!-- [FORGOT-PW-1] استعادة كلمة المرور الذاتية من شاشة اللوجين -->
    <script>
  // ═══════════════════════════════════════════════════════════════════

  // ═══════════════════════════════════════════════════════════════════

  // ── الربط الأولي: يُستدعى من bindLogin() في 02_JS_UI_Shell.html ──────

  function _fpStartResendCountdown(seconds) {
    var resendBtn = document.getElementById("fp-resend");
    if (!resendBtn) return;
    if (_FP.resendTimer) clearInterval(_FP.resendTimer);
    _FP.resendEnds = Date.now() + seconds * 1000;
    resendBtn.disabled = true;

    function tick() {
      var btn = document.getElementById("fp-resend");
      if (!btn) {
        clearInterval(_FP.resendTimer);
        return;
      }
      var remaining = Math.ceil((_FP.resendEnds - Date.now()) / 1000);
      if (remaining <= 0) {
        clearInterval(_FP.resendTimer);
        _FP.resendTimer = null;
        btn.disabled = false;
        btn.textContent = I18N.t("FP_RESEND_CODE");
      } else {
        btn.textContent = I18N.t("FP_RESEND_WAIT", { s: remaining });
      }
    }
    tick();
    _FP.resendTimer = setInterval(tick, 1000);
  }

  function _fpBindStrengthMeter(pw1, pw2, submitBtn) {
    var bar = document.getElementById("fp-strength-bar");
    var label = document.getElementById("fp-strength-label");
    var reqsBox = document.getElementById("fp-reqs");

    var REQ_LABELS_KEYS = {
      len: "FP_REQ_LEN",
      upper: "FP_REQ_UPPER",
      lower: "FP_REQ_LOWER",
      num: "FP_REQ_NUM",
      special: "FP_REQ_SPECIAL",
    };

    // [PW-UNIFY] منطق الشروط موحّد الآن في VF.checkPasswordRequirements
    // (VF_JS_Validation.html) — لا تكرار محلي هنا.
    function _update() {
      var np = pw1.value || "";
      var cp = pw2.value || "";
      var state = VF.checkPasswordRequirements(np, cp);
      var passCount = state.passCount;

      Object.keys(REQ_LABELS_KEYS).forEach(function (key) {
        var li = reqsBox.querySelector('[data-req="' + key + '"]');
        if (!li) return;
        var ok = state[key];
        li.classList.toggle("ok", ok);
        li.classList.toggle("bad", false);
        li.textContent = (ok ? "✔ " : "○ ") + I18N.t(REQ_LABELS_KEYS[key]);
      });

      var matchLi = reqsBox.querySelector('[data-req="match"]');
      if (matchLi) {
        if (cp.length > 0 && state.match) {
          matchLi.className = "ok";
          matchLi.textContent = "✔ " + I18N.t("FP_REQ_MATCH");
        } else if (cp.length > 0) {
          matchLi.className = "bad";
          matchLi.textContent = "✘ " + I18N.t("FP_REQ_MISMATCH");
        } else {
          matchLi.className = "";
          matchLi.textContent = "○ " + I18N.t("FP_REQ_MATCH");
        }
      }

      var pct = np.length ? (passCount / 5) * 100 : 0;
      var color = "#94a3b8";
      var labelText = "—";
      if (np.length) {
        if (passCount >= 5) {
          color = "#22c55e";
          labelText = I18N.t("FP_STRENGTH_VERY_STRONG");
        } else if (passCount === 4) {
          color = "#4ade80";
          labelText = I18N.t("FP_STRENGTH_STRONG");
        } else if (passCount === 3) {
          color = "#eab308";
          labelText = I18N.t("FP_STRENGTH_MEDIUM");
        } else {
          color = "#ef4444";
          labelText = I18N.t("FP_STRENGTH_WEAK");
        }
      }
      bar.style.width = pct + "%";
      bar.style.background = color;
      label.textContent = labelText;
      label.style.color = color;

      var allOk = state.allOk;
      submitBtn.disabled = !allOk;
      submitBtn.style.opacity = allOk ? "1" : "0.55";
      submitBtn.style.cursor = allOk ? "pointer" : "not-allowed";
    }

    pw1.addEventListener("input", _update);
    pw2.addEventListener("input", _update);
    _update();
  }

  function _fpBindEyeToggle(inputId) {
    var btn = document.getElementById(inputId + "-toggle");
    var input = document.getElementById(inputId);
    var icon = document.getElementById(inputId + "-eye-icon");
    if (!btn || !input || !icon) return;
    btn.addEventListener("click", function () {
      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("ti-eye");
        icon.classList.add("ti-eye-off");
      } else {
        input.type = "password";
        icon.classList.remove("ti-eye-off");
        icon.classList.add("ti-eye");
      }
      input.focus();
    });
  }

  function _fpSubmitStep3() {
    _fpClearError();
    var pw1 = document.getElementById("fp-pw1");
    var pw2 = document.getElementById("fp-pw2");
    var submitBtn = document.getElementById("fp-submit-3");
    var p1 = pw1.value || "";
    var p2 = pw2.value || "";
    if (!p1 || !p2) {
      _fpShowError(I18N.t("SHELL_MSG_FILL_ALL_FIELDS"));
      return;
    }
    if (p1 !== p2) {
      _fpShowError(I18N.t("FP_ERR_PASSWORD_MISMATCH"));
      return;
    }
    submitBtn.disabled = true;
    pw1.disabled = true;
    pw2.disabled = true;
    submitBtn.innerHTML = _fpBtnHTML("", true);

    DL.Core.resetPasswordWithToken(_FP.username, _FP.resetToken, p1, p2, {
      onSuccess: function () {
        _fpRenderSuccess();
      },
      onError: function (res) {
        submitBtn.disabled = false;
        pw1.disabled = false;
        pw2.disabled = false;
        submitBtn.innerHTML = _fpBtnHTML(I18N.t("FP_BTN_RESET"));
        _fpShowError((res && res.message) || I18N.t("FP_ERR_GENERIC"));
      },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // شاشة النجاح
  // ─────────────────────────────────────────────────────────────
  function _fpRenderSuccess() {
    var fpUsername = _FP.username;
    var html =
      '<div class="fp-success-box">' +
      '<div class="fp-icon-wrap fp-icon-success"><i class="ti ti-circle-check"></i></div>' +
      '<div class="fp-title">' +
      esc(I18N.t("FP_STEP_SUCCESS_TITLE")) +
      "</div>" +
      '<div class="fp-subtitle">' +
      esc(I18N.t("FP_STEP_SUCCESS_DESC")) +
      "</div>" +
      '<div class="fp-actions">' +
      '<button type="button" class="btn-login" id="fp-back-to-login" style="flex:1;width:100%">' +
      _fpBtnHTML(I18N.t("FP_BTN_BACK_TO_LOGIN")) +
      "</button>" +
      "</div>" +
      "</div>";

    document.getElementById("fp-step-content").innerHTML = html;
    document
      .getElementById("fp-back-to-login")
      .addEventListener("click", function () {
        _fpClose();
        // ✅ تعبئة اسم المستخدم في شاشة اللوجين تلقائيًا وتركيز حقل الباسورد
        var loginUser = document.getElementById("l-user");
        var loginPass = document.getElementById("l-pass");
        if (loginUser) loginUser.value = fpUsername;
        if (loginPass) loginPass.focus();
      });
  }
</script>

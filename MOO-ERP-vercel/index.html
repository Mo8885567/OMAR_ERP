    <!-- [I18N] محرك تعدد اللغات على الفرونت-إند — يجب أن يُحمَّل قبل أي شاشة تستخدم I18N.t() -->
    <!-- يعتمد على _gsr() من 31_JS_DataLayer (مُحمَّل بالأعلى مباشرة) -->
    <script>
  // ═══════════════════════════════════════════════════════════════════
  // 38_JS_i18n_Client.html — محرك الترجمة على الفرونت-إند (MOO.ERP i18n)
  //
  // يعتمد على _gsr() الموجودة في 31_JS_DataLayer.html — لا يستدعي
  // google.script.run مباشرة (يلتزم بـ RULE 1 الموثّقة هناك).
  //
  // الاستخدام في أي شاشة:
  //   1) HTML:  <button data-i18n="BTN_SAVE"></button>
  //             <input data-i18n-placeholder="LBL_SEARCH_PLACEHOLDER">
  //             <span data-i18n-title="MSG_TOOLTIP_X">
  //   2) JS:    I18N.t('MSG_SAVE_SUCCESS')   → يرجع النص المترجم كـ string
  //             I18N.t('MSG_X', {name: y})   → استبدال {{name}} داخل النص
  //
  // أي شاشة جديدة تُبنى لاحقًا وتستخدم data-i18n أو I18N.t() تلقائيًا
  // تدعم تعدد اللغات بدون أي كود إضافي — هذا هو المطلوب في
  // "المرحلة الثانية عشرة: قابلية التوسع" من خطة العمل.
  // ═══════════════════════════════════════════════════════════════════

  var I18N = (function () {
    var _lang = "ar";
    var _dir = "rtl";
    var _dict = {};
    var _availableLanguages = [];
    var _legacyTextMap = {};
    var _autoTextCache = {};
    var _autoTextQueue = {};
    var _autoTextTimer = null;
    var AUTO_TEXT_STORAGE_KEY = "moo_erp_i18n_auto_en";
    var _forced = false;
    var _ready = false;
    var _readyCallbacks = [];
    var _changeListeners = []; // تُستدعى بعد كل تحميل/تبديل لغة (لإعادة بناء قوائم Key→Label الثابتة، مثل ERP_ROLES)
    var STORAGE_KEY = "moo_erp_lang"; // كاش محلي فقط لتفادي "ومضة" اتجاه خاطئ قبل استجابة السيرفر
    var _observer = null;

    // Keep locale decisions in one place.  Rendering modules must use these
    // helpers instead of hard-coding ar-EG/en-US in reports or grids.
    function _locale() {
      return _lang === "ar" ? "ar-EG-u-nu-latn" : "en-US";
    }

    /** يترجم مفتاحًا؛ يرجع المفتاح نفسه بين قوسين لو غير موجود (يسهّل رصد النواقص أثناء التطوير) */
    function t(key, vars) {
      var text = _dict[key];
      if (text === undefined) {
        console.warn("[I18N] مفتاح ترجمة مفقود:", key);
        return "⟦" + key + "⟧";
      }
      if (vars) {
        Object.keys(vars).forEach(function (k) {
          text = text.replace(
            new RegExp("{{\\s*" + k + "\\s*}}", "g"),
            vars[k],
          );
        });
      }
      return text;
    }

    /** يطبّق الترجمة على كل عناصر data-i18n* الموجودة حاليًا في الـ DOM (يُستدعى بعد أي render) */
    function applyToDom(root) {
      root = root || document;
      root.querySelectorAll("[data-i18n]").forEach(function (el) {
        el.textContent = t(el.getAttribute("data-i18n"));
      });
      root.querySelectorAll("[data-i18n-html]").forEach(function (el) {
        el.innerHTML = t(el.getAttribute("data-i18n-html"));
      });
      root.querySelectorAll("[data-i18n-placeholder]").forEach(function (el) {
        el.setAttribute(
          "placeholder",
          t(el.getAttribute("data-i18n-placeholder")),
        );
      });
      root.querySelectorAll("[data-i18n-title]").forEach(function (el) {
        el.setAttribute("title", t(el.getAttribute("data-i18n-title")));
      });
      root.querySelectorAll("[data-i18n-value]").forEach(function (el) {
        el.setAttribute("value", t(el.getAttribute("data-i18n-value")));
      });
      root.querySelectorAll("[data-i18n-aria-label]").forEach(function (el) {
        el.setAttribute(
          "aria-label",
          t(el.getAttribute("data-i18n-aria-label")),
        );
      });
      root.querySelectorAll("[data-i18n-alt]").forEach(function (el) {
        el.setAttribute("alt", t(el.getAttribute("data-i18n-alt")));
      });
      _applyLegacyText(root);
    }

    /**
     * Transitional coverage for legacy renderers. Only exact text matches
     * originating from the fallback UI catalogue are replaced. This keeps
     * user-entered values, database identifiers and arbitrary Arabic content
     * untouched while existing common labels become English immediately.
     */
    function _applyLegacyText(root) {
      if (!_legacyTextMap || !Object.keys(_legacyTextMap).length || !root)
        return;
      var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode: function (node) {
          var parent = node.parentNode;
          if (
            !parent ||
            /^(SCRIPT|STYLE|TEXTAREA|OPTION)$/i.test(parent.nodeName)
          )
            return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        },
      });
      var node;
      while ((node = walker.nextNode())) {
        var raw = node.nodeValue;
        var trimmed = raw.replace(/^\s+|\s+$/g, "");
        if (_legacyTextMap[trimmed] !== undefined) {
          node.nodeValue = raw.replace(trimmed, _legacyTextMap[trimmed]);
        }
      }
      if (root.querySelectorAll) {
        root
          .querySelectorAll("[title],[placeholder],[aria-label]")
          .forEach(function (el) {
            ["title", "placeholder", "aria-label"].forEach(function (attr) {
              var value = el.getAttribute(attr);
              if (_legacyTextMap[value] !== undefined)
                el.setAttribute(attr, _legacyTextMap[value]);
            });
          });
      }
      _queueUncataloguedLegacyText(root);
    }

    function _loadAutoTextCache() {
      try {
        _autoTextCache = JSON.parse(
          localStorage.getItem(AUTO_TEXT_STORAGE_KEY) || "{}",
        );
      } catch (e) {
        _autoTextCache = {};
      }
    }

    function _saveAutoTextCache() {
      try {
        localStorage.setItem(
          AUTO_TEXT_STORAGE_KEY,
          JSON.stringify(_autoTextCache),
        );
      } catch (e) {}
    }

    function _queueUncataloguedLegacyText(root) {
      if (_lang !== "en" || !root || !APP || !APP.currentUser) return;
      var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode: function (node) {
          var el = node.parentNode;
          if (!el || /^(SCRIPT|STYLE|TEXTAREA|OPTION|TD)$/i.test(el.nodeName))
            return NodeFilter.FILTER_REJECT;
          if (
            el.closest &&
            el.closest(
              "td,[data-i18n-ignore],[data-user-content],.user-content",
            )
          )
            return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        },
      });
      var node;
      while ((node = walker.nextNode())) {
        var text = node.nodeValue.replace(/^\s+|\s+$/g, "");
        if (
          !/[\u0600-\u06FF]/.test(text) ||
          text.length < 2 ||
          text.length > 180 ||
          _legacyTextMap[text]
        )
          continue;
        if (_autoTextCache[text])
          node.nodeValue = node.nodeValue.replace(text, _autoTextCache[text]);
        else _autoTextQueue[text] = true;
      }
      if (_autoTextTimer || !Object.keys(_autoTextQueue).length) return;
      _autoTextTimer = setTimeout(_flushAutoTextQueue, 120);
    }

    function _flushAutoTextQueue() {
      _autoTextTimer = null;
      var texts = Object.keys(_autoTextQueue).slice(0, 25);
      texts.forEach(function (text) {
        delete _autoTextQueue[text];
      });
      if (!texts.length || !APP || !APP.currentUser) return;
      _gsr(
        "translateLegacyUiText",
        [APP.currentUser.username, texts, SESSION ? SESSION.token : null],
        {
          label: "i18n-legacy-batch",
          rawResponse: true,
          onSuccess: function (result) {
            var translations =
              (result.data && result.data.translations) ||
              result.translations ||
              {};
            Object.keys(translations).forEach(function (source) {
              _autoTextCache[source] = translations[source];
              _legacyTextMap[source] = translations[source];
            });
            _saveAutoTextCache();
            _applyLegacyText(document);
            if (Object.keys(_autoTextQueue).length)
              _autoTextTimer = setTimeout(_flushAutoTextQueue, 80);
          },
          // A quota or service outage is non-blocking. Candidates remain
          // eligible on the next render, but we never spin/retry in a loop.
          onError: function () {},
        },
      );
    }

    /** يضبط اتجاه/لغة الصفحة كاملة (المرحلة السادسة: RTL/LTR تلقائي) */
    function _applyDirToDocument(lang, dir) {
      document.documentElement.setAttribute("lang", lang);
      document.documentElement.setAttribute("dir", dir);
      document.body &&
        document.body.classList.toggle("rtl-mode", dir === "rtl");
      document.body &&
        document.body.classList.toggle("ltr-mode", dir === "ltr");
      document.documentElement.style.direction = dir;
    }

    /** قراءة مبدئية سريعة من التخزين المحلي (قبل ما يرد السيرفر) لتفادي وميض اتجاه خاطئ */
    function _quickApplyCachedLang() {
      try {
        var cached = localStorage.getItem(STORAGE_KEY);
        if (cached) {
          var parsed = JSON.parse(cached);
          _applyDirToDocument(parsed.lang, parsed.dir);
        }
      } catch (e) {}
    }

    // Components are rendered after navigation, modal opening, or async grid
    // refreshes.  Translate only newly inserted data-i18n nodes; this avoids a
    // full-page scan on every mutation and leaves user-entered values intact.
    function _startDomObserver() {
      if (_observer || !document.body || !window.MutationObserver) return;
      _observer = new MutationObserver(function (records) {
        records.forEach(function (record) {
          record.addedNodes.forEach(function (node) {
            if (node.nodeType !== 1) return;
            if (node.hasAttribute && node.hasAttribute("data-i18n"))
              applyToDom(node.parentNode);
            else if (node.querySelectorAll) applyToDom(node);
          });
        });
      });
      _observer.observe(document.body, { childList: true, subtree: true });
    }

    function _notifyLanguageChanged() {
      _changeListeners.forEach(function (cb) {
        try {
          cb();
        } catch (e) {
          console.error("[I18N] onChange listener error:", e);
        }
      });
      try {
        document.dispatchEvent(
          new CustomEvent("i18n:change", {
            detail: { lang: _lang, dir: _dir, locale: _locale() },
          }),
        );
      } catch (e) {}
    }

    /** يحمّل قاموس لغة واحدة فقط من السيرفر (Lazy Loading — المرحلة الحادية عشرة) */
    function bootstrap(callerUser, sessionToken, onDone) {
      _quickApplyCachedLang();
      _gsr("getI18nBootstrap", [callerUser, sessionToken], {
        label: "i18n-bootstrap",
        rawResponse: true,
        onSuccess: function (result) {
          var data = result.data;
          _lang = data.lang;
          _dir = data.dir;
          _dict = data.dict;
          _legacyTextMap = (data.meta && data.meta.legacyTextMap) || {};
          _loadAutoTextCache();
          _availableLanguages = data.meta.availableLanguages;
          _forced = !!data.forced;
          _ready = true;
          _applyDirToDocument(_lang, _dir);
          try {
            localStorage.setItem(
              STORAGE_KEY,
              JSON.stringify({ lang: _lang, dir: _dir }),
            );
          } catch (e) {}
          applyToDom(document);
          _startDomObserver();
          _readyCallbacks.forEach(function (cb) {
            cb();
          });
          _readyCallbacks = [];
          _notifyLanguageChanged();
          if (typeof onDone === "function") onDone();
        },
        onError: function (err) {
          console.error(
            "[I18N] فشل تحميل الترجمة، سيتم استخدام العربية كافتراضي:",
            err.message,
          );
          _lang = "ar";
          _dir = "rtl";
          _dict = {};
          _legacyTextMap = {};
          _ready = true;
          _applyDirToDocument(_lang, _dir);
          applyToDom(document);
          _startDomObserver();
          if (typeof onDone === "function") onDone();
        },
      });
    }

    /** المرحلة الخامسة: تغيير اللغة بدون إعادة تحميل الصفحة */
    function switchLanguage(
      callerUser,
      sessionToken,
      newLang,
      onDone,
      onError,
    ) {
      if (_forced) {
        showAlert && showAlert(t("MSG_LANG_FORCED_BY_ADMIN"), "warning");
        return;
      }
      _gsr("setUserLanguage", [callerUser, newLang, sessionToken], {
        label: "i18n-switch",
        rawResponse: true,
        onSuccess: function (result) {
          var data = result.data;
          _lang = data.lang;
          _dir = data.dir;
          _dict = data.dict;
          _legacyTextMap = (data.meta && data.meta.legacyTextMap) || {};
          _loadAutoTextCache();
          _applyDirToDocument(_lang, _dir);
          try {
            localStorage.setItem(
              STORAGE_KEY,
              JSON.stringify({ lang: _lang, dir: _dir }),
            );
          } catch (e) {}
          applyToDom(document);
          _notifyLanguageChanged();
          // إعادة رسم الصفحة الحالية إن كان الراوتر متاحًا حتى تُترجم كل النصوص المُولَّدة ديناميكيًا
          if (typeof render === "function") render();
          if (typeof onDone === "function") onDone(data);
        },
        onError: function (err) {
          if (typeof onError === "function") onError(err);
        },
      });
    }

    function onReady(cb) {
      if (_ready) cb();
      else _readyCallbacks.push(cb);
    }

    /**
     * يسجّل دالة تُستدعى تلقائيًا بعد كل تحميل أولي أو تبديل لغة.
     * يُستخدم من أي ملف يبني قاموس Key→Label ثابت من مفاتيح ترجمة
     * (مثال: دمج تسميات أدوار في ROLE_LABELS) حتى يُعاد بناؤه باللغة
     * الصحيحة دائمًا، بدل ما يتجمّد على أول لغة حُمِّلت بها الصفحة.
     */
    function onChange(cb) {
      _changeListeners.push(cb);
      if (_ready) cb(); // نفّذها فورًا لو القاموس جاهز أصلاً وقت التسجيل
    }

    return {
      t: t,
      applyToDom: applyToDom,
      bootstrap: bootstrap,
      switchLanguage: switchLanguage,
      onReady: onReady,
      onChange: onChange,
      getLang: function () {
        return _lang;
      },
      getDir: function () {
        return _dir;
      },
      isForced: function () {
        return _forced;
      },
      getAvailableLanguages: function () {
        return _availableLanguages;
      },
      getLocale: _locale,
      formatNumber: function (value, options) {
        return new Intl.NumberFormat(_locale(), options || {}).format(
          Number(value || 0),
        );
      },
      formatCurrency: function (value, currency, options) {
        var opts = options || {};
        opts.style = "currency";
        opts.currency = currency || "EGP";
        return new Intl.NumberFormat(_locale(), opts).format(
          Number(value || 0),
        );
      },
      formatDate: function (value, options) {
        var date = value instanceof Date ? value : new Date(value);
        if (isNaN(date.getTime())) return "";
        return new Intl.DateTimeFormat(
          _locale(),
          options || { year: "numeric", month: "2-digit", day: "2-digit" },
        ).format(date);
      },
      formatDateTime: function (value, options) {
        var date = value instanceof Date ? value : new Date(value);
        if (isNaN(date.getTime())) return "";
        return new Intl.DateTimeFormat(
          _locale(),
          options || { dateStyle: "medium", timeStyle: "short" },
        ).format(date);
      },
    };
  })();

  // ─── مثال جاهز لعنصر تغيير اللغة (استخدمه داخل شاشة الإعدادات أو شريط النظام) ───
  // بيولّد Select عليه أعلام اللغات + يعمل bind تلقائي لدالة التغيير.
  function renderLanguageSwitcher(containerId) {
    var el = document.getElementById(containerId);
    if (!el) return;
    var langs = I18N.getAvailableLanguages();
    var current = I18N.getLang();
    var options = langs
      .map(function (l) {
        return (
          '<option value="' +
          l.code +
          '"' +
          (l.code === current ? " selected" : "") +
          ">" +
          l.flag +
          " " +
          l.label +
          "</option>"
        );
      })
      .join("");
    el.innerHTML =
      '<select id="langSwitcherSelect" ' +
      (I18N.isForced() ? "disabled" : "") +
      ">" +
      options +
      "</select>";
    var selectEl = document.getElementById("langSwitcherSelect");
    if (selectEl) {
      selectEl.addEventListener("change", function () {
        var newLang = this.value;
        I18N.switchLanguage(
          APP.currentUser,
          SESSION ? SESSION.token : null,
          newLang,
          function () {
            console.log("[I18N] تم تغيير اللغة إلى:", newLang);
          },
          function (err) {
            console.error("[I18N] فشل تغيير اللغة:", err.message);
          },
        );
      });
    }
  }
</script>


    <!-- [CORE-UTILITIES] دوال مشتركة بسيطة (تنسيق تاريخ/escape/رابط درايف) -->
    <script>
  // ═══════════════════════════════════════════════════════════════
  //  Core_Utilities.html
  //  [REFACTOR-P2] طبقة الـ Utilities المشتركة — نُقلت هنا من نسخ
  //  مكررة كانت موزعة على أكثر من ملف (راجع Architecture Audit،
  //  قسم 6 و8). نقل نصي بحت — صفر تغيير في السلوك الفعلي الحالي
  //  للنظام الرئيسي (Index.html)، باستثناء توحيد فراغ بسيط جدًا في
  //  _fmtRelTime (راجع الملاحظة أسفل تعريفها).
  //
  //  ⚠️ لا تُعرَّف أي نسخة جديدة من هذه الدوال في أي ملف موديول —
  //  استخدم النسخة الموجودة هنا مباشرة (كلها Global بنفس الأسماء
  //  القديمة، فلا حاجة لتعديل أي استدعاء موجود).
  //
  //  ملاحظة: CatalogPublic.html صفحة مستقلة (doGet منفصل، مش جزء
  //  من Index.html include chain)، فاحتفظت بنسخها الخاصة من _esc
  //  و_fixDriveUrl زي ما هي دون تعديل، لتفادي أي كسر لصفحة الكتالوج
  //  العامة المستقلة.
  // ═══════════════════════════════════════════════════════════════

  // ── _esc — HTML escaping ─────────────────────────────────────
  // كانت مكررة في: 20_JS_ContextMenu.html (Global)
  // + نسخة محلية Scoped داخل 00_JS_DataLayer.html/toPrint() لغرض
  //   أمان محدد (document.write) — تُركت كما هي عمدًا، مش مصدر تعارض.

  // [PREFS-WIRING] paper_size / print_orientation كانا معرَّفين في شاشة
  // التفضيلات (تبويب الطباعة) بدون أي تأثير فعلي — كل شاشة كانت تبني
  // نافذة الطباعة بـ @page ثابت (A4 portrait) يدويًا. هذه الدالة المشتركة
  // تبني قاعدة @page ديناميكية من تفضيل المستخدم، تُستدعى من داخل أي
  // <style> في نوافذ الطباعة بدل النص الثابت.
  // ملحوظة: print_copies (عدد النسخ) لا يوجد له API في المتصفح يسمح
  // بالتحكم فيه برمجيًا من صفحة الويب — قيمته تُعرض للمستخدم كـ"تلميح"
  // فقط، والتحكم الفعلي في عدد النسخ يبقى من نافذة الطباعة القياسية
  // للمتصفح (Ctrl+P) وليس Dead Setting قابل للحل من جهة الفرونت إند.
  function _getPrintPageCSS() {
    var size = "A4";
    var orientation = "portrait";
    try {
      if (typeof PreferenceService !== "undefined") {
        size = PreferenceService.get("paper_size", "A4") || "A4";
        orientation =
          PreferenceService.get("print_orientation", "portrait") ||
          "portrait";
      }
    } catch (e) {}
    return (
      "@media print{@page{size:" +
      size +
      " " +
      orientation +
      ";margin:8mm}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}"
    );
  }
  function _esc(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ── _fmtDate — [DATE-UNIFY 2026-07-14] توحيد مع fmtDate المركزية ──
  // كانت مكررة في: 11_JS_Accounting.html, 18_JS_Reports.html,
  // 23_JS_PostingConfig_FixedAssets.html، وكانت **لا** تحترم تفضيل
  // date_format للمستخدم — دايمًا dd/mm/yyyy ثابت بغض النظر عن اختياره
  // في شاشة التفضيلات (كانت المحاسبة/التقارير/الأصول الثابتة الاستثناء
  // الوحيد اللي بيتجاهل التفضيل رغم وجوده).
  //
  // الحل: بدل تكرار منطق التنسيق، _fmtDate بقت غلاف رفيع فوق fmtDate()
  // (المعرّفة في 02_JS_UI_Shell.html وهي المصدر الرسمي الوحيد لمنطق
  // date_format) — فأي شاشة تستخدم _fmtDate هتحترم التفضيل تلقائيًا
  // بدون الحاجة لتعديل كل نقطة استدعاء على حدة.
  // ⚠️ لا تُعرَّف منطق تنسيق تاريخ مستقل هنا مرة أخرى — أي تعديل مطلوب
  // على شكل عرض التاريخ يتم في fmtDate() فقط.
  function _fmtDate(val) {
    if (!val) return "—";
    if (typeof fmtDate === "function") return fmtDate(val);
    // fallback نادر لو استُدعيت قبل تحميل 02_JS_UI_Shell.html
    var d = String(val).split("T")[0];
    if (!d || d === "undefined") return "—";
    var parts = d.split("-");
    if (parts.length !== 3) return d;
    return parts[2] + "/" + parts[1] + "/" + parts[0];
  }

  // ── _fmtRelTime — وقت نسبي ("منذ 5 د") ──────────────────────────
  // كانت معرَّفة مرتين داخل نفس الملف 19_JS_WhatsApp.html (بفروق
  // فراغ بسيطة فقط بين الرقم والحرف: "5 د" مقابل "5د"). وحّدت على
  // شكل النسخة بفراغ (الأكثر انتشارًا في باقي الشاشات) — الفرق
  // شكلي بحت (مسافة واحدة) ولا يغيّر أي منطق أو بيانات.
  function _fmtRelTime(date) {
    if (!date || isNaN(date)) return "";
    var diff = (Date.now() - date.getTime()) / 1000;
    if (diff < 60) return I18N.t("UTIL_TIME_NOW");
    if (diff < 3600)
      return Math.floor(diff / 60) + " " + I18N.t("UTIL_TIME_MIN_SHORT");
    if (diff < 86400)
      return Math.floor(diff / 3600) + " " + I18N.t("UTIL_TIME_HOUR_SHORT");
    return Math.floor(diff / 86400) + " " + I18N.t("UTIL_TIME_DAY_SHORT");
  }

  // ── _fixDriveUrl — تحويل رابط Google Drive لصيغة thumbnail قابلة للعرض ──
  // كانت معرَّفة في: 08_JS_Users_Branding.html فقط ضمن Index.html
  // (نسخة CatalogPublic.html مستقلة ومختلفة قليلًا في المنطق — تُركت
  // كما هي في ملفها لأنها صفحة منفصلة تمامًا).
  function _fixDriveUrl(url) {
    if (!url) return url;
    if (url.indexOf("drive.google.com") === -1) return url;
    var m =
      url.match(/[?&]id=([a-zA-Z0-9_-]+)/) ||
      url.match(/\/d\/([a-zA-Z0-9_-]+)/) ||
      url.match(/thumbnail\?id=([a-zA-Z0-9_-]+)/);
    if (m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w400";
    return url;
  }

  // ── callServer — [BUG-FIX 2026-07-04] دالة عامة لاستدعاء الباك-إند ──
  // كانت مُستخدَمة بالفعل في saveSaleReturn() و savePurchaseReturn()
  // (15_JS_Invoices.html) بصيغة callServer(fnName, payload, callback)
  // لكنها لم تكن معرَّفة في أي ملف بكل المشروع — أي أن حفظ مرتجع
  // البيع/الشراء كان يفشل دائمًا بخطأ "callServer is not a function"
  // (لا تظهر رسالة خطأ واضحة للمستخدم لأن withFailureHandler لم يكن
  // ليُستدعى أصلاً — الخطأ يحدث قبل الوصول لأي google.script.run).
  //
  // [DL-UNIFY] كانت هذه الدالة wrapper مستقل ثالث حول google.script.run
  // (بجانب _gsr في 00_JS_DataLayer.html وSaveEngine) — دلوقتي بقت مجرد
  // غلاف رفيع فوق _gsr نفسها بنفس التوقيع القديم (callServer(fn,payload,cb))
  // عشان مواقع الاستدعاء الحالية في 15_JS_Invoices.html ما تتغيرش، لكن
  // بدون تكرار منطق retry/timeout/رسائل الخطأ — كله بقى من _gsr فقط.
  function callServer(fnName, payload, callback) {
    if (!fnName) {
      if (typeof callback === "function") {
        callback({
          success: false,
          message: I18N.t("UTIL_MSG_SERVER_UNREACHABLE"),
        });
      }
      return;
    }
    if (typeof _gsr !== "function") {
      if (typeof callback === "function") {
        callback({
          success: false,
          message: I18N.t("UTIL_MSG_SERVER_UNREACHABLE"),
        });
      }
      return;
    }
    _gsr(fnName, [payload, SESSION.token], {
      label: "callServer:" + fnName,
      onSuccess: function (res) {
        if (typeof callback === "function") callback(res);
      },
      onError: function (res) {
        // [SESSION-FIX] لو جلسة منتهية، _gsr بالفعل نادت _handleSessionExpired
        // مركزيًا — هنا فقط نعرض توست عادي لباقي أنواع الفشل زي السلوك القديم.
        if (
          typeof _isSessionErrorResponse !== "function" ||
          !_isSessionErrorResponse(res)
        ) {
          showToast(
            I18N.t("MSG_ERROR_PREFIX") +
              " " +
              (res && res.message ? res.message : ""),
            "error",
          );
        }
        if (typeof callback === "function") callback(res);
      },
    });
  }

  // ═══════════════════════════════════════════════════════════════
  //  [UNIFY-LOADING] مؤشر تحميل موحّد لكل الشاشات — سبينر دائري + نص
  //  ═══════════════════════════════════════════════════════════════
  //  قبل كده كل شاشة كانت بتكتب حالة التحميل بتاعتها يدوي جوه renderX()
  //  الخاصة بيها بأشكال مختلفة (نص مجرد / أيقونة ti-loader-2 / spinner
  //  مباشر ببصمات inline مختلفة) — أكتر من 30 موضع متفرق. الدالتين دول
  //  بيبنوا على نفس CSS classes الموجودة أصلاً (.spinner / .loading-overlay
  //  في Style_04_Components.html) عشان يبقى الشكل والسلوك موحّد في كل
  //  مكان، من غير أي CSS جديد.
  //
  //  _loadingBlock(text) — لأي حاوية/كارت/سكشن (div) بينتظر بيانات.
  //  _loadingRow(colspan, text) — لصف <tr> جوه جدول (tbody) بينتظر بيانات.
  //
  //  الاستخدام لسه بنفس منطق كل شاشة القديم: بيتحط كـ innerHTML مبدئي
  //  وقت استدعاء _gsr()/callServer()، وبعدين onSuccess بيستبدله بالمحتوى
  //  الحقيقي — الدالتين دول بس بيوحّدوا شكل الـ placeholder نفسه.
  function _loadingBlock(text) {
    var label = text || I18N.t("UTIL_LOADING_TEXT") || "جاري التحميل...";
    return (
      '<div class="loading-overlay"><div class="spinner"></div><p>' +
      _esc(label) +
      "</p></div>"
    );
  }

  function _loadingRow(colspan, text) {
    var label = text || I18N.t("UTIL_LOADING_TEXT") || "جاري التحميل...";
    return (
      '<tr class="loading-row"><td colspan="' +
      (colspan || 1) +
      '" style="text-align:center;padding:24px;color:var(--text3)">' +
      '<div class="spinner spinner-sm" style="margin:0 auto 8px"></div>' +
      _esc(label) +
      "</td></tr>"
    );
  }

  // نسخة مضغوطة (سطر واحد) لأماكن ضيقة زي تسميات صغيرة/سطور تفاصيل —
  // بديل .loading-overlay اللي بها padding كبير (60px) مش مناسب هنا.
  function _loadingInline(text) {
    var label = text || I18N.t("UTIL_LOADING_TEXT") || "جاري التحميل...";
    return (
      '<span style="display:inline-flex;align-items:center;gap:6px;color:var(--text3)">' +
      '<span class="spinner spinner-sm"></span>' +
      _esc(label) +
      "</span>"
    );
  }
</script>


    <!-- [VALIDATION] نظام التحقق الموحّد — يجب أن يُحمَّل قبل باقي الموديولات -->
    <!-- يحتوي على: VF.validate · VF.validateForm · VF.bind · VF.quickSave + RULES -->
    <script>
  // ╔══════════════════════════════════════════════════════════════════════╗
  // ║  MOO.ERP — Enterprise Validation Framework (VF v2.0)                 ║
  // ║  نظام التحقق الموحّد — المرجع الوحيد للتحقق في كل شاشات النظام      ║
  // ║  يُحمَّل بعد Style وI18N، وقبل باقي الموديولات                      ║
  // ║                                                                      ║
  // ║  [VF-V2] هذا الملف هو الإصدار الموسّع الذي يغطي كل أنواع الحقول +   ║
  // ║  UX حديث (تحقق فوري/inline/تركيز تلقائي على أول خطأ) + Business      ║
  // ║  Validation (رصيد/حد ائتمان..) عبر جسر يتصل بـ ValidationEngine     ║
  // ║  السيرفر (Code_36) و BusinessRulesEngine (Code_33) — بدون تكرار     ║
  // ║  أي منطق قواعد أعمال هنا، فقط عرض نتيجته على الحقل الصحيح.          ║
  // ║                                                                      ║
  // ║  الاستخدام الأساسي (لم يتغيّر — التوافق للخلف مضمون):               ║
  // ║    VF.validate(fieldId, rules)  ← تحقق فوري من حقل واحد             ║
  // ║    VF.validateForm(formConfig)  ← تحقق من نموذج كامل                ║
  // ║    VF.bind(fieldId, rules)      ← ربط حدث blur/input بحقل          ║
  // ║    VF.bindAll(formConfig)       ← ربط أحداث كل حقول النموذج        ║
  // ║    VF.clear(fieldId) / VF.clearForm(ids)                            ║
  // ║                                                                      ║
  // ║  الجديد في v2:                                                       ║
  // ║    VF.RULES.*        ← أنماط جاهزة لكل نوع حقل مطلوب (43 نوع)      ║
  // ║    VF.checkDuplicate(fieldId, rules) ← فحص تكرار Debounced يتصل     ║
  // ║                        بدالة سيرفر تُمرَّر في rules.checkFn         ║
  // ║    VF.business.*     ← تشغيل قاعدة عمل سيرفر وعرض الخطأ على شاشة   ║
  // ║                        الحفظ (رصيد/حد ائتمان/فترة سماح...)          ║
  // ║    VF.showSuccess(msg) ← رسالة نجاح موحّدة بعد الحفظ                ║
  // ╚══════════════════════════════════════════════════════════════════════╝
  //
  // [I18N] هذا الملف محوَّل بالكامل لاستخدام Translation Engine — يعتمد
  // على المتغيّر العام I18N (38_JS_i18n_Client.html)، ولازم يتحمّل بعده.

  (function (global) {
    "use strict";

    // ─── CSS class names ─────────────────────────────────────────────────
    var CLS_ERR = "vf-error";
    var CLS_OK = "vf-ok";
    var CLS_CHECKING = "vf-checking"; // [VF-V2] أثناء فحص Duplicate/Async
    var HINT_ID = "-vf-hint"; // suffix → element id = fieldId + HINT_ID

    // ─── مساعدات داخلية ──────────────────────────────────────────────────
    function _el(id) {
      return document.getElementById(id);
    }

    function _getHint(fieldId) {
      return _el(fieldId + HINT_ID);
    }

    function _createHint(field) {
      var hint = document.createElement("div");
      hint.id = field.id + HINT_ID;
      hint.className = "vf-hint";
      hint.setAttribute("role", "alert");
      hint.setAttribute("aria-live", "polite");
      field.parentNode.insertBefore(hint, field.nextSibling);
      return hint;
    }

    function _ensureHint(field) {
      return _getHint(field.id) || _createHint(field);
    }

    // [VF-V2] tooltip اختياري — نفس نص الخطأ لكن كـ title، مفيد لو الحقل
    // ضيّق (جدول ColumnEngine مثلاً) والـ hint المرئي مش هيتقرأ بسهولة.
    function _setError(field, msg) {
      field.classList.remove(CLS_CHECKING);
      field.classList.add(CLS_ERR);
      field.classList.remove(CLS_OK);
      field.setAttribute("aria-invalid", "true");
      field.title = msg;
      var hint = _ensureHint(field);
      hint.textContent = msg;
      hint.style.display = "block";
    }

    function _setOk(field) {
      field.classList.remove(CLS_ERR, CLS_CHECKING);
      field.classList.add(CLS_OK);
      field.removeAttribute("aria-invalid");
      field.removeAttribute("title");
      var hint = _getHint(field.id);
      if (hint) {
        hint.textContent = "";
        hint.style.display = "none";
      }
    }

    function _setChecking(field) {
      field.classList.add(CLS_CHECKING);
      field.classList.remove(CLS_ERR, CLS_OK);
    }

    function _clearState(field) {
      field.classList.remove(CLS_ERR, CLS_OK, CLS_CHECKING);
      field.removeAttribute("aria-invalid");
      field.removeAttribute("title");
      var hint = _getHint(field.id);
      if (hint) {
        hint.textContent = "";
        hint.style.display = "none";
      }
    }

    // [VF-V2] debounce محلي — يعيد استخدام دالة debounce العامة
    // (02_JS_UI_Shell.html) لو موجودة، وإلا بيستخدم نسخة احتياطية بسيطة
    // حتى لا يعتمد هذا الملف على ترتيب تحميل صارم.
    function _debounce(fn, wait) {
      if (typeof global.debounce === "function") return global.debounce(fn, wait);
      var t;
      return function () {
        var args = arguments,
          ctx = this;
        clearTimeout(t);
        t = setTimeout(function () {
          fn.apply(ctx, args);
        }, wait || 300);
      };
    }

    // ─── Regex أساسية (نفس صيغ ValidationEngine على السيرفر تمامًا حتى لا
    // يختلف حقل يظهر صحيحًا على العميل ثم يُرفض على السيرفر أو العكس) ────
    var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    var PHONE_RE = /^[\d\s\-\+\(\)]{7,20}$/;
    var EG_PHONE_RE = /^01[0125][0-9]{8}$/;
    var EG_TEL_RE = /^0[2-9][0-9]{6,8}$/;
    var URL_RE = /^https?:\/\/\S+$/i;
    var NUMBERS_ONLY_RE = /^[0-9]+$/;
    var LETTERS_ONLY_RE = /^[A-Za-z\s]+$/;
    var ARABIC_ONLY_RE = /^[\u0600-\u06FF\s]+$/;
    var ENGLISH_ONLY_RE = /^[A-Za-z0-9\s.,'\-]+$/;
    var DECIMAL_RE = /^-?\d+(\.\d+)?$/;
    var EG_NATIONAL_ID_RE = /^[23][0-9]{13}$/;
    var EG_TAX_NUMBER_RE = /^[0-9]{9}$/;
    var EG_COMMERCIAL_REG_RE = /^[0-9]{2,10}$/;
    var BARCODE_RE = /^[0-9]{8}$|^[0-9]{12,13}$|^[A-Za-z0-9\-_]{4,30}$/;

    // ─── Date dd/MM/yyyy ─────────────────────────────────────────────────
    var DATE_RE = /^(\d{2})\/(\d{2})\/(\d{4})$/;
    function _validDate(val) {
      var m = val.match(DATE_RE);
      if (!m) return false;
      var d = +m[1],
        mo = +m[2],
        y = +m[3];
      if (mo < 1 || mo > 12) return false;
      var max = new Date(y, mo, 0).getDate();
      return d >= 1 && d <= max && y >= 1900 && y <= 2100;
    }

    var TIME_RE = /^([01]\d|2[0-3]):([0-5]\d)(:[0-5]\d)?$/;

    function _isValidNationalId(v) {
      if (!EG_NATIONAL_ID_RE.test(v)) return false;
      var century = v.charAt(0) === "2" ? 1900 : 2000;
      var year = century + parseInt(v.substr(1, 2), 10);
      var month = parseInt(v.substr(3, 2), 10);
      var day = parseInt(v.substr(5, 2), 10);
      if (month < 1 || month > 12) return false;
      var d = new Date(year, month - 1, day);
      return d.getMonth() === month - 1 && d.getDate() === day;
    }

    // ═══════════════════════════════════════════════════════════════════
    // VF.validate(fieldId, rules) → true إذا الحقل صحيح، false إذا خطأ
    //
    // rules مثال:
    // {
    //   required   : true,
    //   type       : "text" | "number" | "email" | "phone" | "egyptPhone" |
    //                "egyptTelephone" | "url" | "date" | "time" | "decimal" |
    //                "currency" | "percentage" | "numbersOnly" | "lettersOnly" |
    //                "arabicOnly" | "englishOnly" | "nationalId" | "taxNumber" |
    //                "commercialRegistration" | "barcode" | "qr" |
    //                "select" | "multiSelect" | "checkbox" | "radio" | "file",
    //   min/max            : حدود رقمية أو تاريخية
    //   minLength/maxLength/exactLength : حدود نصية
    //   allowNeg           : يسمح بالسالب (أرقام)
    //   allowedExtensions  : ["jpg","png",...] (نوع file)
    //   maxSizeMB          : حجم أقصى بالميجا (نوع file)
    //   label              : اسم الحقل يُستخدم في رسائل الخطأ
    // }
    // ═══════════════════════════════════════════════════════════════════
    function validate(fieldId, rules) {
      var field = _el(fieldId);
      if (!field) return true; // الحقل غير موجود في DOM حالياً — تجاهل

      rules = rules || {};
      var label = rules.label || I18N.t("VF_LBL_DEFAULT_FIELD");
      var type = rules.type || "text";
      var isCheckboxLike = type === "checkbox" || type === "radio";
      var raw;
      if (isCheckboxLike) raw = field.checked;
      else if (type === "multiSelect")
        raw = Array.prototype.map.call(field.selectedOptions || [], function (o) {
          return o.value;
        });
      else raw = field.tagName === "SELECT" ? field.value : field.value || "";
      var val = type === "number" || type === "currency" || type === "percentage"
        ? raw
        : typeof raw === "string"
        ? raw.trim()
        : raw;

      // ── required ─────────────────────────────────────────────────────
      if (rules.required) {
        if (type === "select" && (!val || val === "" || val === "0")) {
          _setError(field, I18N.t("VF_MSG_SELECT_PLEASE", { label: label }));
          return false;
        }
        if (isCheckboxLike && !val) {
          _setError(field, I18N.t("VF_MSG_REQUIRED", { label: label }));
          return false;
        }
        if (type === "multiSelect" && (!val || val.length === 0)) {
          _setError(field, I18N.t("VF_MSG_SELECT_PLEASE", { label: label }));
          return false;
        }
        if (
          type !== "select" &&
          type !== "multiSelect" &&
          !isCheckboxLike &&
          !val
        ) {
          _setError(field, I18N.t("VF_MSG_REQUIRED", { label: label }));
          return false;
        }
      } else if (!val && !isCheckboxLike) {
        // الحقل اختياري وفارغ → مسح الحالة فقط (بدون رسالة مزعجة)
        _clearState(field);
        return true;
      }

      // ── type-specific ────────────────────────────────────────────────
      if (type === "number" || type === "currency" || type === "percentage") {
        if (val === "" || isNaN(+val) || val !== String(val).trim()) {
          _setError(field, I18N.t("VF_MSG_INVALID_NUMBER", { label: label }));
          return false;
        }
        var num = +val;
        if (!rules.allowNeg && num < 0) {
          _setError(field, I18N.t("VF_MSG_NO_NEGATIVE", { label: label }));
          return false;
        }
        if (type === "percentage" && (num < (rules.min !== undefined ? rules.min : 0) || num > (rules.max !== undefined ? rules.max : 100))) {
          _setError(field, I18N.t("VF_MSG_INVALID_PERCENTAGE", { label: label }));
          return false;
        }
        if (type === "currency") {
          var decimals = rules.decimals !== undefined ? rules.decimals : 2;
          var curRe = new RegExp("^-?\\d+(\\.\\d{1," + decimals + "})?$");
          if (!curRe.test(String(val).trim())) {
            _setError(field, I18N.t("VF_MSG_INVALID_CURRENCY", { label: label }));
            return false;
          }
        }
        if (rules.min !== undefined && num < rules.min) {
          _setError(field, I18N.t("VF_MSG_MIN_NUMBER", { label: label, min: rules.min }));
          return false;
        }
        if (rules.max !== undefined && num > rules.max) {
          _setError(field, I18N.t("VF_MSG_MAX_NUMBER", { label: label, max: rules.max }));
          return false;
        }
      } else if (type === "email") {
        if (!EMAIL_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_EMAIL"));
          return false;
        }
      } else if (type === "phone") {
        if (!PHONE_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_PHONE"));
          return false;
        }
      } else if (type === "egyptPhone") {
        if (!EG_PHONE_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_EGYPT_PHONE"));
          return false;
        }
      } else if (type === "egyptTelephone") {
        if (!EG_TEL_RE.test(val.replace(/[\s\-]/g, ""))) {
          _setError(field, I18N.t("VF_MSG_INVALID_EGYPT_TEL"));
          return false;
        }
      } else if (type === "url") {
        if (!URL_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_URL"));
          return false;
        }
      } else if (type === "date") {
        if (!_validDate(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_DATE"));
          return false;
        }
      } else if (type === "time") {
        if (!TIME_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_TIME"));
          return false;
        }
      } else if (type === "decimal") {
        if (!DECIMAL_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_NUMBER", { label: label }));
          return false;
        }
      } else if (type === "numbersOnly") {
        if (!NUMBERS_ONLY_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_NUMBERS_ONLY", { label: label }));
          return false;
        }
      } else if (type === "lettersOnly") {
        if (!LETTERS_ONLY_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_LETTERS_ONLY", { label: label }));
          return false;
        }
      } else if (type === "arabicOnly") {
        if (!ARABIC_ONLY_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_ARABIC_ONLY", { label: label }));
          return false;
        }
      } else if (type === "englishOnly") {
        if (!ENGLISH_ONLY_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_ENGLISH_ONLY", { label: label }));
          return false;
        }
      } else if (type === "nationalId") {
        if (!_isValidNationalId(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_NATIONAL_ID"));
          return false;
        }
      } else if (type === "taxNumber") {
        if (!EG_TAX_NUMBER_RE.test(val.replace(/[\s\-]/g, ""))) {
          _setError(field, I18N.t("VF_MSG_INVALID_TAX_NUMBER"));
          return false;
        }
      } else if (type === "commercialRegistration") {
        if (!EG_COMMERCIAL_REG_RE.test(val.replace(/[\s\-]/g, ""))) {
          _setError(field, I18N.t("VF_MSG_INVALID_COMMERCIAL_REG"));
          return false;
        }
      } else if (type === "barcode" || type === "qr") {
        if (!BARCODE_RE.test(val)) {
          _setError(field, I18N.t("VF_MSG_INVALID_BARCODE"));
          return false;
        }
      } else if (type === "file") {
        var fileObj = field.files && field.files[0];
        if (rules.required && !fileObj) {
          _setError(field, I18N.t("VF_MSG_REQUIRED", { label: label }));
          return false;
        }
        if (fileObj) {
          if (rules.maxSizeMB && fileObj.size > rules.maxSizeMB * 1024 * 1024) {
            _setError(field, I18N.t("VF_MSG_FILE_TOO_LARGE", { max: rules.maxSizeMB }));
            return false;
          }
          if (rules.allowedExtensions) {
            var ext = fileObj.name.split(".").pop().toLowerCase();
            if (rules.allowedExtensions.indexOf(ext) === -1) {
              _setError(field, I18N.t("VF_MSG_FILE_EXT_NOT_ALLOWED"));
              return false;
            }
          }
        }
      } else {
        // text
        if (rules.exactLength !== undefined && val.length !== rules.exactLength) {
          _setError(field, I18N.t("VF_MSG_EXACT_LENGTH", { label: label, len: rules.exactLength }));
          return false;
        }
        if (rules.min !== undefined && val.length < rules.min) {
          _setError(field, I18N.t("VF_MSG_MIN_LENGTH", { label: label, min: rules.min }));
          return false;
        }
        if (rules.max !== undefined && val.length > rules.max) {
          _setError(field, I18N.t("VF_MSG_MAX_LENGTH", { label: label, max: rules.max }));
          return false;
        }
      }

      _setOk(field);
      return true;
    }

    // ═══════════════════════════════════════════════════════════════════
    // VF.validateForm(formConfig) → true إذا كل الحقول صحيحة
    //
    // formConfig: مصفوفة من { fieldId, rules }
    //
    // عند الفشل:
    //   • تُعرض رسائل على جميع الحقول الخاطئة (بدون توالي نوافذ منبثقة)
    //   • يُحرَّك الشاشة تلقائياً لأول حقل خاطئ (Auto Focus + Scroll)
    // ═══════════════════════════════════════════════════════════════════
    function validateForm(formConfig) {
      formConfig = formConfig || [];
      var allOk = true;
      var firstError = null;

      formConfig.forEach(function (cfg) {
        var ok = validate(cfg.fieldId, cfg.rules);
        if (!ok) {
          allOk = false;
          if (!firstError) firstError = cfg.fieldId;
        }
      });

      if (firstError) {
        var el = _el(firstError);
        if (el) {
          el.focus();
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      return allOk;
    }

    // ═══════════════════════════════════════════════════════════════════
    // VF.bind(fieldId, rules) — يربط أحداث input/blur/change بحقل واحد
    // [VF-V2] Smart Validation:
    //   - أثناء الكتابة (input): لو النوع email/phone/date/time/numbersOnly..
    //     إلخ (له صيغة واضحة) يتحقق فورًا بمجرد أن تصبح القيمة "قابلة للحكم"
    //     (مش بيتفرج على كل ضغطة زر وهو لسه ناقص).
    //   - لو الحقل فاضي وهو مطلوب: مفيش رسالة إلا لما يغادر الحقل (blur) أو
    //     يحاول يحفظ — تفاديًا لإزعاج المستخدم وهو لسه بادئ الكتابة.
    // ═══════════════════════════════════════════════════════════════════
    function bind(fieldId, rules) {
      var field = _el(fieldId);
      if (!field) return;

      // نتجنب التكرار
      if (field._vfBound) return;
      field._vfBound = true;

      var realtimeTypes = {
        email: 1, phone: 1, egyptPhone: 1, egyptTelephone: 1, url: 1,
        date: 1, time: 1, numbersOnly: 1, lettersOnly: 1, arabicOnly: 1,
        englishOnly: 1, nationalId: 1, taxNumber: 1, commercialRegistration: 1,
        barcode: 1, qr: 1, decimal: 1, currency: 1, percentage: 1,
      };
      var isRealtime = realtimeTypes[rules && rules.type];

      var runInputCheck = isRealtime
        ? _debounce(function () {
            if ((field.value || "").trim()) validate(fieldId, rules);
            else if (field.classList.contains(CLS_ERR)) _clearState(field);
          }, 250)
        : function () {
            if ((field.value || "").trim() || field.tagName === "SELECT") {
              validate(fieldId, rules);
            } else if (field.classList.contains(CLS_ERR)) {
              // إذا صار الحقل فارغاً وكان فيه خطأ، نُعيد التحقق (ليظهر "مطلوب")
              validate(fieldId, rules);
            }
          };

      field.addEventListener("input", runInputCheck);

      // change: للـ select والـ checkbox/radio
      if (
        field.tagName === "SELECT" ||
        (rules && (rules.type === "checkbox" || rules.type === "radio" || rules.type === "multiSelect"))
      ) {
        field.addEventListener("change", function () {
          validate(fieldId, rules);
        });
      }

      // blur: التحقق الكامل عند مغادرة الحقل (هنا فقط تظهر رسالة "مطلوب"
      // للحقول الفاضية، حتى لا تظهر وهو لسه بادئ الكتابة)
      field.addEventListener("blur", function () {
        validate(fieldId, rules);
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    // VF.bindAll(formConfig) — يربط أحداث كل حقول النموذج
    // ═══════════════════════════════════════════════════════════════════
    function bindAll(formConfig) {
      (formConfig || []).forEach(function (cfg) {
        bind(cfg.fieldId, cfg.rules);
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    // VF.clear / VF.clearForm — تنظيف حالة الحقول
    // ═══════════════════════════════════════════════════════════════════
    function clear(fieldId) {
      var field = _el(fieldId);
      if (field) _clearState(field);
    }

    function clearForm(fieldIds) {
      (fieldIds || []).forEach(function (id) {
        clear(id);
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    // VF.quickSave — غلاف مختصر لاستخدامه داخل دوال الحفظ الحالية
    //
    // الاستخدام:
    //   if (!VF.quickSave([
    //     { fieldId:'cust-modal-name', rules:{ required:true, label:'اسم العميل' } },
    //     { fieldId:'cust-modal-email', rules:{ type:'email', label:'البريد الإلكتروني' } },
    //   ])) return;
    // ═══════════════════════════════════════════════════════════════════
    function quickSave(formConfig) {
      return validateForm(formConfig);
    }

    // ═══════════════════════════════════════════════════════════════════
    // [VF-V2] VF.checkDuplicate(fieldId, opts) — فحص تكرار/كود فريد بشكل
    // Debounced، يستدعي دالة سيرفر عبر google.script.run تُمرَّر صراحة (مفيش
    // أي افتراض لاسم دالة سيرفر معيّن، عشان يفضل عام لأي شاشة).
    //
    // opts = {
    //   label       : اسم الحقل لرسالة الخطأ,
    //   checkFnName : اسم الدالة على السيرفر (تُستدعى عبر _gsr إن وُجد
    //                 wrapper موحّد، وإلا google.script.run مباشرة),
    //   buildArgs   : function(value){ return [...args]; } — تبني آرجيومنتس
    //                 الاستدعاء (مثال: [value, excludeId]),
    //   onResult    : function(isDuplicateBool){} اختياري لمنطق إضافي,
    // }
    // ═══════════════════════════════════════════════════════════════════
    function checkDuplicate(fieldId, opts) {
      var field = _el(fieldId);
      if (!field || !opts || !opts.checkFnName) return;

      var run = _debounce(function () {
        var value = (field.value || "").trim();
        if (!value) {
          _clearState(field);
          return;
        }
        _setChecking(field);
        var args = opts.buildArgs ? opts.buildArgs(value) : [value];
        var caller =
          typeof global._gsr === "function"
            ? global._gsr
            : function (fnName, cbSuccess, cbFail, callArgs) {
                google.script.run
                  .withSuccessHandler(cbSuccess)
                  .withFailureHandler(cbFail)
                  [fnName].apply(null, callArgs);
              };

        caller(
          opts.checkFnName,
          function (isDup) {
            if (isDup) {
              _setError(
                field,
                I18N.t("VF_MSG_DUPLICATE", { label: opts.label || I18N.t("VF_LBL_DEFAULT_FIELD") }),
              );
            } else {
              _setOk(field);
            }
            if (opts.onResult) opts.onResult(isDup);
          },
          function () {
            // فشل الاتصال بالسيرفر — لا نمنع الحفظ محليًا، النسخة النهائية من
            // الفحص تحدث على السيرفر وقت الحفظ الفعلي على أي حال.
            _clearState(field);
          },
          args,
        );
      }, 400);

      field.addEventListener("input", run);
    }

    // ═══════════════════════════════════════════════════════════════════
    // [VF-V2] VF.business — تشغيل قاعدة عمل سيرفر (رصيد/حد ائتمان/فترة
    // سماح/توازن قيد...) عرضًا على شاشة الحفظ. لا تُنفَّذ القاعدة هنا؛
    // فقط تُستدعى دالة سيرفر (تُغلّف ValidationEngine.business.* من
    // Code_36) وتُعرض نتيجتها كرسالة موحّدة، حتى لا تكرر كل شاشة منطق
    // "لو success=false امنع الحفظ واعرض الرسالة".
    //
    // الاستخدام المتوقع من الشاشة:
    //   VF.business.run('runBusinessValidation', ['invoice', payload], function(res){
    //     if (!res.success) return; // الرسالة اتعرضت تلقائيًا
    //     // كمّل حفظ فعلي هنا
    //   });
    // حيث 'runBusinessValidation' دالة .gs بسيطة في الموديول بتنادي
    // ValidationEngine.business.beforeSave(...) وترجع نتيجتها كما هي.
    // ═══════════════════════════════════════════════════════════════════
    var business = {
      run: function (serverFnName, args, onPass) {
        var caller =
          typeof global._gsr === "function"
            ? global._gsr
            : function (fnName, cbSuccess, cbFail, callArgs) {
                google.script.run
                  .withSuccessHandler(cbSuccess)
                  .withFailureHandler(cbFail)
                  [fnName].apply(null, callArgs);
              };

        caller(
          serverFnName,
          function (res) {
            res = res || {};
            if (res.success === false) {
              if (typeof global.showToast === "function") {
                global.showToast(res.message || I18N.t("VF_MSG_BUSINESS_RULE_FAILED"), "error");
              } else {
                alert(res.message || I18N.t("VF_MSG_BUSINESS_RULE_FAILED"));
              }
              return;
            }
            if (res.warning && typeof global.showToast === "function") {
              global.showToast(res.warning, "warning");
            }
            if (onPass) onPass(res);
          },
          function (err) {
            if (typeof global.showToast === "function") {
              global.showToast(I18N.t("VF_MSG_SERVER_ERROR"), "error");
            }
          },
          args || [],
        );
      },
    };

    // ═══════════════════════════════════════════════════════════════════
    // [VF-V2] VF.showSuccess(msg) — رسالة نجاح احترافية موحّدة بعد الحفظ.
    // تستخدم showToast العام لو موجود (نفس نظام SaveEngine)، وإلا fallback.
    // ═══════════════════════════════════════════════════════════════════
    function showSuccess(msg) {
      var text = msg || I18N.t("VF_MSG_SAVE_SUCCESS");
      if (typeof global.showToast === "function") {
        global.showToast(text, "success");
      } else if (typeof global.showSaveAnim === "function") {
        global.showSaveAnim(text);
      } else {
        alert(text);
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // تعريف الأنماط الشائعة — rules جاهزة لإعادة الاستخدام (v2: أضيفت كل
    // الأنواع المطلوبة، بدون تغيير أي نمط قديم كان موجودًا فعليًا)
    // ═══════════════════════════════════════════════════════════════════
    var RULES = {
      requiredText: function (label) {
        return { required: true, type: "text", label: label || I18N.t("VF_LBL_DEFAULT_FIELD") };
      },
      requiredSelect: function (label) {
        return { required: true, type: "select", label: label || I18N.t("VF_LBL_DEFAULT_SELECT") };
      },
      requiredNum: function (label, min, max) {
        return {
          required: true, type: "number",
          label: label || I18N.t("VF_LBL_NUMBER"),
          min: min !== undefined ? min : 0, max: max,
        };
      },
      email: function (req) {
        return { required: !!req, type: "email", label: I18N.t("VF_LBL_EMAIL") };
      },
      phone: function (req) {
        return { required: !!req, type: "phone", label: I18N.t("VF_LBL_PHONE") };
      },
      egyptPhone: function (req) {
        return { required: !!req, type: "egyptPhone", label: I18N.t("VF_LBL_PHONE") };
      },
      egyptTelephone: function (req) {
        return { required: !!req, type: "egyptTelephone", label: I18N.t("VF_LBL_PHONE") };
      },
      url: function (req) {
        return { required: !!req, type: "url", label: I18N.t("VF_LBL_URL") };
      },
      date: function (req) {
        return { required: !!req, type: "date", label: I18N.t("VF_LBL_DATE") };
      },
      time: function (req) {
        return { required: !!req, type: "time", label: I18N.t("VF_LBL_TIME") };
      },
      code: function (label) {
        return { required: true, type: "text", min: 1, max: 50, label: label || I18N.t("VF_LBL_CODE") };
      },
      currency: function (label, req) {
        return { required: !!req, type: "currency", label: label || I18N.t("VF_LBL_AMOUNT") };
      },
      percentage: function (label, req) {
        return { required: !!req, type: "percentage", label: label || I18N.t("VF_LBL_PERCENTAGE") };
      },
      nationalId: function (req) {
        return { required: !!req, type: "nationalId", label: I18N.t("VF_LBL_NATIONAL_ID") };
      },
      taxNumber: function (req) {
        return { required: !!req, type: "taxNumber", label: I18N.t("VF_LBL_TAX_NUMBER") };
      },
      commercialRegistration: function (req) {
        return { required: !!req, type: "commercialRegistration", label: I18N.t("VF_LBL_COMMERCIAL_REG") };
      },
      barcode: function (req) {
        return { required: !!req, type: "barcode", label: I18N.t("VF_LBL_BARCODE") };
      },
      arabicOnly: function (label, req) {
        return { required: !!req, type: "arabicOnly", label: label || I18N.t("VF_LBL_DEFAULT_FIELD") };
      },
      englishOnly: function (label, req) {
        return { required: !!req, type: "englishOnly", label: label || I18N.t("VF_LBL_DEFAULT_FIELD") };
      },
      password: function () {
        return { required: true, type: "text", min: 8, label: I18N.t("VF_LBL_PASSWORD") };
      },
      file: function (allowedExtensions, maxSizeMB, req) {
        return {
          required: !!req, type: "file",
          allowedExtensions: allowedExtensions, maxSizeMB: maxSizeMB || 5,
          label: I18N.t("VF_LBL_FILE"),
        };
      },
      image: function (maxSizeMB, req) {
        return {
          required: !!req, type: "file",
          allowedExtensions: ["jpg", "jpeg", "png", "gif", "webp"],
          maxSizeMB: maxSizeMB || 5, label: I18N.t("VF_LBL_IMAGE"),
        };
      },
    };

    // ══════════════════════════════════════════════════════════════════
    // §PW — Password Policy (نسخة عرض/UX طرفية — المرجع الملزم يبقى
    // PASSWORD_POLICY + _validatePasswordStrength في Code_12_Core.js).
    // [PW-UNIFY] هذا هو المكان الوحيد المفروض لمنطق تقييم قوة كلمة المرور
    // على مستوى العميل — كان مكرر حرفيًا في 3 ملفات (02, 08, 39).
    // ══════════════════════════════════════════════════════════════════
    var PASSWORD_POLICY = {
      MIN_LENGTH: 8,
      REQUIRE_NUMBER: true,
      REQUIRE_UPPER: true,
      REQUIRE_LOWER: true,
      REQUIRE_SPECIAL: true,
    };

    // نفس قائمة كلمات المرور الشائعة الممنوعة في Code_12_Core.js —
    // موجودة هنا فقط لعرض تحذير فوري للمستخدم، التحقق الملزم في السيرفر.
    var PASSWORD_BANNED = [
      "password", "Password1!", "123456", "admin123",
      "Admin123!", "12345678", "qwerty", "abc123", "Aa123456!",
    ];

    /**
     * checkPasswordRequirements — يرجّع حالة كل شرط من شروط PASSWORD_POLICY
     * بشكل موحّد (len/upper/lower/num/special/banned/match) عشان تُستخدم
     * في أي شاشة (checklist حي + شريط قوة) بدل التكرار.
     * @param {string} pw كلمة المرور الجديدة
     * @param {string} [confirmPw] كلمة المرور للتأكيد (اختياري)
     * @returns {object} حالة كل شرط + عدد المستوفى + allOk
     */
    function checkPasswordRequirements(pw, confirmPw) {
      pw = pw || "";
      var state = {
        len: pw.length >= PASSWORD_POLICY.MIN_LENGTH,
        upper: !PASSWORD_POLICY.REQUIRE_UPPER || /[A-Z]/.test(pw),
        lower: !PASSWORD_POLICY.REQUIRE_LOWER || /[a-z]/.test(pw),
        num: !PASSWORD_POLICY.REQUIRE_NUMBER || /\d/.test(pw),
        special:
          !PASSWORD_POLICY.REQUIRE_SPECIAL ||
          /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(pw),
        banned:
          pw.length > 0 &&
          (PASSWORD_BANNED.indexOf(pw) !== -1 ||
            PASSWORD_BANNED.indexOf(pw.toLowerCase()) !== -1),
      };
      var passCount = 0;
      ["len", "upper", "lower", "num", "special"].forEach(function (k) {
        if (state[k]) passCount++;
      });
      state.passCount = passCount;
      state.totalChecks = 5;
      if (confirmPw !== undefined) {
        state.match = !!pw && pw === confirmPw;
      }
      state.allOk =
        passCount === 5 &&
        !state.banned &&
        (confirmPw === undefined || state.match);
      return state;
    }

    /**
     * passwordStrengthMeta — يحوّل passCount (0-5) إلى {pct, color, label}
     * موحّد لعرض شريط القوة، عشان الألوان/التسميات متطابقة في كل الشاشات.
     */
    function passwordStrengthMeta(passCount, pwLength) {
      pwLength = pwLength === undefined ? passCount : pwLength;
      if (!pwLength) return { pct: 0, color: "#e5e7eb", label: "—" };
      var levels = [
        { color: "#ef4444", label: I18N.t("VF_PW_WEAK") },
        { color: "#ef4444", label: I18N.t("VF_PW_WEAK") },
        { color: "#eab308", label: I18N.t("VF_PW_MEDIUM") },
        { color: "#22c55e", label: I18N.t("VF_PW_STRONG") },
        { color: "#16a34a", label: I18N.t("VF_PW_VERY_STRONG") },
      ];
      var idx = Math.max(0, Math.min(passCount, 5) - 1);
      var lvl = levels[idx] || levels[0];
      return { pct: (passCount / 5) * 100, color: lvl.color, label: lvl.label };
    }

    // ─── تصدير الـ namespace العام ───────────────────────────────────────
    global.VF = {
      validate: validate,
      validateForm: validateForm,
      bind: bind,
      bindAll: bindAll,
      clear: clear,
      clearForm: clearForm,
      quickSave: quickSave,
      checkDuplicate: checkDuplicate,
      business: business,
      showSuccess: showSuccess,
      RULES: RULES,
      passwordPolicy: PASSWORD_POLICY,
      checkPasswordRequirements: checkPasswordRequirements,
      passwordStrengthMeta: passwordStrengthMeta,
    };
  })(window);
</script>


    <!-- JavaScript — جزء 1/13: أساسيات + صلاحيات + State + Router + Cache + Session + Auth -->
    <script>
  // ═══════════════════════════════════════════════════════════════════
  // 01_JS_Core_Auth.html — الملف الموحّد (v5)
  // دُمج مع Core_Auth_Extensions.html بتاريخ التوحيد

  // ═══════════════════════════════════════════════════════════════
  // [PERF-LAZY-LOAD] تحميل مرحلي لباقي موديولات النظام بعد اللوجين
  // ═══════════════════════════════════════════════════════════════
  // المشكلة اللي بيحلّها الكود ده: doGet كان بيحقن ~6.5 ميجا نص
  // (كل ملفات الـ CSS/JS لكل موديولات النظام) في نفس صفحة اللوجين
  // من الأول. بما إن HtmlService مبيعملش streaming، المتصفح ما
  // بيرسمش ولا حاجة (ولا حتى شاشة الـ Splash) لحد ما السيرفر يخلص
  // بناء الصفحة الضخمة دي ويبعتها كاملة — ده كان بيسبب شاشة سودا
  // تفضل لعدة ثواني قبل ما اللوجين يظهر.
  //
  // الحل: Index.html بقى بيحقن بس الملفات الضرورية لشاشة اللوجين
  // والـ Shell الأساسي، وباقي كل الموديولات (المحاسبة/HR/التصنيع/
  // الفواتير/الواتساب...) بتتحمل من هنا (getLazyAppBundle في
  // Code_12_Core.gs) في الخلفية، بمجرد ما الصفحة تترسم — يعني
  // غالبًا وهي المستخدم لسه بيكتب بياناته في شاشة اللوجين، فبيكون
  // التحميل خلص خلاص لما يضغط "دخول".
  //
  // window.__LAZY_READY__ : true بعد ما الحزمة المؤجلة تتحقن بنجاح.
  // window.__LAZY_PENDING_CB__ : طابور callbacks تتنفذ أوتوماتيك
  //   بمجرد ما التحميل يخلص (مستخدمة من renderPage() تحت).
  function _loadLazyAppBundle() {
    if (window.__LAZY_READY__ || window.__LAZY_LOADING__) return;
    window.__LAZY_LOADING__ = true;

    function _finish(errMsg) {
      window.__LAZY_READY__ = true;
      window.__LAZY_LOADING__ = false;
      if (errMsg) console.warn("Lazy bundle load issue:", errMsg);
      var queue = window.__LAZY_PENDING_CB__ || [];
      window.__LAZY_PENDING_CB__ = [];
      queue.forEach(function (cb) {
        try {
          cb();
        } catch (e) {
          console.warn("Lazy pending callback error:", e);
        }
      });
    }

    try {
      google.script.run
        .withSuccessHandler(function (bundle) {
          try {
            if (bundle && bundle.css) {
              var styleEl = document.createElement("style");
              styleEl.setAttribute("data-lazy-bundle", "css");
              styleEl.textContent = bundle.css;
              document.head.appendChild(styleEl);
            }
            // [FIX-AUDIT-2026] بعض الملفات فيها عناصر HTML حقيقية (زي
            // <template id="tpl-upload-modal">) لازم تتحقن كـ DOM فعلي
            // مش كنص جوه سكريبت — لازم تتحقن قبل الـ JS اللي بيدور عليها.
            if (bundle && bundle.html) {
              document.body.insertAdjacentHTML("beforeend", bundle.html);
            }
            if (bundle && bundle.js) {
              var scriptEl = document.createElement("script");
              scriptEl.setAttribute("data-lazy-bundle", "js");
              scriptEl.textContent = bundle.js;
              document.body.appendChild(scriptEl);
            }
            _finish();
          } catch (e) {
            // ✅ حتى لو حصل خطأ جزئي في الحقن، لازم نفك القفل عشان
            // المستخدم يقدر يكمل (بدل ما يفضل عالق على "جاري التجهيز")
            _finish("inject error: " + e.message);
          }
        })
        .withFailureHandler(function (err) {
          _finish("google.script.run error: " + (err && err.message));
        })
        .getLazyAppBundle();
    } catch (e) {
      _finish("exception: " + e.message);
    }
  }

  // ✅ نبدأ التحميل فورًا مع أول DOMContentLoaded (بالتوازي مع ظهور
  // شاشة اللوجين) — راجع استدعاء _loadLazyAppBundle() في بداية
  // Bootstrap تحت.

  // ✅ [PERF-LAZY-LOAD] بينتظر جاهزية الحزمة المؤجلة قبل تنفيذ أي
  // كود محتاج موديولات لسه متحملتش، وبيعرض overlay التحميل الموجود
  // أصلاً (_showAppLoader) بدل ما يفضل عالق أو يرمي ReferenceError.
  function _whenLazyReady(cb) {
    if (window.__LAZY_READY__) {
      cb();
    } else {
      window.__LAZY_PENDING_CB__ = window.__LAZY_PENDING_CB__ || [];
      window.__LAZY_PENDING_CB__.push(cb);
    }
  }

  /**
   * هل المستخدم الحالي لديه صلاحية لعملية معينة؟
   * @param {string} action - اسم العملية (مثال: "deleteItem")
   * @returns {boolean}
   */
  function canDo(action) {
    if (!APP.currentUser) return false;

    var role = String(APP.currentUser.role || "viewer");

    // ✅ BUG-5 FIX: استخدم effectivePermissions لو متاحة (تشمل overrides من الـ backend)
    // قبل الإصلاح: كان بيعتمد على ROLE_PERMISSIONS الثابتة فقط ويتجاهل extra/denied
    if (
      APP.currentUser.effectivePermissions &&
      Array.isArray(APP.currentUser.effectivePermissions)
    ) {
      if (APP.currentUser.effectivePermissions.indexOf(action) !== -1)
        return true;
      // ✅ [FIX-ADMIN-LOCK] لو الدور admin والصلاحية غير موجودة في effectivePermissions
      // (مثلاً لأن الكاش في الباك إند لسه قديم بعد إضافة صلاحية جديدة، أو القائمة
      // الثابتة ROLE_PERMISSIONS.admin مش متزامنة 100% مع ALL_PERMISSIONS)، الأدمن
      // بحكم تعريفه لازم يكون عنده كل الصلاحيات دايماً ولا يتحجب عن أي شاشة جديدة.
      if (role === "admin") return true;
      return false;
    }

    // fallback للـ ROLE_PERMISSIONS لو effectivePermissions مش موجودة أصلاً
    if (role === "admin") return true; // الأدمن دايماً صاحب كل الصلاحيات

    return perms.indexOf(action) !== -1;

  function hideIfNoPermission(elId, action) {
    var el = document.getElementById(elId);

  /**
   * يُعيد HTML لعنصر مع إضافة disabled + tooltip لو ما في صلاحية
   * @param {string} html   - الـ HTML الأصلي للزر
   * @param {string} action - اسم العملية
   * @returns {string}
   */
  function withPermission(html, action) {
    if (!canDo(action)) {
      // بدّل btn-primary وbtn-danger بـ btn-ghost + disabled
      return html
        .replace(
          /class="btn([^"]*)"/,
          'class="btn$1" disabled title="' +
            I18N.t("AUTH_TOOLTIP_NO_PERMISSION") +
            '" style="opacity:0.4;cursor:not-allowed"',
        )
        .replace(
          /onclick="[^"]*"/,
          "onclick=\"event.preventDefault();showToast('" +
            I18N.t("AUTH_MSG_NO_PERMISSION_ACTION") +
            "','error')\"",
        );
    }
    return html;
  }

  /**
   * يعرض رسالة خطأ الصلاحيات بدلاً من تنفيذ الدالة

  function requirePermission(action, callback) {
    if (!canDo(action)) {
      showToast(
        I18N.t("AUTH_MSG_NO_PERMISSION_PREFIX") + " " + action,
        "error",
      );
      return false;
    }
    if (callback) callback();
    return true;
  }

  // إخفاء شريط تحذير Google Apps Script تلقائياً
  // ═══════════════════════════════════════════════════════════
  (function _dismissGoogleBanner() {
    var _observer = new MutationObserver(function () {
      // زرار الإغلاق في الشريط الأصفر من Google
      var btn = document.querySelector(
        "a.dismiss-button, button.dismiss-button, [data-id='dismiss-button']",
      );
      if (btn) {
        btn.click();
        _observer.disconnect();
        return;
      }

      // بحث بالنص أو الـ aria-label (fallback)
      var allBtns = document.querySelectorAll("a, button, div[role='button']");
      for (var i = 0; i < allBtns.length; i++) {
        var el = allBtns[i];
        var txt = (el.textContent || "").trim();
        var lbl = (el.getAttribute("aria-label") || "").toLowerCase();
        if (
          txt === "×" ||
          txt === "Dismiss" ||
          lbl === "dismiss" ||
          lbl === "close"
        ) {
          var par = el.parentElement;
          var isGoogleBanner = false;
          while (par && par !== document.body) {
            var st = par.getAttribute("style") || "";
            if (
              st.indexOf("position: fixed") !== -1 ||
              st.indexOf("position:fixed") !== -1
            ) {
              if (par.id !== "root" && !par.closest("#root")) {
                isGoogleBanner = true;
              }
              break;
            }
            par = par.parentElement;
          }
          if (isGoogleBanner) {
            el.click();
            _observer.disconnect();
            return;
          }
        }
      }
    });
    _observer.observe(document.documentElement, {
      childList: true,
      subtree: true,
    });
    setTimeout(function () {
      _observer.disconnect();
    }, 10000);
  })();

    _loadLazyAppBundle();

    if (window.__PREFETCH__) {
      try {
        // items = الـ getAllData() كاملة محقونة من doGet
        if (window.__PREFETCH__.items && window.__PREFETCH__.items.items) {
          var pd = _parseData(window.__PREFETCH__.items);
          _saveCache(pd);
          APP.data = pd;
          // مزامنة الإعدادات والألوان

            }
          }
          if (typeof _syncColorsFromData === "function") {
            _syncColorsFromData();

        // users محقونين برضو
        if (
          window.__PREFETCH__.users &&

          APP._prefetchedUsers = window.__PREFETCH__.users.users;

    // ⚠️ [PERF-FIX-BLACKSCREEN] كان في السابق بيتم إخفاء الـ Splash هنا
    // فورًا (قبل render())، لكن render() نفسها بتستنى I18N.bootstrap
    // (نداء سيرفر async لجلب قاموس اللغة) قبل ما ترسم شاشة اللوجين.
    // ده كان بيسيب فجوة زمنية: الشعار يختفي، لكن شاشة اللوجين لسه ما
    // اترسمتش → شاشة سودا فاضية بينهم. الحل: سيبنا الشعار شغال وهنخفيه
    // بعد ما render() فعليًا ترسم المحتوى (شوف _hideSplash() تحت).
    function _hideSplash() {
      var splash = document.getElementById("app-splash");
      if (!splash) return;
      splash.style.opacity = "0";
      setTimeout(function () {
        if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      }, 300);
    }

    // ── [I18N] تحميل قاموس اللغة قبل أول رسم للصفحة — لازم يحصل هنا
    // (مش بس بعد نجاح اللوجين) عشان شاشة تسجيل الدخول نفسها، وكمان حالة
    // استعادة جلسة قديمة بعد Reload، تتترجم صح من أول لحظة. المستخدم هنا
    // ممكن يكون null (لسه ملوّجش) — الباك-إند (resolveUserLanguage) بيرجع
    // اللغة الافتراضية للنظام في الحالة دي تلقائيًا.
    if (typeof I18N !== "undefined") {
      I18N.bootstrap(
        APP.currentUser ? APP.currentUser.username : null,
        SESSION ? SESSION.token : null,
        function () {
          render();
          _hideSplash();
          _startPrefetch();
        },
      );
    } else {
      render();
      _hideSplash();
      _startPrefetch();
    }
  });

  function render(skipDataCheck) {
    var root = document.getElementById("root");
    if (!APP.currentUser) {
      // ✅ [SEC] امسح أي بيانات جلسة قديمة قبل عرض شاشة الدخول

        localStorage.removeItem("wms_session_idle_min");
        sessionStorage.removeItem("wms_cache_static");
        sessionStorage.removeItem("wms_cache_dynamic");
        sessionStorage.removeItem("wms_cache");
        SESSION.token = null;
        SESSION.expiresAt = null;
      } catch (e) {}
      root.innerHTML = renderLogin();
      bindLogin();
      return;

    // ✅ [FIX-LAZY-LAYOUT] renderLayout() بينادي alertCount() اللي بينادي
    // getItemColors() — دالة معرّفة في 03_JS_Dashboard_Items.html (lazy).

    if (!window.__LAZY_READY__) {

  // ══════════════════════════════════════════════════════════════
  // 🗂️ ExportUtil — أداة التصدير المركزية (CSV / Excel / Print)
  // ══════════════════════════════════════════════════════════════
  window.ExportUtil = {
    /** تصدير CSV */
    toCSV: function (data, headers, filename) {
      var bom = "\uFEFF";
      var rows = [headers.join(",")];
      data.forEach(function (row) {
        rows.push(
          row
            .map(function (cell) {
              var v = cell === null || cell === undefined ? "" : String(cell);
              if (
                v.indexOf(",") > -1 ||
                v.indexOf('"') > -1 ||
                v.indexOf("\n") > -1
              ) {
                v = '"' + v.replace(/"/g, '\"\"') + '"';
              }
              return v;
            })
            .join(","),
        );
      });
      var blob = new Blob([bom + rows.join("\n")], {
        type: "text/csv;charset=utf-8;",
      });
      ExportUtil._download(blob, (filename || "export") + ".csv");
      typeof showToast === "function" && showToast("تم تصدير CSV ✓", "success");
    },

    /** تصدير Excel (XLSX) */
    toExcel: function (data, headers, filename, sheetName) {
      if (!window.XLSX) {
        typeof showToast === "function" &&
          showToast("مكتبة Excel غير محملة", "error");
        return;
      }
      var ws = XLSX.utils.aoa_to_sheet([headers].concat(data));
      var colWidths = headers.map(function (h, i) {
        var max = h.length;
        data.forEach(function (row) {
          var cell =
            row[i] !== null && row[i] !== undefined ? String(row[i]) : "";
          if (cell.length > max) max = cell.length;
        });
        return { wch: Math.min(max + 2, 40) };
      });
      ws["!cols"] = colWidths;
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName || "بيانات");
      XLSX.writeFile(wb, (filename || "export") + ".xlsx");
      typeof showToast === "function" &&
        showToast("تم تصدير Excel ✓", "success");
    },

    /** طباعة / PDF */
    toPrint: function (data, headers, title, subtitle) {
      // [SEC-FIX] دالة escape محلية للنافذة المنبثقة — تحمي من XSS في document.write
      function _esc(v) {
        return String(v == null ? "" : v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      var rows = data
        .map(function (row) {
          return (
            "<tr>" +
            row
              .map(function (cell) {
                return "<td>" + _esc(cell) + "</td>";
              })
              .join("") +
            "</tr>"
          );
        })
        .join("");
      var heads = headers
        .map(function (h) {
          return "<th>" + _esc(h) + "</th>";
        })
        .join("");
      var safeTitle = _esc(title || "تقرير");
      var safeSubtitle = subtitle ? _esc(subtitle) : "";
      var html = [
        "<!DOCTYPE html><html dir='rtl' lang='ar'>",
        "<head><meta charset='UTF-8'>",
        "<title>" + safeTitle + "</title>",
        "<style>",
        "  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:12px;margin:20px;color:#1e293b;direction:rtl}",
        "  h1{font-size:18px;margin:0 0 4px;color:#0f172a}",
        "  p.sub{color:#64748b;font-size:11px;margin:0 0 16px}",
        "  table{width:100%;border-collapse:collapse;margin-top:8px}",
        "  th{background:#1e40af;color:#fff;padding:8px 10px;text-align:right;font-size:11px}",
        "  td{padding:6px 10px;border-bottom:1px solid #e2e8f0;font-size:11px}",
        "  tr:nth-child(even) td{background:#f8fafc}",
        "  .footer{margin-top:16px;font-size:10px;color:#94a3b8;text-align:center}",
        "  @media print{button{display:none!important}}",
        "</style></head><body>",
        "<h1>" + safeTitle + "</h1>",
        safeSubtitle ? "<p class='sub'>" + safeSubtitle + "</p>" : "",
        "<table><thead><tr>" +
          heads +
          "</tr></thead><tbody>" +
          rows +
          "</tbody></table>",
        "<div class='footer'>تاريخ الطباعة: " +
          new Date().toLocaleString("en-US") +
          " — MOO.ERP</div>",
        "<button onclick='window.print()' style='margin-top:14px;padding:8px 20px;background:#1e40af;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px'>🖨️ طباعة</button>",
        "</body></html>",
      ].join("");
      var w = window.open("", "_blank");
      if (!w) {
        typeof showToast === "function" &&
          showToast("فعّل النوافذ المنبثقة", "warning");
        return;
      }
      w.document.write(html);
      w.document.close();
      w.focus();
      // [AUDIO-EXPAND] لا يوجد showToast نجاح لعملية الطباعة، فنشغّل الصوت مباشرة
      if (typeof AS !== "undefined") {
        try {
          AS.print();
        } catch (e) {}
      }
      setTimeout(function () {
        w.print();
      }, 600);
    },

    _download: function (blob, filename) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 1000);
    },

    /**
     * ينشئ زر تصدير Dropdown (Excel / CSV / طباعة)
     * @param {Object} opts
     *   opts.getData    — function() ترجع { headers:[], rows:[[]] }
     *   opts.filename   — اسم الملف بدون امتداد
     *   opts.title      — عنوان طباعة
     *   opts.subtitle   — تفاصيل طباعة
     *   opts.label      — نص الزر (default: "تصدير")
     *   opts.btnClass   — CSS classes إضافية للزر
     */
    createDropdown: function (opts) {
      var uid = "xdd" + Math.random().toString(36).slice(2, 7);
      var label = opts.label || "تصدير";
      var wrapper = document.createElement("div");
      wrapper.style.cssText = "position:relative;display:inline-block";
      wrapper.innerHTML =
        '<button id="' +
        uid +
        '" class="btn btn-outline btn-sm ' +
        (opts.btnClass || "") +
        '" ' +
        'style="display:flex;align-items:center;gap:6px">' +
        '  <i class="ti ti-download" style="font-size:14px"></i>' +
        label +
        '  <i class="ti ti-chevron-down" style="font-size:11px;margin-right:2px"></i>' +
        "</button>" +
        '<div id="' +
        uid +
        '-menu" style="display:none;position:absolute;top:calc(100% + 4px);' +
        "left:0;min-width:168px;background:var(--surface);border:1px solid var(--border);" +
        'border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;overflow:hidden;padding:4px 0">' +
        '  <button data-fmt="excel" class="_xdd-item">' +
        '    <i class="ti ti-file-spreadsheet" style="color:#10b981"></i> Excel (.xlsx)</button>' +
        '  <button data-fmt="csv" class="_xdd-item">' +
        '    <i class="ti ti-file-text" style="color:#3b82f6"></i> CSV (.csv)</button>' +
        '  <div style="height:1px;background:var(--border);margin:3px 10px"></div>' +
        '  <button data-fmt="print" class="_xdd-item">' +
        '    <i class="ti ti-printer" style="color:#8b5cf6"></i> طباعة / PDF</button>' +
        "</div>";

      var itemStyle =
        "width:100%;text-align:right;padding:9px 14px;background:none;border:none;" +
        "cursor:pointer;font-size:13px;color:var(--text1);display:flex;align-items:center;gap:8px;";
      wrapper.querySelectorAll("._xdd-item").forEach(function (b) {
        b.style.cssText = itemStyle;
        b.addEventListener("mouseenter", function () {
          b.style.background = "var(--surface2)";
        });
        b.addEventListener("mouseleave", function () {
          b.style.background = "none";
        });
      });

      var btn = wrapper.querySelector("#" + uid);
      var menu = wrapper.querySelector("#" + uid + "-menu");

      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        var isOpen = menu.style.display === "block";
        document.querySelectorAll("[data-xdd-open]").forEach(function (m) {
          m.style.display = "none";
          m.removeAttribute("data-xdd-open");
        });
        if (!isOpen) {
          menu.style.display = "block";
          menu.setAttribute("data-xdd-open", "1");
        }
      });

      menu.addEventListener("click", function (e) {
        var b = e.target.closest("[data-fmt]");
        if (!b) return;
        menu.style.display = "none";
        menu.removeAttribute("data-xdd-open");
        var fmt = b.dataset.fmt;
        try {
          var d = opts.getData();
          if (!d || !d.rows || !d.rows.length) {
            typeof showToast === "function" &&
              showToast("لا توجد بيانات للتصدير", "warning");
            return;
          }
          if (fmt === "excel")
            ExportUtil.toExcel(
              d.rows,
              d.headers,
              opts.filename,
              opts.sheetName,
            );
          else if (fmt === "csv")
            ExportUtil.toCSV(d.rows, d.headers, opts.filename);
          else if (fmt === "print")
            ExportUtil.toPrint(d.rows, d.headers, opts.title, opts.subtitle);
        } catch (err) {
          typeof showToast === "function" &&
            showToast("خطأ في التصدير: " + err.message, "error");
        }
      });

      document.addEventListener("click", function () {
        if (menu.style.display === "block") {
          menu.style.display = "none";
          menu.removeAttribute("data-xdd-open");
        }
      });

      return wrapper;
    },
  };
</script>

RULE 1 — ممنوع استدعاء google.script.run مباشرة من أي شاشة

RULE 3 — ممنوع parsing أو mapping داخل الـ UI/Template

   ❌ غلط: innerHTML داخل withSuccessHandler مباشرة مع منطق معقد

RULE 4 — كل شاشة بيانات لازم تعرض loading / error / empty
   ✅ استخدم DataModule.create({ containerId, onRender })

RULE 5 — أي endpoint جديد يُضاف في Repository المناسب أولاً
   ثم يُستدعى من الشاشة عبر DL.ModuleName.method()

RULE 6 — ممنوع res.success=false يُترك بدون UI feedback

  // طبقتين متوازيتين بنفس الفلسفة (SaveEngine لواجهة الحفظ + DataLayer لطلبات
  // الباك-إند) بدون أي تكامل بينهما — الآن SaveEngine طبقة UI فقط (validation +
  // spinner + toast + dirty-tracking) فوق _gsr، ومفيش أي منطق retry/timeout
  // مكرر. يجب تحميل 31_JS_DataLayer.html قبل هذا الملف مباشرة في Index.html.
  //
  // المحتوى:
  //   §SE-1  الثوابت الموحّدة (حالات + نصوص)
  //   §SE-2  Logger            — تسجيل كل عملية حفظ
  //   §SE-3  ValidationService — تحقق موحّد + تظليل الحقول
  //   §SE-4  LoadingService    — طبقة الحفظ الناعمة (Soft Save)
  //   §SE-5  NotificationService — واجهة موحّدة فوق showToast الموجودة
  //   §SE-6  SaveButtonController — إدارة حالة الزر (spinner / disable / dirty)
  //   §SE-7  DirtyTracker      — كشف التغييرات (Dirty State)
  //   §SE-8  SaveEngine.run()  — المنسّق الرئيسي لكامل الـ workflow (فوق _gsr)
  //   §SE-9  قواعد المطوّر (لا يجوز كسرها)
  // ══════════════════════════════════════════════════════════════════════════

  // ─────────────────────────────────────────────────────────────
  // §SE-1  SAVE_STATES + رسائل موحّدة — ممنوع اختراع نصوص جديدة في أي شاشة
  // ─────────────────────────────────────────────────────────────
  var SAVE_STATES = {
    IDLE: "idle",
    VALIDATING: "validating",
    SAVING: "saving",
    SUCCESS: "success",
    FAILED: "failed",
    RETRY: "retry",
    CANCELLED: "cancelled",
    TIMEOUT: "timeout",
  };

  /** النصوص الموحّدة — يُمنع أي شاشة تكتب "جاري التحديث/المعالجة/الإرسال..." بدلها */
  var SAVE_MESSAGES = {
    SAVING: "⏳ جاري الحفظ...",
    SAVED: "✅ تم الحفظ بنجاح",
    FAILED: "❌ فشل الحفظ",
    RETRYING: "🔄 إعادة المحاولة...",
    VALIDATION_FAILED: "⚠️ برجاء مراجعة البيانات المدخلة",
    CONNECTION_LOST: "🔌 انقطع الاتصال بالخادم",
    TIMEOUT: "⌛ استغرقت العملية وقتاً طويلاً، حاول مرة أخرى",
    NOTHING_TO_SAVE: "لا يوجد تغييرات لحفظها",
  };

  // ─────────────────────────────────────────────────────────────
  // §SE-2  Logger — سجل مركزي لكل عمليات الحفظ في النظام
  // يُخزَّن في الذاكرة (آخر 200 عملية) + console، ويمكن ربطه بالـ backend
  // لاحقاً عبر SaveEngineConfig.remoteLog
  // ─────────────────────────────────────────────────────────────
  var SaveLogger = (function () {
    var _buffer = [];
    var MAX = 200;

    function _push(entry) {
      _buffer.push(entry);
      if (_buffer.length > MAX) _buffer.shift();
      var tag = "[SaveEngine:" + entry.phase + "]";
      if (entry.phase === "error") console.error(tag, entry);
      else console.log(tag, entry);
    }

    return {
      start: function (ctx) {
        ctx._startedAt = Date.now();
        _push({
          phase: "start",
          entity: ctx.entity,
          screen: ctx.screen,
          recordId: ctx.recordId || null,
          user: (typeof SESSION !== "undefined" && SESSION.user) || null,
          at: new Date().toISOString(),
        });
      },
      end: function (ctx, success, message) {
        var duration = Date.now() - (ctx._startedAt || Date.now());
        _push({
          phase: success ? "end" : "error",
          entity: ctx.entity,
          screen: ctx.screen,
          recordId: ctx.recordId || null,
          success: success,
          message: message || "",
          durationMs: duration,
          retries: ctx._retries || 0,
          at: new Date().toISOString(),
        });
        return duration;
      },
      retry: function (ctx, attempt) {
        ctx._retries = attempt;
        _push({
          phase: "retry",
          entity: ctx.entity,
          screen: ctx.screen,
          attempt: attempt,
          at: new Date().toISOString(),
        });
      },
      dump: function () {
        return _buffer.slice();
      },
    };
  })();

  // ─────────────────────────────────────────────────────────────
  // §SE-3  ValidationService — تحقق موحّد
  //
  // rules: [{ field: "sinv-party", label: "اسم العميل", required: true },
  //         { field: "sinv-date",  label: "تاريخ الفاتورة", required: true },
  //         { test: function(){ return lines.length>0; }, message: "أضف بنوداً" }]
  // ─────────────────────────────────────────────────────────────
  var ValidationService = {
    /**
     * @returns {{valid:boolean, firstInvalidEl:?HTMLElement, message:?string}}
     */
    validate: function (rules) {
      rules = rules || [];
      this.clearHighlights(rules);
      for (var i = 0; i < rules.length; i++) {
        var r = rules[i];
        var ok;
        var el = r.field ? document.getElementById(r.field) : null;

        if (typeof r.test === "function") {
          ok = !!r.test();
        } else if (el) {
          var val = (el.value || "").toString().trim();
          ok = r.required ? val.length > 0 : true;
          if (ok && r.pattern) ok = r.pattern.test(val);
          if (ok && typeof r.validate === "function") ok = !!r.validate(val);
        } else {
          ok = true; // الحقل غير موجود في الصفحة الحالية — تجاهل
        }

        if (!ok) {
          var msg = r.message || "برجاء إدخال " + (r.label || "بيانات صحيحة");
          if (el) {
            el.classList.add("field-invalid");
            el.style.outline = "2px solid #ef4444";
            el.style.outlineOffset = "1px";
          }
          return { valid: false, firstInvalidEl: el, message: msg };
        }
      }
      return { valid: true, firstInvalidEl: null, message: null };
    },

    clearHighlights: function (rules) {
      (rules || []).forEach(function (r) {
        if (!r.field) return;
        var el = document.getElementById(r.field);
        if (el) {
          el.classList.remove("field-invalid");
          el.style.outline = "";
          el.style.outlineOffset = "";
        }
      });
    },

    focusFirstInvalid: function (el) {
      if (!el) return;
      try {
        el.focus();
        el.scrollIntoView({ behavior: "smooth", block: "center" });
      } catch (e) {}
    },
  };

  // ─────────────────────────────────────────────────────────────
  // §SE-4  LoadingService — Soft Save طبقة موحّدة
  //
  // لا تُجمّد الصفحة أبداً (لا overlay كامل الشاشة يمنع scroll) — تستخدم
  // محرك التحميل الموحّد الوحيد على مستوى السيستم: showSaveAnim/_closeSaveAnim
  // (معرّف في 01_JS_Core_Auth.html §F). _freezeUI/_unfreezeUI (02_JS_UI_Shell)
  // بقيا alias فوق نفس المحرك، فمفيش نظامين متوازيين تاني.
  // ─────────────────────────────────────────────────────────────
  var LoadingService = {
    show: function (message) {
      if (typeof showSaveAnim === "function") {
        showSaveAnim({ title: message || SAVE_MESSAGES.SAVING });
      } else if (typeof _freezeUI === "function") {
        _freezeUI(message || SAVE_MESSAGES.SAVING);
      } else if (typeof showLoading === "function") {
        showLoading(message || SAVE_MESSAGES.SAVING);
      }
      // ملاحظة: عمداً لا يوجد أي pointer-events:none على body — المستخدم
      // يقدر يكمل Scroll وقراءة باقي الشاشة أثناء الحفظ (Soft Save).
    },
    hide: function () {
      if (typeof _closeSaveAnim === "function") _closeSaveAnim(false);
      else if (typeof _unfreezeUI === "function") _unfreezeUI();
      else if (typeof hideLoading === "function") hideLoading();
    },
  };

  // ─────────────────────────────────────────────────────────────
  // §SE-5  NotificationService — واجهة موحّدة فوق showToast
  // نفس الأسلوب في كل الشاشات: نجاح / تحذير / خطأ / معلومة
  // ─────────────────────────────────────────────────────────────
  var NotificationService = {
    success: function (msg) {
      this._emit(msg || SAVE_MESSAGES.SAVED, "success");
    },
    warning: function (msg) {
      this._emit(msg, "warning");
    },
    error: function (msg) {
      this._emit(msg || SAVE_MESSAGES.FAILED, "error");
    },
    info: function (msg) {
      this._emit(msg, "info");
    },
    _emit: function (msg, type) {
      if (typeof showToast === "function") showToast(msg, type);
      else console.log("[Notify:" + type + "] " + msg);
    },
  };

  // ─────────────────────────────────────────────────────────────
  // §SE-6  SaveButtonController — سلوك زر الحفظ موحّد في كل الشاشات
  //
  // usage:
  //   var ctrl = SaveButtonController.attach("sinv-save-btn");
  //   ctrl.setSaving();     // spinner + disable + منع double-click
  //   ctrl.restore();       // إعادة الحالة الأصلية (نجاح أو فشل)
  // ─────────────────────────────────────────────────────────────
  var SaveButtonController = {
    attach: function (buttonId) {
      return this._build(document.getElementById(buttonId));
    },

    /** نفس attach لكن بتاخد عنصر DOM جاهز بدل الـ id — لشاشات فيها الزر متغيّر محلي (var saveBtn = ...) */
    attachEl: function (btnEl) {
      return this._build(btnEl);
    },

    _build: function (btn) {
      var originalHtml = btn ? btn.innerHTML : "";
      var busy = false;

      return {
        isBusy: function () {
          return busy;
        },
        setSaving: function (label) {
          if (!btn || busy) return false; // يمنع الـ double-click فعلياً
          busy = true;
          originalHtml = btn.innerHTML;
          btn.disabled = true;
          btn.setAttribute("aria-busy", "true");
          btn.innerHTML =
            '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite"></i> ' +
            "<span>" +
            (label || SAVE_MESSAGES.SAVING) +
            "</span>";
          return true;
        },
        restore: function () {
          if (!btn) {
            busy = false;
            return;
          }
          btn.disabled = false;
          btn.removeAttribute("aria-busy");
          btn.innerHTML = originalHtml;
          busy = false;
        },
        disableIfClean: function (isDirty) {
          // زرار الحفظ يتعطّل تلقائياً لو مفيش تغييرات (Dirty State)
          if (btn) btn.disabled = !isDirty;
        },
      };
    },
  };

  // ─────────────────────────────────────────────────────────────
  // §SE-7  DirtyTracker — كشف التغييرات + تحذير عند الخروج بدون حفظ
  //
  // usage:
  //   var dt = DirtyTracker.create("sinv-form-wrapper", saveBtnCtrl);
  //   ... عند أي تعديل ...    dt.markDirty();
  //   بعد نجاح الحفظ ...      dt.markClean();
  // ─────────────────────────────────────────────────────────────
  var DirtyTracker = {
    _anyDirty: false,

    create: function (containerSelectorOrId, buttonCtrl) {
      var self = this;
      var dirty = false;
      var container = containerSelectorOrId
        ? document.getElementById(containerSelectorOrId) ||
          document.querySelector(containerSelectorOrId)
        : null;

      function mark(state) {
        dirty = state;
        self._anyDirty = state;
        if (buttonCtrl) buttonCtrl.disableIfClean(dirty);
      }

      if (container) {
        container.addEventListener("input", function () {
          mark(true);
        });
        container.addEventListener("change", function () {
          mark(true);
        });
      }

      return {
        isDirty: function () {
          return dirty;
        },
        markDirty: function () {
          mark(true);
        },
        markClean: function () {
          mark(false);
        },
      };
    },
  };

  // تحذير موحّد عند مغادرة الصفحة ولسه فيه تعديلات لم تُحفظ
  window.addEventListener("beforeunload", function (e) {
    if (DirtyTracker._anyDirty) {
      e.preventDefault();
      e.returnValue = "";
      return "";
    }
  });

  // ─────────────────────────────────────────────────────────────
  // §SE-8  SaveEngine.run() — المنسّق الرئيسي (النقطة الوحيدة للحفظ)
  //
  // usage:
  //   SaveEngine.run({
  //     screen:   "SaleInvoice",          // اسم الشاشة (للـ logging)
  //     entity:   "sale_invoice",         // اسم الكيان
  //     recordId: null,                   // موجود لو تعديل
  //     buttonId: "sinv-save-btn",        // اختياري
  //     rules:    [ {field:"sinv-party", required:true, label:"اسم العميل"} ],
  //     dirtyTracker: dt,                 // اختياري — DirtyTracker instance
  //     collect:  function(){ return _collectInvoiceData("sinv"); },
  //     fn:       "addSaleInvoice",       // اسم دالة الـ backend
  //     params:   function(data){ return [data, SESSION.token]; },
  //     timeout:  25000,
  //     retries:  0,                      // عدد محاولات إعادة الإرسال التلقائية عند فشل الاتصال
  //     successMessage: "تم حفظ فاتورة البيع بنجاح",
  //     onSuccess: function(res, data){ ... },   // منطق العمل بعد النجاح
  //     onError:   function(res){ ... },         // اختياري — منطق إضافي عند الفشل
  //     closeDialogId: null,              // اختياري — يُغلق تلقائياً عند النجاح
  //     refresh:   function(){ renderPage(APP.currentPage); } // تحديث البيانات المتأثرة فقط
  //   });
  // ─────────────────────────────────────────────────────────────
  var SaveEngine = {
    run: function (cfg) {
      cfg = cfg || {};
      var ctx = {
        screen: cfg.screen || "UnknownScreen",
        entity: cfg.entity || "unknown",
        recordId: cfg.recordId || null,
        state: SAVE_STATES.IDLE,
        _retries: 0,
      };

      var btnCtrl = cfg.buttonId
        ? SaveButtonController.attach(cfg.buttonId)
        : null;

      // 1) منع الحفظ لو الزرار مشغول فعلاً (منع الضغط المزدوج)
      if (btnCtrl && btnCtrl.isBusy()) return;

      // 2) لو فيه Dirty Tracker ومفيش أي تغيير حقيقي → لا داعي لطلب سيرفر
      if (
        cfg.dirtyTracker &&
        cfg.dirtyTracker.isDirty &&
        !cfg.dirtyTracker.isDirty() &&
        !cfg.forceSave
      ) {
        NotificationService.info(SAVE_MESSAGES.NOTHING_TO_SAVE);
        return;
      }

      // 3) التحقق (Validation)
      ctx.state = SAVE_STATES.VALIDATING;
      if (cfg.rules && cfg.rules.length) {
        var result = ValidationService.validate(cfg.rules);
        if (!result.valid) {
          ctx.state = SAVE_STATES.FAILED;
          NotificationService.error(
            result.message || SAVE_MESSAGES.VALIDATION_FAILED,
          );
          ValidationService.focusFirstInvalid(result.firstInvalidEl);
          return;
        }
      }

      // 4) تجميع البيانات
      var data;
      try {
        data = typeof cfg.collect === "function" ? cfg.collect() : cfg.data;
      } catch (e) {
        NotificationService.error("خطأ في تجهيز البيانات: " + e.message);
        return;
      }

      // 5) قفل الزر + منع الضغط المزدوج + عرض السبينر
      if (btnCtrl) btnCtrl.setSaving(cfg.savingLabel);

      // 6) عرض طبقة الحفظ الناعمة (لا تجمّد الشاشة)
      LoadingService.show(cfg.savingLabel || SAVE_MESSAGES.SAVING);

      ctx.state = SAVE_STATES.SAVING;
      SaveLogger.start(ctx);

      var maxRetries = cfg.retries || 0;
      var timeoutMs = cfg.timeout != null ? cfg.timeout : 25000;

      function finish(success, res) {
        LoadingService.hide();
        if (btnCtrl) btnCtrl.restore();

        if (success) {
          ctx.state = SAVE_STATES.SUCCESS;
          SaveLogger.end(ctx, true, "OK");
          if (cfg.dirtyTracker && cfg.dirtyTracker.markClean)
            cfg.dirtyTracker.markClean();

          // [DL-UNIFY] journal_warning (لو موجودة يومًا) قد تصل الآن إما على
          // مستوى الاستجابة الأصلية (نادر) أو داخل res.data بعد تطبيع _gsr
          var journalWarning =
            (res && res.journal_warning) ||
            (res && res.data && res.data.journal_warning);
          if (journalWarning) {
            NotificationService.warning(journalWarning);
          } else {
            NotificationService.success(
              cfg.successMessage || SAVE_MESSAGES.SAVED,
            );
          }

          if (typeof cfg.onSuccess === "function") cfg.onSuccess(res, data);

          if (cfg.closeDialogId) {
            var dlg = document.getElementById(cfg.closeDialogId);
            if (dlg && typeof closeDrawer === "function")
              closeDrawer(cfg.closeDialogId);
            else if (dlg) dlg.style.display = "none";
          }

          if (typeof cfg.refresh === "function") cfg.refresh();
        } else {
          ctx.state = SAVE_STATES.FAILED;
          var message = (res && res.message) || SAVE_MESSAGES.FAILED;
          SaveLogger.end(ctx, false, message);
          NotificationService.error(message);
          if (typeof cfg.onError === "function") cfg.onError(res, data);
          // ملاحظة: البيانات المدخلة تبقى كما هي في الفورم (لا مسح) — إعادة المحاولة متاحة فوراً
        }
      }

      // [DL-UNIFY] SaveEngine لم يعد يعمل google.script.run مباشرة — بيمر
      // إلزاميًا عبر _gsr() (00_JS_DataLayer.html)، نفس نقطة الدخول الموحّدة
      // المستخدمة في كل قراءات/كتابات النظام. كده الـ retry/timeout/تطبيع
      // الاستجابة/معالجة انتهاء الجلسة كلها منطق واحد مش نسختين متوازيتين.
      function attempt(attemptNo) {
        var params =
          typeof cfg.params === "function"
            ? cfg.params(data)
            : cfg.params || [data];

        if (typeof _gsr !== "function") {
          finish(false, {
            message:
              "طبقة DataLayer (_gsr) غير متاحة — تأكد من تحميل 00_JS_DataLayer.html",
          });
          return;
        }

        _gsr(cfg.fn, params, {
          timeout: timeoutMs,
          label: cfg.screen || cfg.fn,
          rawResponse: cfg.rawResponse,
          onSuccess: function (result) {
            finish(true, result);
          },
          onError: function (result) {
            // جلسة غير صالحة/منتهية: _gsr نفسها بالفعل نادت _handleSessionExpired
            // — هنا فقط نُنهي الـ workflow المحلي (spinner/logger) بدون أي retry.
            if (
              typeof _isSessionErrorResponse === "function" &&
              _isSessionErrorResponse(result)
            ) {
              finish(false, result);
              return;
            }

            var msg = (result && result.message) || "";
            var isTransient =
              msg.indexOf("انتهت المهلة") !== -1 ||
              msg.indexOf("خطأ في الاتصال") !== -1;

            if (
              attemptNo < maxRetries &&
              (isTransient || cfg.retryOnLogicalFailure)
            ) {
              SaveLogger.retry(ctx, attemptNo + 1);
              NotificationService.info(SAVE_MESSAGES.RETRYING);
              attempt(attemptNo + 1);
            } else {
              if (isTransient) ctx.state = SAVE_STATES.TIMEOUT;
              finish(false, result);
            }
          },
        });
      }

      attempt(0);

      // إتاحة الإلغاء (Cancellation) لو الشاشة محتاجة توقف الانتظار
      return {
        cancel: function () {
          ctx.state = SAVE_STATES.CANCELLED;
          LoadingService.hide();
          if (btnCtrl) btnCtrl.restore();
          SaveLogger.end(ctx, false, "Cancelled by user");
        },
      };
    },
  };
</script>

<!--
══════════════════════════════════════════════════════════════
 📋  §SE-9  DEVELOPER RULES — قواعد محرك الحفظ (لا يجوز كسرها)
══════════════════════════════════════════════════════════════

RULE 1 — ممنوع أي شاشة تعمل save workflow يدوي (spinner يدوي + google.script.run مباشر)
   ✅ صح:  SaveEngine.run({ screen, entity, fn:"addX", collect, rules, ... })
   ❌ غلط: btn.disabled=true; google.script.run.withSuccessHandler(...).addX(...)

RULE 2 — كل نصوص الحالة تُؤخذ من SAVE_MESSAGES فقط
   ✅ SAVE_MESSAGES.SAVING  ("⏳ جاري الحفظ...")
   ❌ ممنوع اختراع "جاري التحديث..." أو "Processing..." أو "برجاء الانتظار..."
   (استثناء وحيد: عملية مختلفة فعلاً عن الحفظ، مثال: "جاري الطباعة...")

RULE 3 — كل تحقق (Validation) قبل الحفظ يمر عبر ValidationService / rules[]
   لا تحقق مبعثر بـ if/else متفرق داخل دالة الحفظ نفسها.

RULE 4 — أي رسالة نجاح/خطأ تمر عبر NotificationService (والتي تستخدم showToast
   الموجودة فعلاً) — لا console.log فقط ولا innerHTML يدوي لعرض رسالة.

RULE 5 — الحفظ لازم يكون Soft Save دايماً: ممنوع أي overlay يمنع scroll
   أو pointer-events:none على <body> بالكامل أثناء الحفظ.

RULE 6 — أي زرار حفظ لازم يُدار عبر SaveButtonController (spinner موحّد،
   منع الضغط المزدوج تلقائي، استرجاع تلقائي للحالة الأصلية).

RULE 7 — أي شاشة فيها تعديل حي (فورم كبير) يجب أن تستخدم DirtyTracker
   بحيث زر الحفظ يكون معطّل تلقائياً لو مفيش تغيير فعلي.

RULE 8 — عند الفشل، البيانات المدخلة من المستخدم لا تُمسح أبداً — تبقى في
   الفورم بالكامل ليعيد المحاولة مباشرة (SaveEngine لا يفرّغ أي input).

RULE 9 — أي endpoint جديد للحفظ (Create/Update/Duplicate/Import/Settings)
   يُستدعى حصرياً عبر SaveEngine.run({ fn: "اسم دالة الباك-إند", ... })
   ولا يُستدعى مباشرة عبر google.script.run في أي ملف شاشة.

RULE 10 — [DL-UNIFY] ممنوع أي منطق retry/timeout/تطبيع استجابة يُكتب من جديد
   داخل أي شاشة أو داخل SaveEngine نفسه — كل ده مسؤولية _gsr() فقط

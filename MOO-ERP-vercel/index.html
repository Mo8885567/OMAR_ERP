  // ---------- Prefetch (تحميل مسبق أثناء اللوجين) ----------
  var _prefetch = { done: false, data: null, loading: false, _onReady: null };

  function _startPrefetch() {
    // ✅ [PRE-LOGIN-PREFETCH-FULL] نبدأ تحميل البيانات الكاملة فوراً مع ظهور شاشة اللوجين
    // بدون انتظار المستخدم — لما يضغط login البيانات تكون جاهزة بالكامل فوراً
    // نستخدم getAllData (الكاملة) عشان الداشبورد يعرض كل الأرقام بدون أي delay
    if (_prefetch.done || _prefetch.loading) return;
    _prefetch.loading = true;

    // المرحلة 2: جيب البيانات الكاملة (saleInvoices, transactions, إلخ) —
    // نفس المنطق سواء نجحت أو فشلت المرحلة 1 (الخفيفة)
    function _prefetchFull() {
      DL.Core.getAllData({
        label: "Auth.prefetch.full",
        onSuccess: function (result) {
          _prefetch.loading = false;
          var dFull = result.data;
          // ✅ علّم البيانات بأنها كاملة (مش _light) عشان نعرف بعدين
          dFull._prefetch_full = true;
          _prefetch.done = true;
          _prefetch.data = dFull;
          // لو في callback منتظر (المستخدم سجل دخول أثناء الـ prefetch)
          if (typeof _prefetch._onReady === "function") {
            var cb = _prefetch._onReady;
            _prefetch._onReady = null;
            cb(dFull);
          }
        },
        onError: function () {
          _prefetch.loading = false;
          // فشلت الكاملة — استخدم الخفيفة لو موجودة
          if (_prefetch.data) {
            _prefetch.done = true;
            if (typeof _prefetch._onReady === "function") {
              var cb2 = _prefetch._onReady;
              _prefetch._onReady = null;
              cb2(_prefetch.data);
            }
          } else {
            _prefetch.done = false;
          }
        },
      });
    }

    // المرحلة 1: جيب البيانات الخفيفة سريعاً (للبيانات الأساسية)
    DL.Core.getAllDataLight({
      label: "Auth.prefetch.light",
      onSuccess: function (result) {
        // خزّن البيانات الخفيفة مؤقتاً في حالة المستخدم لوج قبل اكتمال المرحلة 2
        _prefetch.data = result.data;
        _prefetchFull();
      },
      onError: function () {
        // فشلت حتى الخفيفة — جرّب الكاملة مباشرة
        _prefetchFull();
      },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // §E-CACHE  نظام الكاش المقسّم v4.2
  //
  // الفكرة: بيانات ثابتة (items, warehouses, groups, colors) TTL = 10 دقيقة
  //          بيانات متغيرة (transactions, stock, productionOrders) TTL = 90 ثانية
  //
  // فائدة: بعد حفظ صنف جديد نحدّث items محلياً فوراً بدون round-trip كامل
  //         (Optimistic Update) ثم نزامن في الخلفية
  // ─────────────────────────────────────────────────────────────
  var _cache = { data: null, ts: 0, fetching: false };

  // TTL منفصل لكل نوع بيانات (بالميلي ثانية)
  var CACHE_TTL_STATIC = 600000; // 10 دقائق — items, warehouses, groups, colors
  var CACHE_TTL_DYNAMIC = 90000; // 90 ثانية  — transactions, stock, productionOrders
  var CACHE_TTL = CACHE_TTL_DYNAMIC; // للتوافق مع الكود القديم

  /**
   * _saveCache — يحفظ البيانات مع timestamp مقسّم
   * static_ts: وقت آخر تحديث للبيانات الثابتة
   * dynamic_ts: وقت آخر تحديث للبيانات المتغيرة
   */
  function _saveCache(data) {
    var now = Date.now();
    _cache.data = data;
    _cache.ts = now;
    // نحفظ timestamps منفصلة
    // ✅ FIX: دائماً حدّث static_ts عند حفظ بيانات كاملة جديدة من السيرفر
    // السبب: || now كانت تُبقي الـ static cache القديم صالحاً لـ 10 دقائق
    // مما يمنع ظهور openingStock الجديدة بعد الحفظ
    _cache.static_ts = now;
    _cache.dynamic_ts = now;
    try {
      // نقسّم الكاش في sessionStorage لتقليل حجم JSON.parse عند القراءة
      var staticPart = {
        items: data.items,
        warehouses: data.warehouses,
        groups: data.groups,
        colors: data.colors,
        sizes: data.sizes || [],
        users: data.users,
        companySettings: data.companySettings,
        roles: data.roles,
        permissions: data.permissions,
        userOverrides: data.userOverrides,
        // ✅ FIX: حفظ العملاء والموردين في الكاش
        customers: data.customers || [],
        suppliers: data.suppliers || [],
        // ✅ [PERF-CAT-BUNDLE] حفظ تصنيفات العملاء/الموردين في الكاش أيضاً
        customerCategories: data.customerCategories || [],
        supplierCategories: data.supplierCategories || [],
        ts: _cache.static_ts,
      };
      var dynamicPart = {
        transactions: data.transactions,
        stock: data.stock,
        productionOrders: data.productionOrders,
        openingStock: data.openingStock,
        shipments: data.shipments,
        ts: now,
      };
      sessionStorage.setItem("wms_cache_static", JSON.stringify(staticPart));
      sessionStorage.setItem("wms_cache_dynamic", JSON.stringify(dynamicPart));
      // fallback للكود القديم الي بيقرأ wms_cache
      sessionStorage.setItem(
        "wms_cache",
        JSON.stringify({ data: data, ts: now }),
      );
    } catch (e) {}
  }

  /**
   * _saveCacheOptimistic — يحدّث البيانات الثابتة فقط في الكاش (بعد Optimistic Update)
   * يستخدمها reloadAfterMutation بعد تعديل item/group/warehouse/color
   */
  function _saveCacheOptimistic(partialData) {
    if (!_cache.data) return;
    var now = Date.now();
    // ادمج التحديثات في _cache.data
    Object.keys(partialData).forEach(function (key) {
      _cache.data[key] = partialData[key];
    });
    _cache.static_ts = now;
    _cache.ts = now;
    // أعد كتابة الكاش كاملاً
    _saveCache(_cache.data);
  }

  function _loadCache() {
    // أسرع مسار: الكاش في الذاكرة وصالح
    if (_cache.data && Date.now() - _cache.dynamic_ts < CACHE_TTL_DYNAMIC) {
      return _cache.data;
    }
    // محاولة القراءة المقسّمة من sessionStorage
    try {
      var staticRaw = sessionStorage.getItem("wms_cache_static");
      var dynamicRaw = sessionStorage.getItem("wms_cache_dynamic");
      if (!staticRaw || !dynamicRaw) {
        // fallback للكاش القديم
        var raw = sessionStorage.getItem("wms_cache");
        if (!raw) return null;
        var c = JSON.parse(raw);
        if (Date.now() - c.ts < CACHE_TTL_DYNAMIC) {
          _cache = {
            data: c.data,
            ts: c.ts,
            static_ts: c.ts,
            dynamic_ts: c.ts,
            fetching: false,
          };
          return c.data;
        }
        return null;
      }
      var staticC = JSON.parse(staticRaw);
      var dynamicC = JSON.parse(dynamicRaw);
      var now = Date.now();

      // البيانات الديناميكية انتهت صلاحيتها — لا نرجع الكاش
      if (now - dynamicC.ts > CACHE_TTL_DYNAMIC) return null;

      // البيانات الثابتة انتهت — سنرجع الكاش لكن نشغّل silent refresh
      var staticStale = now - staticC.ts > CACHE_TTL_STATIC;

      var merged = {
        items: staticC.items || [],
        warehouses: staticC.warehouses || [],
        groups: staticC.groups || [],
        colors: staticC.colors || [],
        sizes: staticC.sizes || [],
        users: staticC.users || [],
        companySettings: staticC.companySettings || {},
        roles: staticC.roles || [],
        permissions: staticC.permissions || [],
        userOverrides: staticC.userOverrides || {},
        // ✅ FIX: استعادة العملاء والموردين من الكاش
        customers: staticC.customers || [],
        suppliers: staticC.suppliers || [],
        // ✅ [PERF-CAT-BUNDLE] استعادة تصنيفات العملاء/الموردين من الكاش
        customerCategories: staticC.customerCategories || [],
        supplierCategories: staticC.supplierCategories || [],
        transactions: dynamicC.transactions || [],
        stock: dynamicC.stock || [],
        productionOrders: dynamicC.productionOrders || [],
        openingStock: dynamicC.openingStock || [],
        shipments: dynamicC.shipments || [],
      };
      // ✅ [FIX-EXT] أعد دمج بيانات المحاسبة/HR المحمّلة مسبقاً في APP.data
      // عشان لو الـ dynamic cache انتهى وأُعيد بناء الـ merged من الـ sessionStorage
      // تفضل بيانات الخزينة والمحاسبة موجودة بدل ما يروح في الـ re-merge
      if (APP.data && APP.extLoaded) {
        EXT_FIELDS.forEach(function (f) {
          if (APP.data[f] !== undefined) {
            merged[f] = APP.data[f];
          }
        });
      }
      _cache = {
        data: merged,
        ts: dynamicC.ts,
        static_ts: staticC.ts,
        dynamic_ts: dynamicC.ts,
        fetching: false,
        _staticStale: staticStale,
      };
      return merged;
    } catch (e) {}
    return null;
  }

  function _parseData(d) {
    var items = (d.items || []).map(function (it) {
      it.id = it.id != null ? String(it.id) : "";
      if (!it.colors_json && it.calor) {
        it.colors_json = it.calor;
      }
      return it;
    });
    var stock = (d.stock || []).map(function (s) {
      s.item_id = s.item_id != null ? String(s.item_id) : "";
      return s;
    });
    var transactions = (d.transactions || []).map(function (t) {
      t.item_id = t.item_id != null ? String(t.item_id) : "";
      return t;
    });
    var openingStock = (d.openingStock || []).map(function (o) {
      o.item_id = o.item_id != null ? String(o.item_id) : "";
      return o;
    });
    return {
      items: items,
      stock: stock,
      transactions: transactions,
      productionOrders: d.productionOrders || [],
      users: d.users || [],
      warehouses: d.warehouses || [],
      groups: d.groups || [],
      openingStock: openingStock,
      shipments: d.shipments || [],
      colors: d.colors || [],
      sizes: d.sizes || [],
      companySettings: d.companySettings || {},
      // ✅ جديد
      roles: d.roles || [],
      permissions: d.permissions || [],
      userOverrides: d.userOverrides || {},
      // ✅ FIX: العملاء والموردين
      customers: d.customers || [],
      suppliers: d.suppliers || [],
      // ✅ [PERF-CAT-BUNDLE] تصنيفات العملاء/الموردين — جزء من الحزمة
      // الأساسية بدل رحلة سيرفر منفصلة عند فتح نموذج "إضافة"
      customerCategories: d.customerCategories || [],
      supplierCategories: d.supplierCategories || [],
    };
  }
  function _showRefreshBar(visible) {
    var bar = document.getElementById("refresh-bar");
    if (!bar) return;
    if (visible) {
      bar.classList.add("active");
    } else {
      bar.classList.remove("active");
      bar.style.opacity = "0";
    }
  }

  // ---------- Data Loading v4.2 ----------

  /** مساعد مشترك لتطبيق البيانات الجديدة على APP + PM_STATE */
  function _applyFreshData(fresh) {
    // ✅ [FIX-EXT] احتفظ ببيانات المحاسبة/HR المحمّلة مسبقاً من getAllDataExtended
    // لأن getAllData() لا تتضمّنها — بدون هذا الحفظ يتمسح cashBoxes/journalEntries
    // بعد كل silentRefresh ويظهر المستخدم شاشة فاضية لما يرجع للخزينة
    //
    // [FIX-EXT-V2] التحقق من extLoaded كان يفشل لو silentRefresh انتهى قبل
    // getAllDataExtended — دلوقتي نحتفظ بالحقل طالما هو array (موجود فعلاً)
    // بغض النظر عن قيمة extLoaded
    EXT_FIELDS.forEach(function (f) {
      if (APP.data && Array.isArray(APP.data[f])) {
        fresh[f] = APP.data[f];
      }
    });
    // احتفظ بـ flag السيرفر
    if (APP.data && APP.data._extLoadedFromServer) {
      fresh._extLoadedFromServer = true;
    }
    APP.data = fresh;
    APP.companySettings = fresh.companySettings || APP.companySettings || {};
    // [PERF-LAZY-LOAD] دوال من ملفات مؤجلة (08_JS_Users_Branding /
    // 03_JS_Dashboard_Items) — بتتحمل غالبًا خلال ثواني من فتح الصفحة،
    // بس بنحرس النداء احتياطًا لأي تايمنج نادر.
    if (typeof _applyCompanyBranding === "function") _applyCompanyBranding();
    if (typeof _syncColorsFromData === "function") _syncColorsFromData();
    if (fresh.roles && fresh.roles.length) {
      PM_STATE.roles = fresh.roles;
      PM_STATE.permissions = fresh.permissions || [];
      PM_STATE.userOverrides = fresh.userOverrides || {};
      PM_STATE.users = fresh.users || [];
      PM_STATE.loaded = true;
      _syncRolePermissions();
    }
  }

  // تحديث صامت في الخلفية بعد عرض الكاش
  // [PERF-FIX-SR] نسخة محسّنة: تتحقق من تغيّر البيانات قبل إعادة الرسم
  function _dataFingerprint(data) {
    if (!data) return "";
    try {
      var tx = data.transactions || [];
      var items = data.items || [];
      var stock = data.stock || [];
      var lastTx = tx.length
        ? String(tx[tx.length - 1].id) + "|" + tx[tx.length - 1].date
        : "";
      return [tx.length, items.length, stock.length, lastTx].join(":");
    } catch (e) {
      return "";
    }
  }

  function _silentRefresh() {
    if (_cache.fetching) return;
    _cache.fetching = true;
    _showRefreshBar(true);
    var _fpBefore = _dataFingerprint(APP.data);
    DL.Core.getAllData({
      label: "Auth.silentRefresh",
      onSuccess: function (result) {
        _showRefreshBar(false);
        _cache.fetching = false;
        var d = result.data;
        if (!d || typeof d !== "object") return;
        var fresh = _parseData(d);
        _saveCache(fresh);
        _applyFreshData(fresh);

        // [PERF-FIX-SR] مقارنة البصمة: لو البيانات لم تتغير → لا نعيد الرسم
        var _fpAfter = _dataFingerprint(fresh);
        var _dataChanged = _fpBefore !== _fpAfter;

        // حفظ scroll positions قبل الـ re-render
        var pageEl = document.querySelector(".content");
        var alertsEl = document.querySelector(".alerts-grid");
        var pageScroll = pageEl ? pageEl.scrollTop : 0;
        var alertsScroll = alertsEl ? alertsEl.scrollTop : 0;

        // ✅ لو المستخدم بيكتب في form، متعملش re-render عشان متمسحش المدخلات
        var activeEl = document.activeElement;
        var userTyping =
          activeEl &&
          (activeEl.tagName === "INPUT" ||
            activeEl.tagName === "TEXTAREA" ||
            activeEl.tagName === "SELECT" ||
            activeEl.isContentEditable);

        updateAlertBadge();
        updateNotifBell();

        // [PERF-FIX-SR] أعد الرسم فقط لو البيانات تغيّرت فعلاً والمستخدم مش بيكتب
        // [LOGIN-STABLE] وكمان لو فات 5 ثواني على اللوجين عشان الشاشة تتستقر
        var _sinceLogin = Date.now() - (APP._loginTime || 0);
        // 🎨 [FIX] شاشة "المجموعات" (عرض شجري) عندها حالة UI محلية غنية
        // (توسيع/طي، سحب وإفلات، تمرير داخلي) وبصمة البيانات (_dataFingerprint)
        // مبنية على transactions/items/stock بس — يعني أي حركة/صنف يتغيّر في
        // أي مكان تاني بالنظام كان بيفجّر إعادة بناء كاملة للشجرة (فتش + رسم
        // من الصفر) رغم إن بيانات المجموعات نفسها مالهاش دعوة، فيحس المستخدم
        // إن الشاشة "بترفرش" باستمرار وبيفقد مكان التمرير/التوسيع. بنستثنيها
        // من إعادة الرسم الصامتة؛ أي تعديل فعلي على المجموعات (إضافة/حذف/تعديل)
        // بيحصله رسم فوري من مكانه هو نفسه (مش محتاج الريفريش الصامت أصلاً).
        var _silentRefreshSkipPages = { groups: true };
        if (
          _dataChanged &&
          !userTyping &&
          _sinceLogin > 5000 &&
          !_silentRefreshSkipPages[APP.currentPage]
        ) {
          APP._fromSilentRefresh = true;
          renderPage(APP.currentPage);
          APP._fromSilentRefresh = false;
          // استعادة scroll positions بعد الـ re-render
          setTimeout(function () {
            var pageElNew = document.querySelector(".content");
            var alertsElNew = document.querySelector(".alerts-grid");
            if (pageElNew) pageElNew.scrollTop = pageScroll;
            if (alertsElNew) alertsElNew.scrollTop = alertsScroll;
          }, 0);
        }
      },
      onError: function () {
        _cache.fetching = false;
        _showRefreshBar(false);
      },
    });
  }

  function loadAllData(cb, forceRefresh) {
    if (!forceRefresh) {
      var cached = _loadCache();
      if (cached) {
        _applyFreshData(cached);
        if (typeof cb === "function") cb();
        else if (cb !== null) renderPage(APP.currentPage);
        updateAlertBadge();
        updateNotifBell();
        // لو البيانات الثابتة قديمة أيضاً → silent refresh كامل
        _silentRefresh();
        return;
      }
    }

    APP.loading = true;
    // لا نعرض spinner في page-content — الـ app-loading-overlay شغّال فوق كل شيء
    // var c = document.getElementById("page-content"); -- removed

    DL.Core.getAllData({
      label: "Auth.loadAllData",
      onSuccess: function (result) {
        APP.loading = false;
        var d = result.data;
        if (!d || typeof d !== "object") {
          showToast(I18N.t("AUTH_MSG_INVALID_DATA_RECEIVED"), "error");
          if (typeof _hideAppLoader === "function") _hideAppLoader();
          return;
        }
        var fresh = _parseData(d);
        fresh._loaded = true;
        _saveCache(fresh);
        _applyFreshData(fresh);
        if (typeof _hideAppLoader === "function") _hideAppLoader();
        if (typeof APP._onDataLoaded === "function") {
          var _hook = APP._onDataLoaded;
          APP._onDataLoaded = null;
          _hook();
        }
        if (typeof cb === "function") cb();
        // [LOGIN-STABLE] لو cb=null (silent background load) — لا نعيد الرسم
        else if (cb !== null) renderPage(APP.currentPage);
        updateAlertBadge();
        updateNotifBell();
      },
      onError: function (result) {
        APP.loading = false;
        if (typeof _hideAppLoader === "function") _hideAppLoader();
        showToast(I18N.t("MSG_LOAD_ERROR") + ": " + result.message, "error");
        console.error("loadAllData error:", result.message);
      },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // 📦  الحزمة الموسعة (محاسبة + HR) — ensureExtendedData
  // [DATA-UNIFY] بديل موحَّد لكل النداءات المتفرقة اللي كانت كل شاشة فرعية
  // (الأقسام، الوظائف، الموظفين، الحضور، دليل الحسابات، الخزينة...) تعملها
  // لوحدها في كل مرة تُفتح. دلوقتي: نداء واحد لـ getAllDataExtended،
  // يتحمّل أول مرة بس، ويُخزَّن في APP.data + sessionStorage.
  //
  // الاستخدام داخل أي bind function:

  // ─────────────────────────────────────────────────────────────
  var EXT_CACHE_KEY = "wms_ext_cache_v1";
  var EXT_CACHE_TTL = 1200000; // 20 دقيقة — [FIX] زيادة من 10 لتقليل re-fetch المتكرر
  var EXT_FIELDS = [
    "chartOfAccounts",
    "cashBoxes",
    "bankAccounts",
    "journalEntries",
    "receiptVouchers",
    "paymentVouchers",
    "expenses",
    "transferVouchers",
    "bankReconciliations",
    "cheques",
    "departments",
    "jobTitles",
    "employees",
    "leaveTypes",
    "leaveRequests",
    "loanRequests",
    "payrollPeriods",
    "attendance",
    "accountingSettings",
    "hrSettings",
  ];

  APP.extLoaded = false;
  APP.extLoading = false;
  var _extCallbacks = [];
  // [LOGIN-STABLE] وقت آخر لوجين — يمنع silentRefresh من إعادة الرسم في أول 5 ثواني
  APP._loginTime = 0;

  function _saveExtCache(data) {
    try {
      sessionStorage.setItem(
        EXT_CACHE_KEY,
        JSON.stringify({ data: data, ts: Date.now() }),
      );
    } catch (e) {}
  }

  function _loadExtCache() {
    try {
      var raw = sessionStorage.getItem(EXT_CACHE_KEY);
      if (!raw) return null;
      var c = JSON.parse(raw);
      if (Date.now() - c.ts > EXT_CACHE_TTL) return null;
      // [FIX-EXT-FLAG] الكاش = بيانات حقيقية سبق تحميلها من السيرفر
      if (c.data) c.data._extLoadedFromServer = true;
      return c.data;
    } catch (e) {
      return null;
    }
  }

  function _applyExtData(data) {
    // [FIX-EXT-NULL] لو APP.data لسه null (getAllData لم ينتهي بعد) نخلق object فاضي
    if (!APP.data || typeof APP.data !== "object") APP.data = {};
    EXT_FIELDS.forEach(function (f) {
      var incoming = data[f];
      // نقبل البيانات الجديدة حتى لو array فاضية — المهم إنها جت من السيرفر
      // نرفض فقط undefined (الحقل مش موجود خالص في الرد)
      if (incoming !== undefined) {
        APP.data[f] = incoming;
      } else if (APP.data[f] === undefined) {
        APP.data[f] = [];
      }
    });
    // [FIX-EXT-FLAG] علامة إن البيانات جت فعلاً من السيرفر (مش كاش فاضي)
    APP.data._extLoadedFromServer = true;
  }

  /** يولّد Shimmer bar بعرض معين */
  function _skelBar(w, h, mb) {
    h = h || 14;
    mb = mb || 0;
    return (
      "<div style='height:" +
      h +
      "px;width:" +
      (w || "100%") +
      ";border-radius:6px;margin-bottom:" +
      (mb || 6) +

      "background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);" +
      "background-size:200% 100%;animation:csShimmer 1.4s ease-in-out infinite'></div>"
    );
  }

  /** يولّد صف جدول skeleton */
  function _skelTableRow(cols) {
    var cells = "";
    for (var i = 0; i < (cols || 5); i++) {
      var w = i === 0 ? "60%" : i === cols - 1 ? "40%" : "80%";
      cells += "<td style='padding:12px 10px'>" + _skelBar(w, 13, 0) + "</td>";
    }
    return (
      "<tr style='border-bottom:1px solid var(--border)'>" + cells + "</tr>"
    );

  /** يولّد Stat Card skeleton */
  function _skelStatCard() {
    return (
      "<div style='background:var(--surface2);border-radius:12px;padding:20px;flex:1;min-width:160px'>" +
      _skelBar("40px", 40, 8) +
      _skelBar("60%", 12, 4) +

  /**
   * _renderAccHrSkeleton(page) — يرسم Skeleton مناسب لكل نوع شاشة

    if (isDash) {

      "<div style='flex:1;max-width:260px'>" +
      _skelBar("100%", 34, 0) +
      "</div>" +
      "<div style='width:100px'>" +
      _skelBar("100%", 34, 0) +

      "</div>" +

            _skelBar(i === 0 ? "70%" : "50%", 12, 0) +

      "</div>" +

  /**
   * ensureExtendedData — يضمن إن بيانات المحاسبة/HR موجودة في APP.data
   * قبل ما الشاشة تعرضها، بدون ما يكرر نداء السيرفر لو كانت محمّلة فعلاً.
   * @param {Function} cb يُستدعى لما البيانات تكون جاهزة
   * @param {boolean} [forceRefresh] لو true يتجاهل الكاش ويجيب نسخة جديدة
   */
  // ─────────────────────────────────────────────────────────────
  // [DATA-UNIFY-2] نقطة الاتصال الوحيدة بالسيرفر لجلب الحزمة الموسعة
  //
  // قبل كده كان فيه 4 نسخ منفصلة بتنادي google.script.run.getAllDataExtended
  // مباشرة (هنا x3 + نسخة رابعة في 11_JS_Accounting.html)، كل نسخة بمنطق
  // cache/retry خاص بيها — وده كان سبب ظهور شاشات "جاري التحميل" عالقة لما
  // نسختين يشتغلوا في نفس الوقت من غير ما يعرفوا ببعض.
  //
  // دلوقتي: نداء واحد فعلي (_gsr → DL.Core.getAllDataExtended)، وكل الدوال
  // التالية (ensureExtendedData / refreshExtendedData / _preloadAllAfterLogin /
  // _silentPrefetchExtended) بقت مجرد "واجهات" حوالين نفس الطابور المشترك
  // _extCallbacks + علم APP.extLoading المشترك.
  // ─────────────────────────────────────────────────────────────
  function _fetchExtendedDataFromServer(_isRetry) {
    APP.extLoading = true;
    // ✅ [PERF-SPLIT] كانت DL.Core.getAllDataExtended نداء واحد بيخلي الباك-إند
    // يقرأ 24 قسم بالتتابع جوه تنفيذ Apps Script واحد، وده كان بياخد وقت
    // كافي إنه يضرب مهلة الـ 30 ثانية (خصوصًا على /dev deployment) ويظهر
    // "[DL] Core.getAllDataExtended → انتهت المهلة" في الكونسول.
    // دلوقتي بنادي Core (قوائم أساسية سريعة) وLazy (معاملات تفصيلية) بالتوازي
    // في نداءين منفصلين، وبندمج النتيجتين قبل ما نكمل بنفس المنطق القديم
    // بالظبط (نفس retry مرة واحدة، نفس callbacks، نفس APP.data في الآخر) —
    // فكل الشاشات اللي بتنادي ensureExtendedData() مش محتاجة تتغيّر خالص.
    var _mergedExtData = {};
    var _coreDone = false,
      _lazyDone = false,
      _hadExtError = false,
      _extErrorResult = null;

    function _checkBothDone() {
      if (!_coreDone || !_lazyDone) return;
      APP.extLoading = false;

      if (_hadExtError) {
        if (!_isRetry) {
          // [FIX] أول فشل (كاش سيرفر تالف أو خطأ مؤقت) — حاول مرة واحدة إضافية
          // بنسخة fresh قبل ما نسيب الشاشات فاضية للمستخدم
          _fetchExtendedDataFromServer(true);
          return;
        }
        APP.extLoaded = false;
        showToast(
          (_extErrorResult && _extErrorResult.message) ||
            I18N.t("AUTH_MSG_LOAD_EXTENDED_ERROR"),
          "error",
        );
        var cbsErr = _extCallbacks.slice();
        _extCallbacks = [];
        cbsErr.forEach(function (fn) {
          fn();
        });
        return;
      }

      _applyExtData(_mergedExtData);
      _saveExtCache(_mergedExtData);
      APP.extLoaded = true;
      var cbs = _extCallbacks.slice();
      _extCallbacks = [];
      cbs.forEach(function (fn) {
        fn();
      });
    }

    DL.Core.getAllDataExtendedCore(
      APP.currentUser ? APP.currentUser.username : null,
      SESSION ? SESSION.token : null,
      {
        timeout: 20000,
        onSuccess: function (result) {
          Object.assign(_mergedExtData, result.data || {});
          _coreDone = true;
          _checkBothDone();
        },
        onError: function (result) {
          _hadExtError = true;
          _extErrorResult = _extErrorResult || result;
          _coreDone = true;
          _checkBothDone();
        },
      },
    );

    DL.Core.getAllDataExtendedLazy(
      APP.currentUser ? APP.currentUser.username : null,
      SESSION ? SESSION.token : null,
      {
        timeout: 30000,
        onSuccess: function (result) {
          Object.assign(_mergedExtData, result.data || {});
          _lazyDone = true;
          _checkBothDone();
        },
        onError: function (result) {
          _hadExtError = true;
          _extErrorResult = _extErrorResult || result;
          _lazyDone = true;
          _checkBothDone();
        },
      },
    );
  }

  /**
   * ensureExtendedData — يضمن إن بيانات المحاسبة/HR موجودة في APP.data
   * قبل ما الشاشة تعرضها، بدون ما يكرر نداء السيرفر لو كانت محمّلة فعلاً،
   * ولو في طلب شغال بالفعل (من أي مصدر: prefetch/silent/مرئي) بينضم لنفس الطابور.
   * @param {Function} cb يُستدعى لما البيانات تكون جاهزة
   * @param {boolean} [forceRefresh] لو true يتجاهل الكاش ويجيب نسخة جديدة
   */
  function ensureExtendedData(cb, forceRefresh, _isRetry) {
    cb = cb || function () {};

    // ✅ [FIX-EXT] لو extLoaded=true لكن البيانات اتمسحت بسبب silentRefresh
    // نكتشف ذلك بفحص حقل أساسي — لو فاضي نجبر re-fetch بدل ما نعرض شاشة فارغة
    if (APP.extLoaded && !forceRefresh) {
      // [FIX-EXT-INTACT] الفلاق _extLoadedFromServer وحده كافي للتحقق —
      // فحص محتوى المصفوفات كان بيسبب re-fetch غلط لمستخدمين جدد عندهم
      // بيانات فاضية بشكل طبيعي (مثلاً: مفيش قيود محاسبية بعد).
      var extDataIntact = APP.data && APP.data._extLoadedFromServer === true;
      if (!extDataIntact) {
        // البيانات الموسعة اتمسحت أو جت فاضية — أعد التحميل
        APP.extLoaded = false;
        try {
          sessionStorage.removeItem(EXT_CACHE_KEY);
        } catch (e) {}
      }
    }

    if (APP.extLoaded && !forceRefresh) {
      cb();
      return;
    }

    if (!forceRefresh) {
      var cached = _loadExtCache();
      if (cached) {
        _applyExtData(cached);
        APP.extLoaded = true;
        cb();
        return;
      }
    }

    // لو في طلب شغال فعلاً (سواء silent prefetch أو طلب مرئي أو preload)
    // اكتفِ بالانتظار عليه بدل تكرار النداء — طابور واحد مشترك للجميع
    if (APP.extLoading) {
      _extCallbacks.push(cb);
      if (typeof showFABMessage === "function") {
        showFABMessage("⏳ جاري تحضير البيانات...", 3000);
      }
      return;
    }

    _extCallbacks.push(cb);
    // [SKELETON] الـ skeleton screen في محتوى الصفحة يكفي كـ visual feedback
    _fetchExtendedDataFromServer(_isRetry);
  }

  /** يُستخدم لزر "تحديث" اليدوي في شاشات المحاسبة/HR، وأيضاً لأي إعادة تحميل
   * إجبارية للحزمة الموسعة (زي `_reloadCashBoxesFromServer` سابقاً في المحاسبة) */
  function refreshExtendedData(cb) {
    try {
      sessionStorage.removeItem(EXT_CACHE_KEY);
    } catch (e) {}
    APP.extLoaded = false;
    ensureExtendedData(cb, true);
  }

  // ─────────────────────────────────────────────────────────────
  // §E-SILENT-EXT  Background Prefetch للبيانات الموسعة (HR + محاسبة)
  //
  // ─────────────────────────────────────────────────────────────
  // §PRELOAD-ALL  تحميل كل البيانات بعد تسجيل الدخول مباشرةً
  //
  // الهدف: ضمان إن 100% من البيانات (أساسية + موسعة) تكون محملة
  // في الكاش قبل ما المستخدم يفتح أي شاشة — بدون spinner مزعج.
  // يُستدعى من 02_JS_UI_Shell بعد اللوجين مباشرة.
  // ─────────────────────────────────────────────────────────────
  var _preloadDone = false;

  function _preloadAllAfterLogin() {
    if (_preloadDone) return;

    // ── المرحلة 1: البيانات الأساسية ──
    var basicReady = APP.data && APP.data._loaded;

    function _doExtended() {
      // ensureExtendedData بقت الطريق الوحيد للطلب — بتتعامل تلقائياً مع
      // حالة "في طلب شغال بالفعل" (من silent prefetch أو غيره) عن طريق
      // الانضمام لنفس طابور _extCallbacks بدل تكرار النداء
      ensureExtendedData(function () {
        _preloadDone = true;
      });
    }

    if (basicReady) {
      // البيانات الأساسية جاهزة — حمّل الموسعة فوراً
      _doExtended();
    } else {
      // البيانات الأساسية لسه ما جاتش — اطلبها أولاً ثم الموسعة
      if (APP.loading) {
        // طلب قيد التنفيذ — انتظر انتهاءه ثم حمّل الموسعة
        var _origOnLoad = APP._onDataLoaded;
        APP._onDataLoaded = function () {
          if (_origOnLoad) _origOnLoad();
          _doExtended();
        };
      } else {
        loadAllData(function () {
          _doExtended();
        }, true);
      }
    }

    // [VC-PRELOAD] حمّل بيانات المحافظ الإلكترونية في الخلفية
    setTimeout(function () {
      if (typeof _vcPreload === "function") _vcPreload();
    }, 3000);
    // [ATT-PRELOAD] حمّل بيانات الحضور في الخلفية
    setTimeout(function () {
      if (typeof _attPreload === "function") _attPreload();
    }, 4500);
  }

  // يُستدعى بعد تسجيل الدخول بثانيتين في الخلفية بدون أي UI/Freeze
  // الهدف: لما المستخدم يفتح أي شاشة HR/محاسبة يلاقي الكاش جاهز
  // لو فشل: يفشل صامتاً — ensureExtendedData ستكمل طبيعي لو احتاج
  // [DATA-UNIFY-2] بقت مجرد نداء صامت لـ ensureExtendedData بدل نسخة
  // مستقلة من منطق الجلب — نفس الطابور، نفس علم extLoading.
  // ─────────────────────────────────────────────────────────────
  function _silentPrefetchExtended() {
    if (APP.extLoaded || APP.extLoading) return;
    ensureExtendedData(function () {});
  }

  // [FIX-UI] showSaveAnim — يستخدم نفس الـ bubble بدون صندوق ثانٍ
  function showSaveAnim(options) {
    options = options || {};
    var title = options.title || "جاري الحفظ...";
    var emoji = options.emoji || "💾";

    _closeSaveAnim(true);

    // أظهر حالة التحميل في الـ bubble مباشرة
    var bubble = _ensureBubble();

      clearTimeout(_aiFabToastTimer);
      _aiFabToastTimer = null;
    }
    if (_fabMsgTimer) {
      clearTimeout(_fabMsgTimer);
      _fabMsgTimer = null;
    }
    var seq = ++_aiFabToastSeq;
    _saveAnim._bubbleSeq = seq;

    bubble.style.animation = "none";
    bubble.style.display = "none";

      '<span style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(37,99,235,0.25);border-top-color:#2563eb;animation:__spin 0.7s linear infinite;flex-shrink:0;display:inline-block"></span>' +
      '<span style="font-size:13px;font-weight:600">' +

      " " +
      title +
      "</span>" +
      "</span>";

    bubble.style.visibility = "hidden";
    bubble.style.display = "block";

    _positionBubble(bubble);

    _saveAnim.el = bubble; // نشير للـ bubble بدل overlay منفصل

      done: function (msg) {

  // [FIX-UI] _saveAnimSuccess — يغير الـ bubble لرسالة نجاح ناعمة
  function _saveAnimSuccess(msg) {
    if (!msg) {
      _closeSaveAnim(true);
      return;
    }
    var bubble = document.getElementById("ai-fab-bubble");
    if (!bubble) return;

    if (_saveAnim.timer) {
      clearTimeout(_saveAnim.timer);
      _saveAnim.timer = null;
    }

    // نُبقي data-freeze="success" حتى يتعرف عليه _closeSaveAnim
    bubble.setAttribute("data-type", "success");
    bubble.setAttribute("data-freeze", "success");
    bubble.innerHTML =
      '<span class="fab-bubble-stem"></span>' +
      '<span class="fab-bubble-icon">✅</span>' +
      '<span class="fab-bubble-text">' +
      (msg || "تم بنجاح ✓") +
      "</span>";

    bubble.style.animation = "none";
    bubble.offsetHeight;
    bubble.style.animation = "fabBubbleSuccess 0.35s ease forwards";

    _saveAnim.timer = setTimeout(function () {
      _closeSaveAnim(false);
    }, 2000);
  }

  // [FIX-UI] _saveAnimFail — bubble خطأ
  function _saveAnimFail(msg) {
    var bubble = document.getElementById("ai-fab-bubble");
    if (!bubble) return;

    if (_saveAnim.timer) {
      clearTimeout(_saveAnim.timer);
      _saveAnim.timer = null;
    }

    bubble.setAttribute("data-type", "error");
    bubble.setAttribute("data-freeze", "success"); // نفس المفتاح حتى يُغلقه _closeSaveAnim
    bubble.innerHTML =
      '<span class="fab-bubble-stem"></span>' +
      '<span class="fab-bubble-icon">❌</span>' +
      '<span class="fab-bubble-text">' +
      (msg || "حدث خطأ، حاول مرة أخرى") +
      "</span>";

    bubble.style.animation = "none";
    bubble.offsetHeight;
    bubble.style.animation = "fabBubbleIn 0.3s ease forwards";

    _saveAnim.timer = setTimeout(function () {
      _closeSaveAnim(false);
    }, 2500);
  }

  // [FIX-UI] _closeSaveAnim — يخفي الـ bubble
  function _closeSaveAnim(immediate) {
    if (_saveAnim.timer) clearTimeout(_saveAnim.timer);
    _saveAnim.timer = null;
    _saveAnim.el = null;

    var bubble = document.getElementById("ai-fab-bubble");
    if (!bubble) return;
    var freeze = bubble.getAttribute("data-freeze");
    if (freeze !== "save" && freeze !== "success") return;
    bubble.removeAttribute("data-freeze");

    if (immediate) {
      bubble.style.display = "none";
      return;
    }
    bubble.style.animation =
      "fabBubbleOut 0.28s cubic-bezier(0.55,0,1,0.8) forwards";
    setTimeout(function () {
      bubble.style.display = "none";
    }, 300);
  }

  // [UX] _saveAnimUpdating — يحوّل نفس الـ bubble لحالة "جار التحديث"
  // (سبينر + نص) بدون قفل/إعادة فتح — استخدامها بعد رسالة نجاح الحفظ
  // مباشرة، أثناء مزامنة البيانات الحقيقية مع السيرفر في الخلفية، حتى
  // يفهم المستخدم إن فيه عملية شغّالة فعلاً ولا تختفي الرسالة فجأة بلا تفسير.
  function _saveAnimUpdating(msg) {
    var bubble = _ensureBubble();

    // ✅ نلغي أي تايمر إغلاق معلّق من رسالة النجاح اللي قبلها
    if (_saveAnim.timer) {
      clearTimeout(_saveAnim.timer);
      _saveAnim.timer = null;
    }

    bubble.setAttribute("data-type", "info");
    bubble.setAttribute("data-freeze", "save"); // نفس مفتاح showSaveAnim حتى يتعرف عليه _closeSaveAnim
    bubble.innerHTML =
      '<span class="fab-bubble-stem"></span>' +
      '<span style="display:inline-flex;align-items:center;gap:8px;direction:rtl">' +
      '<span style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(37,99,235,0.25);border-top-color:#2563eb;animation:__spin 0.7s linear infinite;flex-shrink:0;display:inline-block"></span>' +
      '<span style="font-size:13px;font-weight:600">🔄 ' +
      (msg || "جار التحديث...") +
      "</span>" +
      "</span>";

    // لو الـ bubble كانت مقفولة بالفعل (مش حالة شائعة) — أظهرها بمكانها الصحيح
    if (!bubble.style.display || bubble.style.display === "none") {
      bubble.style.animation = "none";
      bubble.style.visibility = "hidden";
      bubble.style.display = "block";
      bubble.offsetHeight;
      _positionBubble(bubble);
      bubble.style.visibility = "";
      bubble.style.animation =
        "fabBubbleIn 0.3s cubic-bezier(0.34,1.4,0.64,1) forwards";
    }
    _saveAnim.el = bubble;
  }

  // ─────────────────────────────────────────────────────────────
  // 🚀  reloadAfterMutation v4.2 — Optimistic Update
  //
  // بدلاً من مسح الكاش وجلب كل البيانات من الباكيند بعد كل عملية:
  //   1. نحدّث APP.data محلياً فوراً (Optimistic Update)
  //   2. نعرض الـ UI المحدّث بدون انتظار
  //   3. في الخلفية نجلب getAllData() لمزامنة الحقيقة مع الباكيند
  //
  // @param {Function|null}  cb           - callback بعد تحديث UI
  // @param {Function|null}  unfreeze     - تحرير الـ freeze بعد الانتهاء
  // @param {Object|null}    animOptions  - خيارات أنيميشن الحفظ
  // @param {Object|null}    optimisticPatch - { collection, record, op: 'add'|'update'|'remove', idField }
  //   collection: اسم المصفوفة في APP.data (مثلاً "items", "groups")
  //   record: الكائن الجديد/المعدّل
  //   op: العملية ('add', 'update', 'remove')
  //   idField: اسم حقل الـ id (افتراضي 'id')
  // ─────────────────────────────────────────────────────────────
  function reloadAfterMutation(cb, unfreeze, animOptions, optimisticPatch) {
    var anim = showSaveAnim(animOptions);

    // ── Optimistic Update: حدّث الكاش المحلي فوراً ──────────────
    if (optimisticPatch && _cache.data) {
      try {
        var col = optimisticPatch.collection;
        var rec = optimisticPatch.record;
        var op = optimisticPatch.op || "update";
        var idField = optimisticPatch.idField || "id";
        var arr = _cache.data[col] || [];

        if (op === "add") {
          _cache.data[col] = arr.concat([rec]);
        } else if (op === "update") {
          _cache.data[col] = arr.map(function (item) {
            return String(item[idField]) === String(rec[idField]) ? rec : item;
          });
        } else if (op === "remove") {
          _cache.data[col] = arr.filter(function (item) {
            return String(item[idField]) !== String(rec[idField]);
          });
        }

        APP.data = _cache.data;
        // حدّث الكاش الثابت (لأن البيانات الثابتة هي الأكثر تعديلاً)
        _cache.static_ts = Date.now();
        _saveCacheOptimistic({});
      } catch (patchErr) {
        console.warn("optimisticPatch error:", patchErr);
      }
    }

    // ── تحديث UI فوري من الكاش المحلّي ──────────────────────────
    // [PERF-FIX-1] تحديث الـ UI فوراً بدون setTimeout — الـ optimisticPatch
    // حدّث APP.data بالفعل، فلا يوجد سبب للانتظار 800ms قبل رسم الشاشة.
    // نُبقي على requestAnimationFrame بدلاً من setTimeout لضمان رسم نظيف
    var _animMsg =
      animOptions && animOptions.successMsg != null
        ? animOptions.successMsg
        : "تم الحفظ بنجاح ✓";
    if (_animMsg) {
      anim.done(_animMsg);
    } else {
      _closeSaveAnim(true);
    }
    (window.requestAnimationFrame || setTimeout)(function () {
      if (cb) cb();
      else renderPage(APP.currentPage);
      updateAlertBadge();
      if (unfreeze) unfreeze();
    });

    // ── مزامنة خلفية مع الباكيند ─────────────────────────────────
    // [PERF-FIX-2] نبدأ المزامنة مبكراً (300ms بدلاً من 1200ms)
    // الـ UI اتحدّث فعلاً من الـ Optimistic Update، وبقدر نبدأ السيرفر call بسرعة
    // بدون أثر على UX — أسرع تحديث للبيانات الحقيقية
    setTimeout(function () {
      if (_cache.fetching) return;
      _cache.fetching = true;
      // ✅ [FIX] شيلنا استدعاء _saveAnimUpdating() هنا:
      // بما إن addGroup/updateGroup (وكل عمليات الحفظ التانية) بتستدعي
      // _invalidateServerCache() عقب كل نجاح، فأي getAllData() جاي فورًا
      // بعدها هيكون Cache MISS مضمون، وهيضطر يقرا كل الشيتات من جديد —
      // ده بياخد وقت أطول بكتير من الـ Optimistic Update اللي ظهر فورًا
      // في الجدول. فكان المستخدم بيشوف السطر الجديد ظاهر، ومع ذلك رسالة
      // "جار التحديث..." لسه شغالة لثواني كمان — بتوهم إن فيه حاجة عالقة
      // مع إن الحفظ خلص فعليًا. المزامنة الخلفية دلوقتي صامتة بالكامل؛
      // هتفشل أو تنجح من غير ما تفضل معلّقة رسالة على الشاشة.
      DL.Core.getAllData({
        label: "Auth.backgroundSync",
        onSuccess: function (result) {
          _cache.fetching = false;
          _closeSaveAnim(false); // ✅ يقفل بهدوء بعد اكتمال التحديث الحقيقي
          var d = result.data;
          if (!d || typeof d !== "object") return;
          try {
            var fresh = _parseData(d);
            _saveCache(fresh);
            _applyFreshData(fresh);
            // لا تعمل re-render لصفحات الوارد/الصادر/التحويل
            // عشان متمسحش الفورم لو المستخدم شغّال عليه
            var _noRerender = ["tx_in", "tx_out", "tx_transfer"];
            // [PERF-FIX-BGS] تحقق من إن المستخدم مش بيكتب في أي حقل قبل الـ re-render
            var _bgActiveEl = document.activeElement;
            var _bgUserTyping =
              _bgActiveEl &&
              (_bgActiveEl.tagName === "INPUT" ||
                _bgActiveEl.tagName === "TEXTAREA" ||
                _bgActiveEl.tagName === "SELECT" ||
                _bgActiveEl.isContentEditable);
            if (_noRerender.indexOf(APP.currentPage) === -1 && !_bgUserTyping) {
              // [PERF-FIX-BGS] وسّم كـ silent refresh عشان يتجنب الـ fade flicker
              APP._fromSilentRefresh = true;
              renderPage(APP.currentPage);
              APP._fromSilentRefresh = false;
            }
            updateAlertBadge();
            updateNotifBell();
          } catch (e) {
            console.warn("Background sync error:", e);
          }
        },
        onError: function (result) {
          _cache.fetching = false;
          _closeSaveAnim(true); // ✅ يقفل فوراً — الحفظ الأصلي نجح، دي مجرد مزامنة خلفية فشلت
          console.warn("Background sync failed:", result.message);
          // عند الفشل: أعد مسح الكاش ليُجبر المستخدم على refresh حقيقي
          _cache.data = null;
          _cache.ts = 0;
        },
      });
    }, 300); // [PERF-FIX-2] 300ms بدلاً من 1200ms
  }

  // ─────────────────────────────────────────────────────────────
  // reloadAfterMutationFull — للحالات التي نحتاج فيها تحديثاً كاملاً
  // (مثل: استيراد Excel، تعديل الرصيد الافتتاحي، backup)
  // ─────────────────────────────────────────────────────────────
  function reloadAfterMutationFull(cb, unfreeze, animOptions) {
    _cache.data = null;
    _cache.ts = 0;
    try {
      sessionStorage.removeItem("wms_cache");
      sessionStorage.removeItem("wms_cache_static");
      sessionStorage.removeItem("wms_cache_dynamic");
    } catch (e) {}

    var anim = showSaveAnim(animOptions);

    DL.Core.getAllDataFresh({
      label: "Auth.reloadAfterMutationFull",
      onSuccess: function (result) {
        var d = result.data;
        if (!d || typeof d !== "object") {
          anim.fail("البيانات المستلمة غير صحيحة");
          if (unfreeze) setTimeout(unfreeze, 1700);
          return;
        }
        try {
          var fresh = _parseData(d);
          _saveCache(fresh);
          _applyFreshData(fresh);
        } catch (parseErr) {
          anim.fail("خطأ في معالجة البيانات");
          if (unfreeze) setTimeout(unfreeze, 1700);
          return;
        }
        anim.done(
          (animOptions && animOptions.successMsg) || "تم الحفظ بنجاح ✓",
        );
        // [PERF-FIX-3] لا حاجة لـ 1200ms إضافية — البيانات وصلت بالفعل من السيرفر
        // نعرض الـ UI فوراً بعد رسم الـ animation frame
        (window.requestAnimationFrame || setTimeout)(function () {
          if (cb) cb();
          else renderPage(APP.currentPage);
          updateAlertBadge();
          if (unfreeze) unfreeze();
        });
      },
      onError: function (result) {
        anim.fail("خطأ: " + (result.message || "حاول مرة أخرى"));
        setTimeout(function () {
          if (unfreeze) unfreeze();
          loadAllData();
        }, 1700);
      },
    });
  }

    if (typeof ROLE_LABELS !== "undefined") {
      Object.keys(ERP_ROLES).forEach(function (key) {
        var role = ERP_ROLES[key];
        var translated =
          typeof I18N !== "undefined" && I18N.t ? I18N.t(role.labelKey) : null;
        // I18N.t يرجّع "⟦KEY⟧" لو القاموس لسه مش جاهز أو المفتاح ناقص — في الحالة دي نستخدم
        // النص العربي الأصلي كـ fallback آمن بدل ما نعرض المفتاح الخام للمستخدم.
        ROLE_LABELS[key] =
          translated && translated.indexOf("⟦") !== 0 ? translated : role.label;
      });
    }

    // د-merge صلاحيات الأدوار الجديدة
    if (typeof ROLE_PERMISSIONS !== "undefined") {
      Object.keys(ERP_ROLE_PERMISSIONS).forEach(function (role) {
        ROLE_PERMISSIONS[role] = ERP_ROLE_PERMISSIONS[role];
      });
    }
  }

  // دمج مجموعات التنقل مع النظام الحالي
  function _initERPNavGroups() {
    if (typeof NAV_GROUPS !== "undefined") {
      var existingGroups = {};
      var existingPages = {};
      NAV_GROUPS.forEach(function (g) {
        existingGroups[g.group] = true;
        (g.items || []).forEach(function (it) {
          existingPages[it.page] = true;
        });
      });

      // إدراج مجموعات المحاسبة وHR بعد Dashboard
      var dashboardIdx = NAV_GROUPS.findIndex(function (g) {
        return (
          g.items &&
          g.items.some(function (i) {
            return i.page === "dashboard";
          })
        );
      });

      ERP_NAV_GROUPS.forEach(function (group, i) {
        var filteredItems = (group.items || []).filter(function (it) {
          return !existingPages[it.page];
        });
        if (!filteredItems.length) return;

        // ⚠️ [FIX] لو القسم موجود مسبقًا في NAV_GROUPS (مثل "الموارد البشرية"
        // المضاف يدويًا في 02_JS_UI_Shell.html)، كان الكود القديم يتجاهل
        // القسم بالكامل ولا يضيف عناصره الجديدة (مثل "مراحل الإنتاج") إطلاقًا،
        // فتختفي الصفحة بصمت من السايد بار رغم أنها مسجّلة وتعمل فعليًا.
        // الحل: لو القسم موجود، ندمج العناصر الناقصة داخله بدل تجاهله بالكامل.
        if (existingGroups[group.group]) {
          var existingGroupObj = NAV_GROUPS.filter(function (g) {
            return g.group === group.group;
          })[0];
          if (existingGroupObj) {
            existingGroupObj.items = (existingGroupObj.items || []).concat(
              filteredItems,
            );
            filteredItems.forEach(function (it) {
              existingPages[it.page] = true;
            });
          }
          return;
        }

        var groupToInsert = Object.assign({}, group, { items: filteredItems });
        var insertIdx =
          dashboardIdx !== -1 ? dashboardIdx + 1 + i : NAV_GROUPS.length;
        NAV_GROUPS.splice(insertIdx, 0, groupToInsert);
        existingGroups[group.group] = true;
        filteredItems.forEach(function (it) {
          existingPages[it.page] = true;
        });
      });
    }
  }

    <script>

  // JS_UI_Shell.html — جزء 2/10 من JavaScript.html الأصلي

  // ─────────────────────────────────────────────────────────────
  // 🛡️  شبكة أمان عامة للأخطاء — GLOBAL ERROR SAFETY NET
  //
  // الهدف: أي خطأ غير متوقع في أي مكان في السيستم (استثناء JS لم
  // يُعالَج، أو Promise مرفوض من غير .catch) لازم يظهر للمستخدم
  // برسالة واضحة بدل ما يفضل صامت (أو صوت بس من غير رسالة تشرح السبب).
  // ده مش بديل عن معالجة الأخطاء الصحيحة في كل شاشة (SaveEngine/
  // withFailureHandler) — ده خط دفاع أخير بس لأي حاجة فلتت منهم.
  // ─────────────────────────────────────────────────────────────
  (function () {
    var _lastGlobalErrAt = 0;
    function _notifyGlobalError(message) {
      // منع إغراق المستخدم بعشرات الرسايل لو نفس الخطأ بيتكرر كل فريم
      var now = Date.now();
      if (now - _lastGlobalErrAt < 1200) return;
      _lastGlobalErrAt = now;
      if (typeof showToast === "function") {
        showToast(
          I18N.t("SHELL_MSG_ERROR_ICON_PREFIX") + " " + message,
          "error",
        );
      }
      if (typeof _unfreezeUI === "function") {
        try {
          _unfreezeUI();
        } catch (e) {}
      }
    }

    window.addEventListener("error", function (e) {
      var msg = (e && (e.message || (e.error && e.error.message))) || "";
      _notifyGlobalError(msg || I18N.t("SHELL_ERR_UNEXPECTED_PAGE"));
    });

    window.addEventListener("unhandledrejection", function (e) {
      var reason = e && e.reason;
      var msg =
        (reason && (reason.message || String(reason))) ||
        I18N.t("SHELL_ERR_UNEXPECTED_REQUEST");
      _notifyGlobalError(msg);
    });
  })();

  // ─────────────────────────────────────────────────────────────

  // ---------- Auth ----------

  function bindLogin() {
    // ✅ [PRE-LOGIN-PREFETCH] ابدأ تحميل البيانات فوراً مع ظهور شاشة اللوجين
    if (typeof _startPrefetch === "function") _startPrefetch();

    var btn = document.getElementById("btn-login");
    var pass = document.getElementById("l-pass");
    var user = document.getElementById("l-user");
    btn.addEventListener("click", doLogin);

    // ✅ ربط زر "نسيت كلمة المرور؟" بشاشة الاستعادة (39_JS_ForgotPassword.html)
    if (typeof bindForgotPasswordLink === "function") bindForgotPasswordLink();
    pass.addEventListener("keydown", function (e) {
      if (e.key === "Enter") doLogin();
    });
    user.addEventListener("keydown", function (e) {
      if (e.key === "Enter") doLogin();
    });

    // ── تأثير التركيز على الحقول (يلوّن الـ label عند الكتابة) ──
    [
      ["fld-user", "l-user"],
      ["fld-pass", "l-pass"],
    ].forEach(function (pair) {
      var fieldEl = document.getElementById(pair[0]);
      var inputEl = document.getElementById(pair[1]);
      if (!fieldEl || !inputEl) return;
      inputEl.addEventListener("focus", function () {
        fieldEl.classList.add("focused");
      });
      inputEl.addEventListener("blur", function () {
        fieldEl.classList.remove("focused");
      });
    });

    // ── إظهار/إخفاء كلمة المرور ──────────────────────────────
    var eyeBtn = document.getElementById("l-pass-toggle");
    if (eyeBtn) {
      eyeBtn.addEventListener("click", function () {
        var icon = document.getElementById("l-pass-eye-icon");
        if (pass.type === "password") {
          pass.type = "text";
          if (icon) {
            icon.classList.remove("ti-eye");
            icon.classList.add("ti-eye-off");
          }
        } else {
          pass.type = "password";
          if (icon) {
            icon.classList.remove("ti-eye-off");
            icon.classList.add("ti-eye");
          }
        }
        pass.focus();
      });
    }

    // ── تأثير Ripple عند الضغط على زر الدخول ─────────────────
    btn.addEventListener("click", function (e) {
      var rect = btn.getBoundingClientRect();
      var size = 220;
      var r = document.createElement("span");
      r.className = "login-ripple";
      r.style.width = size + "px";
      r.style.height = size + "px";
      r.style.left = e.clientX - rect.left - size / 2 + "px";
      r.style.top = e.clientY - rect.top - size / 2 + "px";
      btn.appendChild(r);
      setTimeout(function () {
        r.remove();
      }, 600);
    });

    _loginPrefillRemember();
    _setLoginGreeting();
    _initLoginSlideshow();
  }

  // ── رسالة ترحيب حسب وقت اليوم ───────────────────────────────
  function _setLoginGreeting() {
    var el = document.getElementById("login-greet");
    if (!el) return;
    var h = new Date().getHours();
    var g =
      h >= 5 && h < 12
        ? I18N.t("SHELL_GREETING_MORNING")
        : h >= 12 && h < 17
          ? I18N.t("SHELL_GREETING_AFTERNOON")
          : h >= 17 && h < 21
            ? I18N.t("SHELL_GREETING_EVENING")
            : I18N.t("SHELL_GREETING_DEFAULT");
    el.textContent = g;
  }

  // ── تذكّر اسم المستخدم (Frontend فقط — لا علاقة له بالأمان) ──
  function _loginPrefillRemember() {
    try {
      var saved = localStorage.getItem("wms_remember_user");
      var u = document.getElementById("l-user");
      var rc = document.getElementById("l-remember");
      if (saved && u && rc) {
        u.value = saved;
        rc.checked = true;
      }
    } catch (e) {}
  }
  function _loginSaveRemember(username) {
    try {
      var rc = document.getElementById("l-remember");
      if (rc && rc.checked) {
        localStorage.setItem("wms_remember_user", username);
      } else {
        localStorage.removeItem("wms_remember_user");
      }
    } catch (e) {}
  }

  // ── HTML الداخلي لزر الدخول (مستخدَم لإعادة الزر لحالته الطبيعية) ──
  function _loginBtnHTML(text, locked) {
    if (locked) {
      return '<span style="font-size:15px">🔒</span><span>' + text + "</span>";
    }
    return (
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>' +
      "<span>" +
      text +
      "</span>" +
      '<span class="login-btn-glow"></span>'
    );
  }

  // ── العرض المتحرك (Slideshow) لموديولات النظام — شاشة الدخول ──
  // ينقل تلقائياً كل 5 ثوانٍ بين الشرائح، مع إمكانية الانتقال اليدوي
  // بالضغط على إحدى النقاط (dots). يتوقف تلقائياً لو الـ stage اتشال
  // من الصفحة (تسجيل دخول ناجح / إعادة render).
  var _loginSlideTimer = null;
  function _initLoginSlideshow() {
    var stage = document.getElementById("show-stage");
    var nav = document.getElementById("show-nav");
    if (!stage || !nav) return;

    var slides = Array.prototype.slice.call(stage.querySelectorAll(".slide"));
    var dots = Array.prototype.slice.call(nav.querySelectorAll(".show-dot"));
    var total = slides.length;
    if (!total) return;

    var current = slides.findIndex(function (s) {
      return s.classList.contains("active");
    });
    if (current < 0) current = 0;

    if (_loginSlideTimer) {
      clearTimeout(_loginSlideTimer);
      _loginSlideTimer = null;
    }

    function goTo(i) {
      if (!document.body.contains(stage)) return; // الصفحة اتغيّرت
      slides[current].classList.remove("active");
      if (dots[current]) {
        dots[current].classList.remove("current");
        dots[current].classList.add("done");
      }
      current = i;
      dots.forEach(function (d, idx) {
        d.classList.remove("current");
        if (idx < current) d.classList.add("done");
        else d.classList.remove("done");
      });
      slides[current].classList.add("active");
      if (dots[current]) dots[current].classList.add("current");
      restart();
    }

    function next() {
      goTo((current + 1) % total);
    }

    function restart() {
      clearTimeout(_loginSlideTimer);
      // ✅ توقّف تلقائي لو شاشة الدخول اتشالت (دخول ناجح/تغيير صفحة)
      _loginSlideTimer = setTimeout(function () {
        if (!document.body.contains(stage)) return;
        next();
      }, 5000);
    }

    dots.forEach(function (d, idx) {
      d.addEventListener("click", function () {
        goTo(idx);
      });
    });

    restart();
  }

  // ─────────────────────────────────────────────────────────────

  // ─────────────────────────────────────────────────────────────

  var SESSION = {

  };

  function _initSession(loginResponse) {
    if (!loginResponse || !loginResponse.sessionToken) return;
    SESSION.token = loginResponse.sessionToken;
    SESSION.expiresAt = loginResponse.sessionExpiresAt;
    SESSION.idleTimeout = loginResponse.idleTimeoutMinutes || 60;
    try {
      // [FIX-MULTITAB-LOGOUT] localStorage بدل sessionStorage: التوكن بقى
      // مشترك بين كل تابات نفس المتصفح بدل ما كل تاب يعمل جلسة منفصلة —
      // ده كان بيسبب تسجيل خروج تلقائي لأي تاب قديم بمجرد ما عدد التابات
      // المفتوحة (كل واحد جلسة مستقلة) يتخطى SESSION_CONFIG.MAX_SESSIONS_PER_USER.
      localStorage.setItem("wms_session_token", SESSION.token);
      localStorage.setItem("wms_session_expires", String(SESSION.expiresAt));
      localStorage.setItem(
        "wms_session_idle_min",
        String(SESSION.idleTimeout),
      );
    } catch (e) {}
    _startIdleWatcher();
    _startSessionCountdown();
  }

  function _restoreSession() {
    try {
      var token = localStorage.getItem("wms_session_token");
      var expires = parseInt(
        localStorage.getItem("wms_session_expires") || "0",
      );
      var idle = parseInt(
        localStorage.getItem("wms_session_idle_min") || "60",
      );
      if (token && expires && Date.now() < expires) {
        SESSION.token = token;
        SESSION.expiresAt = expires;
        SESSION.idleTimeout = idle;
        return true;
      }
    } catch (e) {}
    return false;
  }

  function _clearSession() {
    SESSION.token = null;
    SESSION.expiresAt = null;
    SESSION._warningShown = false;
    _stopIdleWatcher();
    _stopSessionCountdown();
    var _banner = document.getElementById("__session-warning");
    if (_banner) _banner.remove();
    try {
      localStorage.removeItem("wms_session_token");
      localStorage.removeItem("wms_session_expires");
      localStorage.removeItem("wms_session_idle_min");
    } catch (e) {}
  }

  // ─────────────────────────────────────────────────────────────
  // [FIX-MULTITAB-LOGOUT] مزامنة تسجيل الخروج بين تابات نفس المتصفح.
  // بما إن توكن الجلسة بقى في localStorage (مشترك)، أي تاب يعمل تسجيل
  // خروج (أو ينتهي جلسته) يمسح المفتاح، فبتوصل event "storage" لكل
  // التابات التانية المفتوحة على نفس الأصل فورًا — فبنسجّل خروج التاب ده
  // كمان محليًا (من غير ما نبعت طلب logout تاني للسيرفر، لأنه اتبعت
  // بالفعل من التاب اللي عمل الخروج الأصلي).
  // ─────────────────────────────────────────────────────────────
  window.addEventListener("storage", function (e) {
    if (e.key !== "wms_session_token") return;
    if (e.newValue || !APP.currentUser) return; // لسه فيه توكن، أو التاب ده أصلاً مش مسجّل دخول
    _clearSession();
    APP.currentUser = null;
    APP.currentPage = "dashboard";
    try {
      _preloadDone = false;
    } catch (err) {}
    APP.extLoaded = false;
    APP.extLoading = false;
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML = renderLogin();
      bindLogin();
    }
    setTimeout(function () {
      var errEl = document.getElementById("login-err");
      if (errEl) {
        errEl.style.display = "block";
        errEl.style.background = "var(--warning-soft,#fef3c7)";
        errEl.style.color = "var(--warning-dark,#92400e)";
        errEl.textContent = "🔒 تم تسجيل الخروج من تاب آخر لنفس الحساب";
      }
    }, 100);
  });

  // ── Idle Watcher ──────────────────────────────────────────
  var _idleLastActivity = Date.now();
  var _idleDebounceTimer = null; // v4.2: Debounce لتقليل العبء

  function _resetIdleTimer() {
    // Debounce: نحدّث فقط كل 300ms بدل كل حدث
    if (_idleDebounceTimer) return;
    _idleDebounceTimer = setTimeout(function () {
      _idleDebounceTimer = null;
      _idleLastActivity = Date.now();
      SESSION._warningShown = false;
      var banner = document.getElementById("__session-warning");
      if (banner) banner.remove();
    }, 300);
  }

  function _startIdleWatcher() {
    _stopIdleWatcher();
    ["mousemove", "keydown", "click", "scroll", "touchstart"].forEach(
      function (ev) {
        document.addEventListener(ev, _resetIdleTimer, { passive: true });
      },
    );
    SESSION._idleTimer = setInterval(function () {
      if (!SESSION.token || !APP.currentUser) return;
      var idleSec = (Date.now() - _idleLastActivity) / 1000;
      var idleLimit = SESSION.idleTimeout * 60;
      var warnAt = idleLimit - SESSION.WARN_BEFORE_MIN * 60;
      if (idleSec >= idleLimit) {
        _handleSessionExpired("timeout");
      } else if (idleSec >= warnAt && !SESSION._warningShown) {
        SESSION._warningShown = true;
        _showIdleWarning(Math.ceil((idleLimit - idleSec) / 60));
      }
    }, 30000);
  }

  function _stopIdleWatcher() {
    if (SESSION._idleTimer) {
      clearInterval(SESSION._idleTimer);
      SESSION._idleTimer = null;
    }
    ["mousemove", "keydown", "click", "scroll", "touchstart"].forEach(
      function (ev) {
        document.removeEventListener(ev, _resetIdleTimer);
      },
    );
  }

  function _startSessionCountdown() {
    _stopSessionCountdown();
    SESSION._countdownTimer = setInterval(function () {
      if (!SESSION.token || !APP.currentUser) return;
      var remaining = SESSION.expiresAt - Date.now();
      if (remaining <= 0) {
        _handleSessionExpired("expired");
        return;
      }
      if (remaining < 10 * 60 * 1000 && !SESSION._warningShown) {
        SESSION._warningShown = true;
        _showIdleWarning(Math.ceil(remaining / 60000));
      }
    }, 60000);
  }

  function _stopSessionCountdown() {
    if (SESSION._countdownTimer) {
      clearInterval(SESSION._countdownTimer);
      SESSION._countdownTimer = null;
    }
  }

  // ── Session Warning Banner ─────────────────────────────────
  function _showIdleWarning(remainingMinutes) {
    var existing = document.getElementById("__session-warning");
    if (existing) existing.remove();

    if (!document.getElementById("__session-banner-style")) {
      var st = document.createElement("style");
      st.id = "__session-banner-style";
      st.textContent =
        "@keyframes __bannerSlide{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}";
      document.head.appendChild(st);
    }

    var countdownId = "__sc-" + Date.now();
    var banner = document.createElement("div");
    banner.id = "__session-warning";
    banner.style.cssText =
      "position:fixed;top:0;left:0;right:0;z-index:999999;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:var(--font-arabic,sans-serif);direction:rtl;box-shadow:0 4px 20px rgba(0,0,0,0.25);animation:__bannerSlide 0.4s cubic-bezier(0.34,1.4,0.64,1) forwards";
    banner.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;flex:1">' +
      '<span style="font-size:20px">⏰</span>' +
      "<div>" +
      '<div style="font-size:13px;font-weight:800">تنبيه: ستنتهي جلستك قريباً</div>' +
      '<div style="font-size:12px;opacity:0.9">ستنتهي الجلسة بعد <strong id="' +
      countdownId +
      '">' +
      remainingMinutes +
      "</strong> دقيقة بسبب عدم النشاط</div>" +
      "</div>" +
      "</div>" +
      '<div style="display:flex;gap:8px;flex-shrink:0">' +
      '<button onclick="_extendSession()" style="background:rgba(255,255,255,0.2);color:#fff;border:1.5px solid rgba(255,255,255,0.5);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-arabic,sans-serif)">🔄 تمديد الجلسة</button>' +
      '<button onclick="document.getElementById(\'__session-warning\').remove();SESSION._warningShown=false" style="background:transparent;color:rgba(255,255,255,0.7);border:none;padding:6px;font-size:16px;cursor:pointer">✕</button>' +
      "</div>";
    document.body.appendChild(banner);

    var cd = remainingMinutes;
    var cdTimer = setInterval(function () {
      cd--;
      var el = document.getElementById(countdownId);
      if (el) el.textContent = cd;
      if (cd <= 0) clearInterval(cdTimer);
    }, 60000);
  }

  function _extendSession() {
    if (!SESSION.token) return;
    DL.Users.refreshSession(SESSION.token, {
      label: "Shell.extendSession",
      onSuccess: function (result) {
        var res = result.data;
        if (res && res.valid) {
          _resetIdleTimer();
          var banner = document.getElementById("__session-warning");
          if (banner) {
            banner.style.background = "linear-gradient(135deg,#10b981,#059669)";
            var title = banner.querySelector("div div div:first-child");
            if (title) title.textContent = "✅ تم تمديد الجلسة بنجاح";
            setTimeout(function () {
              if (banner.parentNode) banner.remove();
            }, 2000);
          }
          showToast(I18N.t("SHELL_MSG_SESSION_EXTEND_SUCCESS"), "success");
        } else {
          _handleSessionExpired("expired");
        }
      },
      onError: function () {
        showToast(I18N.t("SHELL_MSG_SESSION_EXTEND_FAIL"), "warning");
      },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // §SEC-A2  [SESSION-FIX] كشف مركزي لأخطاء الجلسة القادمة من السيرفر
  //
  // المشكلة: 281+ نقطة استدعاء في الباك إند كانت ترفض الطلب برسالة "جلسة غير
  // صالحة" (عبر _checkPermission وغيرها)، لكن الواجهة كانت تعرض الرسالة كـ
  // toast عادي في مكان الشاشة فقط (NotificationService.error / showToast)
  // بدون أي ربط بدورة حياة الجلسة الفعلية — فيظهر الخطأ في أي مكان بدون أي
  // تفسير أو إجراء تالٍ، والمستخدم يفضل عالق على نفس الشاشة المعطوبة.
  // بينما _handleSessionExpired (اللي بيعمل logout نظيف + يرجّع شاشة الدخول
  // مع رسالة واضحة) كان موصول فقط بمؤقت الخمول الجانب-عميل، مش بردود
  // السيرفر الفعلية.
  //
  // الحل: أي دالة backend ترفض بسبب جلسة الآن ترجع code:"SESSION_INVALID"
  // (راجع errResponse في Code_12_Core.gs). هذه الدالة تفحص الـ code أولاً
  // (الاعتماد الأساسي)، مع fallback لمطابقة نص الرسالة للدوال القديمة التي
  // لم تُحدَّث بعد. تُستدعى من _gsr (31_JS_DataLayer.html) و SaveEngine
  // (32_JS_SaveEngine.html) في نقطة واحدة موحّدة.
  // ─────────────────────────────────────────────────────────────
  function _isSessionErrorResponse(raw) {
    if (!raw || typeof raw !== "object") return false;
    if (raw.code === "SESSION_INVALID") return true;
    var msg = String(raw.message || "");
    return /جلسة غير صالحة|جلستك انتهت|جلسة.*منتهية|خطأ في التحقق من الهوية/.test(
      msg,
    );
  }

  function _handleSessionExpired(reason) {
    var token = SESSION.token;
    var username = APP.currentUser ? APP.currentUser.username : null;
    _clearSession();
    if (token) {
      try {
        DL.Users.logout(token, username, {
          onSuccess: function () {},
          onError: function () {},
        });
      } catch (e) {}
    }
    APP.currentUser = null;
    APP.currentPage = "dashboard";
    // [PRELOAD-RESET] إعادة تعيين علامة الـ preload عند اللوج اوت
    try {
      _preloadDone = false;
    } catch (e) {}
    APP.extLoaded = false;
    APP.extLoading = false;
    try {
      sessionStorage.clear();
    } catch (e) {}
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML = renderLogin();
      bindLogin();
    }
    var msgs = {
      timeout: "⏰ انتهت جلستك بسبب عدم النشاط — يرجى تسجيل الدخول مجدداً",
      expired: "🔒 انتهت صلاحية الجلسة — يرجى تسجيل الدخول مجدداً",
      invalid: "⛔ جلستك غير صالحة أو انتهت — يرجى تسجيل الدخول مجدداً",
    };
    setTimeout(function () {
      var errEl = document.getElementById("login-err");
      if (errEl) {
        errEl.style.display = "block";
        errEl.style.background = "var(--warning-soft,#fef3c7)";
        errEl.style.color = "var(--warning-dark,#92400e)";
        errEl.textContent = msgs[reason] || msgs.expired;
      }
    }, 100);
  }

  // ─────────────────────────────────────────────────────────────
  // §SEC-B  Rate Limit UI v4.2 — عداد الحظر (مُزامَن مع Backend)
  //
  // التغييرات عن v4.1:
  //  [1] _startLockCountdown تقبل lockedUntil (timestamp مطلق)
  //      بدل seconds نسبية — يضمن استمرار العداد بعد Refresh
  //  [2] _showAttemptsWarning — شريط تحذير المحاولات المتبقية
  //  [3] _handleLoginResponse — معالج موحَّد لردود البنكند
  //  [4] حُذفت _handleRateLimitError (كانت تُشغّل عداداً جديداً
  //      من الصفر بدل استئناف الوقت المتبقي الحقيقي)
  // ─────────────────────────────────────────────────────────────

  var _loginLockTimer = null;
  var _loginLockEnds = null; // timestamp مطلق (ms) مُزامَن مع Backend

  // ─────────────────────────────────────────────────────────────
  // [SEC-LOGIN-CAPTCHA] تحدي بشري بسيط (كابتشا رياضية داخلية) —
  // طبقة احتكاك إضافية أمام السكربتات الآلية، تظهر بعد محاولتين
  // فاشلتين (remainingAttempts <= 3 من أصل MAX_ATTEMPTS=5).
  // ⚠️ هذه ليست بديلاً عن الحماية الحقيقية — الحماية الفعلية تظل
  // بالكامل في الباك اند (_checkRateLimit / _recordFailedAttempt في
  // Code_12_Core.gs)؛ هذه فقط تُبطئ محاولات السكربتات الآلية البسيطة
  // من الفرونت قبل ما تتحرك أصلاً، ومفيش أي تحقق منها في السيرفر.
  // ─────────────────────────────────────────────────────────────
  var _loginCaptchaRequired = false;
  var _loginCaptchaAnswer = null;

  function _renderLoginCaptcha() {
    var existing = document.getElementById("__login-captcha");
    if (existing) existing.remove();

    var a = 1 + Math.floor(Math.random() * 9);
    var b = 1 + Math.floor(Math.random() * 9);
    _loginCaptchaAnswer = a + b;
    _loginCaptchaRequired = true;

    var box = document.createElement("div");
    box.id = "__login-captcha";
    box.className = "login-captcha-box";
    box.innerHTML =
      '<div class="login-captcha-row">' +
      '<span class="login-captcha-q">' +
      a +
      " + " +
      b +
      " = ؟</span>" +
      '<input type="text" inputmode="numeric" maxlength="3" id="__captcha-input" class="input" placeholder="' +
      esc(I18N.t("SHELL_CAPTCHA_PLACEHOLDER")) +
      '">' +
      '<span id="__captcha-ok" style="display:none" class="login-captcha-ok">✔</span>' +
      "</div>" +
      '<div style="font-size:10.5px;color:var(--palette-slate-500,#94a3b8);margin-top:6px">' +
      esc(I18N.t("SHELL_CAPTCHA_HINT")) +
      "</div>";

    var errEl = document.getElementById("login-err");
    if (errEl && errEl.parentNode)
      errEl.parentNode.insertBefore(box, errEl.nextSibling);

    var input = document.getElementById("__captcha-input");
    var okMark = document.getElementById("__captcha-ok");
    input.addEventListener("input", function () {
      if (parseInt(input.value, 10) === _loginCaptchaAnswer) {
        _loginCaptchaRequired = false;
        okMark.style.display = "inline";
        input.disabled = true;
        input.style.borderColor = "#22c55e";
      } else {
        okMark.style.display = "none";
      }
    });
  }

  function _removeLoginCaptcha() {
    _loginCaptchaRequired = false;
    _loginCaptchaAnswer = null;
    var box = document.getElementById("__login-captcha");
    if (box) box.remove();
  }

  /**
   * _startLockCountdown — يبدأ عداد الحظر المرئي (v4.2)
   *
   * @param {number} lockedUntil — timestamp مطلق (ms) من Backend
   *
   * ⚠️ الفرق عن v4.1: كانت تأخذ "seconds" وتحسب النهاية في الفرونت.
   * الآن تأخذ timestamp مطلقاً من البنكند مباشرة، فعند Refresh
   * يُعاد نفس الـ lockedUntil من البنكند والعداد يستأنف بدقة.
   */
  function _startLockCountdown(lockedUntil) {
    _loginLockEnds = lockedUntil;
    var remaining = Math.ceil((lockedUntil - Date.now()) / 1000);
    if (remaining <= 0) {
      _removeLockBanner();
      _enableLoginForm();
      return;
    }
    _renderLockBanner(remaining);
    if (_loginLockTimer) clearInterval(_loginLockTimer);
    _loginLockTimer = setInterval(function () {
      var rem = Math.ceil((_loginLockEnds - Date.now()) / 1000);
      if (rem <= 0) {
        clearInterval(_loginLockTimer);
        _loginLockTimer = null;
        _loginLockEnds = null;
        _removeLockBanner();
        _enableLoginForm();
        return;
      }
      _updateLockBanner(rem);
    }, 1000);
    _disableLoginForm();
  }

  /**
   * _showAttemptsWarning — شريط تحذير المحاولات المتبقية (جديد v4.2)
   * يظهر أسفل رسالة الخطأ بلون برتقالي قبل الوصول للقفل
   */
  function _showAttemptsWarning(remaining) {
    var existing = document.getElementById("__attempts-warn");
    if (existing) existing.remove();
    if (remaining === 1) return; // مش هنحذر — سيُغلق الحساب في المحاولة الجاية مباشرة
    var text = "";
    if (remaining === 2) text = "⚠️ تبقَّت محاولتان قبل إغلاق الحساب";
    else text = "⚠️ تبقَّت " + remaining + " محاولات قبل إغلاق الحساب";
    var warn = document.createElement("div");
    warn.id = "__attempts-warn";
    warn.style.cssText =
      "background:var(--warning-soft,#fef3c7);border:1.5px solid var(--warning,#f59e0b);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;font-weight:600;color:var(--warning-dark,#92400e);direction:rtl;text-align:center;animation:__fadeIn 0.3s ease";
    warn.textContent = text;
    var errEl = document.getElementById("login-err");
    if (errEl && errEl.parentNode)
      errEl.parentNode.insertBefore(warn, errEl.nextSibling);

    // [SEC-LOGIN-CAPTCHA] بعد محاولتين فاشلتين (باقي 3 من 5) — فعّل
    // التحدي البشري كطبقة احتكاك إضافية قبل القفل الكامل من الباك اند
    if (remaining <= 3) _renderLoginCaptcha();
  }

  function _fmtCountdown(s) {
    var m = Math.floor(s / 60),
      sc = s % 60;
    return (m < 10 ? "0" : "") + m + ":" + (sc < 10 ? "0" : "") + sc;
  }

  function _renderLockBanner(seconds) {
    var existing = document.getElementById("__lock-banner");
    if (existing) existing.remove();
    if (!document.getElementById("__lock-style")) {
      var st = document.createElement("style");
      st.id = "__lock-style";
      st.textContent =
        "@keyframes __fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}";
      document.head.appendChild(st);
    }
    var banner = document.createElement("div");
    banner.id = "__lock-banner";
    banner.style.cssText =
      "background:var(--danger-soft,#fee2e2);border:2px solid var(--danger,#ef4444);border-radius:12px;padding:16px 20px;margin:12px 0;direction:rtl;text-align:center;animation:__fadeIn 0.3s ease forwards";
    banner.innerHTML =
      '<div style="font-size:28px;margin-bottom:8px">🔒</div>' +
      '<div style="font-size:14px;font-weight:800;color:var(--danger,#ef4444);margin-bottom:6px">تم تأمين الحساب مؤقتاً</div>' +
      '<div style="font-size:12px;color:var(--text2,#475569);margin-bottom:12px">بسبب محاولات دخول متكررة — يمكنك المحاولة مجدداً بعد:</div>' +
      '<div id="__lock-countdown" style="font-size:36px;font-weight:900;font-family:var(--font-mono,monospace);color:var(--danger,#ef4444);letter-spacing:4px;background:var(--surface,#fff);border-radius:8px;padding:8px 20px;display:inline-block;border:2px solid var(--danger,#ef4444)">' +
      _fmtCountdown(seconds) +
      "</div>" +
      '<div style="font-size:11px;color:var(--text3,#94a3b8);margin-top:10px">🛡️ هذا الإجراء يحمي حسابك من الاختراق</div>' +
      '<div style="font-size:10px;color:var(--text3,#94a3b8);margin-top:4px">القفل يُطبَّق من الخادم — لا يمكن تجاوزه بإعادة تحميل الصفحة</div>';
    var errEl = document.getElementById("login-err");
    if (errEl && errEl.parentNode)
      errEl.parentNode.insertBefore(banner, errEl.nextSibling);
  }

  function _updateLockBanner(remaining) {
    var el = document.getElementById("__lock-countdown");
    if (el) el.textContent = _fmtCountdown(remaining);
  }
  function _removeLockBanner() {
    var b = document.getElementById("__lock-banner");
    if (b) b.remove();
    var w = document.getElementById("__attempts-warn");
    if (w) w.remove();
  }
  function _disableLoginForm() {
    var btn = document.getElementById("btn-login"),
      u = document.getElementById("l-user"),
      p = document.getElementById("l-pass");
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = _loginBtnHTML(
        I18N.t("SHELL_MSG_ACCOUNT_LOCKED_SHORT"),
        true,
      );
    }
    if (u) u.disabled = true;
    if (p) p.disabled = true;
  }
  function _enableLoginForm() {

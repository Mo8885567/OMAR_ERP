    <!-- ═══════════════════════════════════════════════════════

      <style>
  /* ═══════════════════════════════════════════════════════════════
   Style_01_Tokens.html — جزء من Style.html الأصلي (تقسيم آلي نصي بحت، 2026-07-04)
   راجع Architecture Audit 2026-07-03، المرحلة 5 — تقسيم بحسب الحجم
   لا تقسيم دلالي بحت (الملف الأصلي كان منظّم بالفعل بترقيم أقسام
   داخلي، فالتقسيم هنا اتبع نفس الترتيب الأصلي حرفيًا بدون أي تغيير
   أو إعادة ترتيب لتفادي أي كسر في cascade/specificity الخاص بـ CSS).
   يُحمَّل بالترتيب عبر وسم style في Index.html مع باقي أجزاء Style.
 
   [REFACTOR-P6] القيم الست ألوان الأساسية اللي عمرها ما اتغيّرت بين
   الوضع الفاتح/الداكن (--primary, --primary-dark, --primary-light,
   --accent2, --success, --success-dark, --warning, --danger,
   --danger-dark, --purple, --orange, --teal) — كل قيمة hex مطابقة
   لها حرفيًا في باقي أجزاء Style اتستبدلت بـ var(--x) المقابل (155
   استبدال، صفر تغيير في الشكل النهائي لأن القيمة نفسها). اتعمّد
   تجاهل الألوان الـ"-soft" (زي --accent-soft) لأن لها قيم مختلفة في
   الوضع الداكن — استبدال الـ hex الثابت بيها كان هيغيّر سلوك فعلي
   في الوضع الداكن مش بس تنظيف، فسيبتها لقرار منفصل مستقبلي. كذلك
   اتجاهل #fff/#000 والرمادي العام لعموميتهم وغموض القصد منهم.
   ═══════════════════════════════════════════════════════════════ */
  /* ============================================================
   MOO.ERP — Enterprise Resource Planning
   Style.html — Global Stylesheet (Canonical Source)
   ============================================================
   
   ⚠️  هذا الملف هو المصدر الوحيد لجميع الـ CSS في المشروع.
       لا يجب وضع أي CSS في ملفات أخرى (Templates, JavaScript, Index).

   ARCHITECTURE:

  /* ===== 1. CSS VARIABLES ===== */
  :root {
    /* [REFACTOR-P6-B] Palette tokens — قيم Tailwind-standard متكررة (>=3 مرات)
     كانت hardcoded عبر ملفات Style، مفيش لها أي dark-mode override في أي
     مكان بالمشروع (تم التحقق آليًا) فتحويلها لمتغيرات صفر تغيير في الشكل
     النهائي بأي وضع. غير مرتبطة بالـ semantic tokens الأساسية (primary/
     success/...) عمدًا — دي مجرد تسمية لقيم Tailwind الخام المتكررة. */
    --palette-blue-300: #93c5fd;
    --palette-violet-600: #7c3aed;
    --palette-whatsapp-green: #25d366;
    --palette-slate-500: #64748b;
    --palette-emerald-800: #065f46;
    --palette-red-100: #fee2e2;
    --palette-amber-800: #92400e;
    --palette-slate-400: #94a3b8;
    --palette-green-600: #16a34a;
    --palette-emerald-100: #d1fae5;
    --palette-amber-100: #fef3c7;
    --palette-red-800: #991b1b;
    --palette-blue-100: #dbeafe;
    --palette-amber-600: #d97706;
    --palette-emerald-300: #6ee7b7;
    --palette-slate-100: #f1f5f9;
    --palette-red-300: #fca5a5;
    --palette-red-200: #fecaca;
    --palette-red-900: #7f1d1d;
    --palette-sky-900: #0c4a6e;
    --palette-blue-50: #eff6ff;
    --palette-red-700: #b91c1c;
    --palette-violet-700: #6d28d9;
    --palette-slate-900: #0f172a;
    --palette-orange-800: #9a3412;
    --palette-violet-300: #c4b5fd;
    --palette-violet-800: #5b21b6;
    --palette-blue-accent: #5b9bff;
    --palette-slate-50: #f8fafc;
    --palette-amber-200: #fde68a;
    --palette-green-800: #166534;
    --palette-emerald-700: #047857;
    --palette-blue-200: #bfdbfe;
    --palette-orange-700: #c2410c;
    --palette-slate-200: #e2e8f0;
    --palette-whatsapp-green-dark: #128c7e;
    --palette-emerald-200: #a7f3d0;
    --palette-violet-400: #a78bfa;
    --palette-amber-300: #fcd34d;
    --palette-green-300: #86efac;
    --palette-sky-50: #f0f9ff;
    --palette-violet-900: #4c1d95;
    --palette-violet-200: #ddd6fe;
    --palette-sky-200: #bae6fd;
    --palette-sky-700: #0369a1;
    --palette-navy-800: #1a2438;
    --palette-navy-700: #232e45;
    --palette-indigo-500: #6366f1;

    /* Colors */
    --bg: #eef2fb;
    --surface: #ffffff;
    --surface2: #f4f7fe;
    --surface3: #eaeefc;
    --border: #dde4f2;

    /* Text */
    --text: #0a1120;
    --text2: #3d4f6a;
    --text3: #8a9db8;

    /* Brand */
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
    --accent: #2563eb;
    --accent-soft: #eff4ff;
    --accent2: #0ea5e9;

    /* Semantic */
    --success: #10b981;
    --success-soft: #ecfdf5;
    --success-dark: #059669;
    --warning: #f59e0b;
    --warning-soft: #fffbeb;
    --danger: #ef4444;
    --danger-soft: #fef2f2;
    --danger-dark: #dc2626;

    /* Extra */
    --purple: #8b5cf6;
    --purple-soft: #f5f3ff;
    --orange: #f97316;
    --orange-soft: #fff7ed;
    --teal: #14b8a6;
    --teal-soft: #f0fdfa;

    /* ═══ Alias Tokens (Phase 2 — إصلاح متغيرات مُستخدَمة بدون تعريف) ═══
       هذه المتغيرات كانت تُستخدم في الكود (Style.html + ملفات الوحدات)
       دون أي تعريف فعلي، فكانت القاعدة تُسقَط بالكامل دون أي تأثير
       مرئي ظاهر دون فحص دقيق. رُبطت هنا بالتوكِن الأصلي المطابق دلاليًا
       حفاظًا على Single Source of Truth وبدون تعديل القيمة نفسها. */
    --bg1: var(
      --surface
    ); /* لوحات/صفحات واتساب (.wa-center-page وغيرها) — 9 مواضع */
    --bg2: var(--surface2); /* hover/badge backgrounds — 41 موضع */
    --bg3: var(--surface3); /* hover أزرار الفلتر بواتساب — 2 موضع */
    --surface1: var(--surface); /* بطاقات Skeleton Loader — 4 مواضع */
    --text1: var(--text); /* نص أساسي بمكوّنات متعددة — 85 موضع */
    --text-muted: var(
      --text3
    ); /* نص ثانوي خافت (labels/icons) — متوافق مع fallback الحالي */
    --hover: var(--surface2); /* متوافق مع نمط hover المعتمد بباقي النظام */
    --error: var(--danger); /* متوافق مع fallback الحالي var(--error,#ef4444) */
    --primary-soft: var(
      --accent-soft
    ); /* بطاقات/صفوف مُحدَّدة (cs-wh-card, pm-matrix, user-perm-row) — 19 موضع */

    /* Shadows */
    --shadow-xs: 0 1px 2px rgba(14, 21, 37, 0.05);
    --shadow-sm:
      0 1px 3px rgba(14, 21, 37, 0.07), 0 1px 2px rgba(14, 21, 37, 0.05);
    --shadow:
      0 4px 16px rgba(14, 21, 37, 0.08), 0 1px 4px rgba(14, 21, 37, 0.04);
    --shadow-md:
      0 8px 24px rgba(14, 21, 37, 0.1), 0 2px 8px rgba(14, 21, 37, 0.05);
    --shadow-lg:
      0 16px 48px rgba(14, 21, 37, 0.12), 0 4px 16px rgba(14, 21, 37, 0.06);
    --shadow-xl:
      0 24px 64px rgba(14, 21, 37, 0.15), 0 8px 24px rgba(14, 21, 37, 0.08);

    /* Border Radius */
    --radius-xs: 6px;
    --radius-xs-alt: 8px; /* يغطي استخدامات 8px (50+ موضع) — لا متغيّر مقابل قبل ذلك */
    --radius-sm: 10px;
    --radius-md: 12px; /* يغطي استخدامات 12px (37+ موضع) */
    --radius: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --radius-pill: 9999px; /* يغطي استخدامات 99px/999px (شارات/أزرار دائرية) */
    --radius-none: 0;

    /* Layout */
    --sidebar-w: 300px;

    /* Transitions */
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    /* ── [FORM-UNIFY-P1] Form Control Tokens (2026-07-05) ──
       مصدر واحد لأبعاد وحالات كل حقول الإدخال في المشروع (.input و
       الأسماء البديلة .form-control/.form-input/.form-select).
       راجع Style_04_Components.html § FORM CONTROLS. */
    --input-height: 42px;
    --input-padding-y: 11px;
    --input-padding-x: 14px;

  .notif-full-badge.read-badge {
    background: var(--success-soft);
    color: var(--success);
  }
  .notif-full-item-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .notif-full-item-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    opacity: 0.45;
    transition: opacity var(--transition);
    padding: 4px;
    border-radius: 6px;
    line-height: 1;
  }
  .notif-full-item-btn:hover {
    opacity: 1;
    background: var(--surface2);
  }
  .notif-full-empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
  }
  .notif-full-empty .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }

  /* ── Rename User Modal ── */
  .rename-modal-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    margin: 0 auto 16px;
    flex-shrink: 0;
  }
  .rename-confirm-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--warning-soft);
    border: 1px solid #f59e0b44;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--warning);
    margin-top: 12px;
    font-weight: 500;
  }
  .rename-confirm-banner.show {
    display: flex;
  }

  /* top-bar الشريط العلوي */
  #app-top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: var(--sidebar-w);
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 12px;
    z-index: 90;
    gap: 6px;
    box-shadow: -4px 0 32px rgba(14, 21, 37, 0.08);
    transition: right var(--transition);
  }

  /* [FIX-TOPBAR-RIGHT] الـ search wrap أبعد من الـ flex flow عشان الأزرار تلاصق اليمين */
  #app-top-bar .global-search-wrap {
    margin-right: auto; /* يدفع الأزرار لأقصى اليمين */
  }

  @media (max-width: 860px) {
    #app-top-bar {
      right: 0;
      padding: 0 58px 0 12px; /* [FIX] اليمين: مساحة للـ hamburger (44px+10px+4px) */
    }
  }

  @media (max-width: 540px) {
    #app-top-bar {
      padding: 0 58px 0 8px; /* [FIX] نفس المسافة على الموبايل */
      gap: 4px;
    }
  }

  /* ── Global Search ── */
  /* ══════════════════════════════════════════════
     Global Search — البحث الشامل المطوّر
     ══════════════════════════════════════════════ */

  .global-search-wrap {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: min(440px, calc(100vw - var(--sidebar-w) - 200px));
    z-index: 100;
  }

  .global-search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 12px;
    height: 38px;
    transition:
      border-color 0.2s,
      box-shadow 0.2s,
      background 0.2s;
    cursor: text;
  }

  .global-search-box:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.13);
    background: var(--surface);
  }

  .gs-icon {
    flex-shrink: 0;
    color: var(--text3);
    transition: color 0.2s;
  }

  .global-search-box:focus-within .gs-icon {
    color: var(--primary);
  }

  .gs-input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-size: 13px;
    color: var(--text1);
    font-family: inherit;
    direction: rtl;
    min-width: 0;
  }

  .gs-input::placeholder {
    color: var(--text3);
    font-size: 12px;
  }

  .gs-kbd {
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text3);
    font-size: 10px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 7px;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .gs-clear {
    flex-shrink: 0;
    background: var(--bg2);
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    line-height: 1;
    transition:
      background 0.15s,
      color 0.15s;
  }

  .gs-clear:hover {
    background: var(--border);
    color: var(--text1);
  }

  /* ── الـ Dropdown ── */
  .gs-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow:
      0 4px 6px rgba(0, 0, 0, 0.07),
      0 12px 40px rgba(0, 0, 0, 0.14);
    z-index: 9999;
    max-height: 480px;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  /* Scrollbar أنيق */
  .gs-dropdown::-webkit-scrollbar {
    width: 4px;
  }
  .gs-dropdown::-webkit-scrollbar-track {
    background: transparent;
  }
  .gs-dropdown::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 99px;
  }

  .gs-results {
    padding: 6px;
  }

  /* ── عنوان المجموعة ── */
  .gs-section-title {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text3);
    padding: 10px 14px 5px;
    text-align: right;
    direction: rtl;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .gs-section-title::before {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
    order: 2;
  }

  /* ── عنصر النتيجة ── */
  .gs-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 9px;
    cursor: pointer;
    direction: rtl;
    transition: background 0.12s;
    position: relative;
  }

  .gs-item:hover,
  .gs-item.gs-selected {
    background: var(--bg2);
  }

  .gs-item.gs-selected {
    outline: 1.5px solid var(--primary);
    outline-offset: -1px;
  }

  /* ── أيقونة العنصر ── */
  .gs-item-icon {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .gs-item-icon i {
    font-size: 17px;
  }

  .gs-item:hover .gs-item-icon {
    transform: scale(1.08);
  }

  /* ── نص العنصر ── */
  .gs-item-body {
    flex: 1;
    min-width: 0;
    text-align: right;
  }

  .gs-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .gs-item-title mark {
    background: rgba(37, 99, 235, 0.15);
    color: var(--primary);
    border-radius: 3px;
    padding: 0 2px;
    font-weight: 700;
  }

  .gs-item-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Badge ── */
  .gs-item-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── سهم التنقل ── */
  .gs-item-arrow {
    color: var(--text3);
    font-size: 14px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.12s;
  }

  .gs-item:hover .gs-item-arrow,
  .gs-item.gs-selected .gs-item-arrow {
    opacity: 1;
  }

  /* ── الـ Shortcut hint ── */
  .gs-item-shortcut {
    font-size: 10px;
    color: var(--text3);
    background: var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    flex-shrink: 0;
    display: none;
  }

  .gs-item.gs-selected .gs-item-shortcut {
    display: block;
  }

  /* ── حالة فارغة ── */
  .gs-empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text3);
    direction: rtl;
  }

  .gs-empty-icon {
    display: none !important;
  }

  .gs-empty-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .gs-empty-sub {
    font-size: 12px;
    color: var(--text3);
  }

  /* ── Footer ── */
  .gs-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    direction: rtl;
    gap: 8px;
    background: var(--bg2);
    border-radius: 0 0 14px 14px;
  }

  .gs-footer kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: inherit;
  }

  .gs-footer-hint {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Divider بين الأقسام ── */
  .gs-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 12px;
    opacity: 0.5;
  }

  /* ── Quick Nav Chip ── */
  .gs-quicknav-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px 0;
  }

  .gs-qn-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 9px;
    cursor: pointer;
    direction: rtl;
    transition: background 0.12s;
  }

  .gs-qn-item:hover,
  .gs-qn-item.gs-selected {
    background: var(--bg2);
  }

  .gs-qn-item.gs-selected {
    outline: 1.5px solid var(--primary);
    outline-offset: -1px;
  }

  .gs-qn-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .gs-qn-icon i {
    font-size: 16px;
  }

  .gs-qn-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── شريط فلاتر النوع ── */
  .gs-filter-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0 0;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    direction: rtl;
    animation: gsFilterIn 0.15s ease;
  }
  .gs-filter-bar::-webkit-scrollbar {
    display: none;
  }

  @keyframes gsFilterIn {
    from {
      opacity: 0;
      transform: translateY(-4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .gs-filter-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    color: var(--text2);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition:
      background 0.12s,
      color 0.12s,
      border-color 0.12s;
    direction: rtl;
  }
  .gs-filter-btn:hover {
    background: var(--surface);
    border-color: var(--primary);
    color: var(--primary);
  }
  .gs-filter-btn.gs-filter-active {
    background: var(--primary, #2563eb);
    border-color: var(--primary, #2563eb);
    color: #fff;
  }
  .gs-filter-count {
    background: rgba(255, 255, 255, 0.25);
    border-radius: 20px;
    padding: 0 5px;
    font-size: 10px;
    font-weight: 700;
    min-width: 16px;
    text-align: center;
  }
  .gs-filter-btn:not(.gs-filter-active) .gs-filter-count {
    background: var(--border);
    color: var(--text3);
  }

  /* ── عدّاد في عنوان القسم ── */
  .gs-section-count {
    background: var(--border);
    border-radius: 99px;
    font-size: 10px;
    font-weight: 700;
    padding: 0 6px;
    color: var(--text3);
    margin-right: 4px;
  }

  /* ── سعر الصنف ── */
  .gs-item-price {
    font-size: 11px;
    font-weight: 600;
    color: var(--success-dark);
    background: #d1fae522;
    border-radius: 6px;
    padding: 2px 7px;
    white-space: nowrap;
    flex-shrink: 0;
    direction: rtl;
  }

  /* ── عرض المزيد ── */
  .gs-show-more {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 11.5px;
    color: var(--primary, #2563eb);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    direction: rtl;
    transition: background 0.12s;
    font-weight: 500;
  }
  .gs-show-more:hover {
    background: var(--bg2);
  }

  /* ── زر إعادة ضبط الفلتر (في صفحة لا نتائج) ── */
  .gs-empty-reset-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    margin: 10px auto 0;
    font-size: 12px;
    font-family: inherit;
    color: var(--primary);
    background: var(--accent-soft, #eff6ff);
    border: 1px solid var(--primary);
    border-radius: 20px;
    padding: 4px 14px;
    cursor: pointer;
    transition: background 0.12s;
    direction: rtl;
  }
  .gs-empty-reset-btn:hover {
    background: var(--primary);
    color: #fff;
  }

  /* ── اقتراحات في حالة لا نتائج ── */
  .gs-empty-suggestions {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--text3);
    direction: rtl;
  }
  .gs-suggestion-chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    cursor: pointer;
    color: var(--text2);
    transition: border-color 0.12s;
  }
  .gs-suggestion-chip:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  /* ── سجل البحث ── */
  .gs-history-list {
    padding: 2px 4px;
  }
  .gs-history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    direction: rtl;
    transition: background 0.12s;
    font-size: 12.5px;
    color: var(--text2);
  }
  .gs-history-item:hover {
    background: var(--bg2);
  }
  .gs-history-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gs-history-clear-btn {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-family: inherit;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition:
      color 0.12s,
      background 0.12s;
  }
  .gs-history-clear-btn:hover {
    color: var(--danger-dark);
    background: var(--palette-red-100);
  }

  /* ── أنيميشن ظهور الـ dropdown ── */
  .gs-dropdown {
    animation: gsDropIn 0.15s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes gsDropIn {
    from {
      opacity: 0;
      transform: translateY(-6px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* نزّل الـ content شوية عشان الـ top-bar */
  .content {
    padding-top: 62px !important;
  }

  .top-bar-page-title {
    display: none;
  }

  /* backdrop للـ dropdown */
  #notif-backdrop {
    position: fixed;
    inset: 0;
    z-index: 9996;
    display: none;
  }
  #notif-backdrop.show {
    display: block;
  }

  @media (max-width: 768px) {
    #app-top-bar {
      right: 0;
    }
    #notif-dropdown {
      left: 8px;
      right: 8px;
      width: auto;
    }
  }

  .auto-fill-badge {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--success-dark);
    background: var(--success-soft);
    border: 1px solid var(--palette-emerald-200);
    border-radius: 20px;
    padding: 1px 8px;
    margin-right: 6px;
    vertical-align: middle;
    animation: fadeInBadge 0.3s ease;
  }

  /* Dropdown nav */
  .nav-dropdown {
    margin-bottom: 2px;
  }
  .nav-dropdown-toggle {
    cursor: default;
    user-select: none;
    align-items: stretch;
    justify-content: flex-start;
    padding: 0 6px 0 0;
    gap: 0;
  }
  /* الـ hover/transform العام بتاع .nav-item مش مناسب لرأس المجموعة
     المنقسم دلوقتي — الـ hover بقى مسؤولية .nav-grp-label و .nav-grp-arrow
     كل واحدة لوحدها */
  .nav-dropdown-toggle:hover {
    background: transparent;
    transform: none;
  }
  /* ── [SIDEBAR-V3] رأس المجموعة بقى منطقتين مستقلتين ──
     .nav-grp-label تفتح الـ Dashboard، .nav-grp-arrow تفتح/تقفل القائمة */
  .nav-grp-label {
    display: flex;
    align-items: center;
    gap: 11px;
    flex: 1;
    min-width: 0;
    padding: 9px 7px 9px 13px;
    cursor: pointer;
    border-radius: 10px;
    transition:
      background 0.2s cubic-bezier(0.4, 0, 0.2, 1),
      color 0.2s cubic-bezier(0.4, 0, 0.2, 1),
      transform 0.15s ease;
  }
  .nav-grp-label .nav-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: var(--surface2);
    font-size: 15px;
    transition:
      background 0.2s ease,
      color 0.2s ease,
      transform 0.2s ease;
    flex-shrink: 0;
  }
  [data-theme="dark"] .nav-grp-label .nav-icon {
    background: rgba(255, 255, 255, 0.05);
  }
  .nav-grp-label:not(.has-dashboard) {
    cursor: pointer; /* لسه قابلة للضغط لفتح/قفل القائمة لحد ما ييجيلها Dashboard */
  }
  .nav-grp-label.has-dashboard:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .nav-grp-label.has-dashboard:hover .nav-icon {
    background: var(--accent);
    color: #fff;
    transform: scale(1.06);
  }
  [data-theme="dark"] .nav-grp-label.has-dashboard:hover {
    background: rgba(59, 130, 246, 0.12);
    color: var(--palette-blue-300);
  }
  /* أقسام لسه معندهاش Dashboard مستقل — نفس hover الرمادي القديم بتاع
     nav-item عشان يبقى واضح إن الضغط عليها هيعمل حاجة (فتح/قفل القائمة) */
  .nav-grp-label:not(.has-dashboard):hover {
    background: var(--surface2);
  }
  [data-theme="dark"] .nav-grp-label:not(.has-dashboard):hover {
    background: rgba(255, 255, 255, 0.04);
  }
  /* ── [SIDEBAR-V4] زرار السهم بقى مربّع كامل قابل للضغط ──
     بدل الدايرة الصغيرة القديمة (28×28 في نص الصف)، دلوقتي الزرار
     بياخد ارتفاع الصف بالكامل (align-self:stretch) وعرض ثابت مريح،
     فأي ضغطة جوه المربع كله (مش بس على الدايرة القديمة) بتشتغل. */
  .nav-grp-arrow {
    align-self: stretch;
    margin: 3px 4px 3px 0;
    width: 40px;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    transition:
      background 0.22s cubic-bezier(0.4, 0, 0.2, 1),

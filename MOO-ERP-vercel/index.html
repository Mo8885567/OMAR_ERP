  // ─────────────────────────────────────────────────────────────
  // §G  Auth UI — doLogin · doLogout (نسخ مُحسَّنة)
  // ─────────────────────────────────────────────────────────────

  function doLogin() {
    // ── حراسة Frontend (ليست الأساسية — Backend هو الحارس) ───
    if (_loginLockEnds && Date.now() < _loginLockEnds) {
      showToast(I18N.t("SHELL_MSG_ACCOUNT_LOCKED_WAIT"), "error");
      return;
    }
    // [SEC-LOGIN-CAPTCHA] لازم يحل التحدي البشري الأول لو ظاهر
    if (_loginCaptchaRequired) {
      showToast(I18N.t("SHELL_CAPTCHA_REQUIRED"), "error");
      var capInp = document.getElementById("__captcha-input");
      if (capInp) capInp.focus();
      return;
    }
    var u = document.getElementById("l-user").value.trim();
    var p = document.getElementById("l-pass").value;
    var btn = document.getElementById("btn-login");
    var uInp = document.getElementById("l-user");
    var pInp = document.getElementById("l-pass");
    if (!u || !p) {
      showLoginErr(I18N.t("SHELL_MSG_FILL_ALL_FIELDS"));
      return;
    }

    // ── تذكّر اسم المستخدم لو العلامة مفعّلة ─────────────────
    _loginSaveRemember(u);

    btn.disabled = true;
    uInp.disabled = true;
    pInp.disabled = true;
    btn.innerHTML =
      '<span style="display:inline-flex;align-items:center;gap:8px">' +
      '<span style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;animation:spin 0.6s linear infinite;display:inline-block"></span>' +
      I18N.t("SHELL_MSG_LOGGING_IN") +
      "</span>";

    // ✅ double-rAF: يضمن أن المتصفح يرسم الـ Spinner قبل إرسال الطلب
    // الـ rAF الأول يدخل الـ frame الحالي، والثاني ينتظر بعد انتهاء الرسم
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        // [DATA-UNIFY] loginWithData بترجع success:false في حالات عمل عادية
        // (كلمة مرور خطأ / حساب مقفول) مش خطأ اتصال — فالمعالج ده بيستقبل
        // النتيجتين (عن طريق rawResponse:true في الـ Data Layer) ويميّز بينهم
        // داخلياً؛ onError الحقيقي بيتفعّل بس لو مفيش رد خالص من السيرفر.
        function _handleLoginResult(result) {
          var res = result.data;
          if (res === null || res === undefined) {
            btn.disabled = false;
            uInp.disabled = false;
            pInp.disabled = false;
            btn.innerHTML = _loginBtnHTML(I18N.t("SHELL_BTN_LOGIN"));
            showLoginErr(
              I18N.t("SHELL_MSG_CONNECTION_ERROR_PREFIX") +
                " " +
                result.message,
            );
            return;
          }
          {
            btn.disabled = false;
            uInp.disabled = false;
            pInp.disabled = false;
            btn.innerHTML = _loginBtnHTML(I18N.t("SHELL_BTN_LOGIN"));

            // ── ✅ دخول ناجح ─────────────────────────────────────
            if (res && res.success) {
              _loginLockTimer && clearInterval(_loginLockTimer);
              _loginLockEnds = null;
              _removeLockBanner();
              _removeLoginCaptcha();
              _initSession(res);
              APP.currentUser = res.user;

              // ✅ [FORCE-PW-1] إجبار تغيير كلمة المرور عند أول دخول (أو
              // بعد إعادة تعيينها من المدير) — لا يُسمح بالمتابعة لأي
              // شاشة أخرى قبل إتمام التغيير بنجاح عبر changeForcedPassword().
              // ⚠️ هذا الفحص لازم يجي قبل تعيين effectivePermissions، لأن
              // loginWithData بترجع effectivePermissions:[] فاضية في حالة
              // التغيير الإلزامي (تخطّت تحميل الصلاحيات عمداً) — لو عيّناها
              // هنا هتفضل [] عالقة على APP.currentUser حتى بعد نجاح التغيير
              // وتمنع canDo() من الرجوع لـ ROLE_PERMISSIONS الافتراضية.
              if (res.user && res.user.forcePasswordChange) {
                _showForcePasswordChangeScreen(res, p);
                return;
              }

              // الصلاحيات جاهزة مع الـ response (loginWithData دمجهم)
              if (res.effectivePermissions) {
                APP.currentUser.effectivePermissions = res.effectivePermissions;
                APP.currentUser.allRoles = res.allRoles || [];
              }

              _afterLoginSuccess(res);
              return;
            }

            // ── 🔒 حساب محظور — يُستخدم lockedUntil من Backend ──
            if (res && res.locked) {
              showLoginErr(
                res.message || I18N.t("SHELL_MSG_ACCOUNT_LOCKED_TEMP"),
              );
              var lockedUntil =
                res.lockedUntil ||
                Date.now() + (res.remainingSeconds || 15 * 60) * 1000;
              _startLockCountdown(lockedUntil);
              return;
            }

            // ── ❌ كلمة مرور خاطئة ───────────────────────────────
            var msg = (res && res.message) || "بيانات خاطئة";
            showLoginErr(msg);

            // عداد المحاولات المتبقية
            if (
              res &&
              typeof res.remainingAttempts === "number" &&
              res.remainingAttempts > 0
            ) {
              _showAttemptsWarning(res.remainingAttempts);
            }

            // هزّ النموذج
            var card = document.getElementById("login-box");
            if (card) {
              if (!document.getElementById("__shake-style")) {
                var ss = document.createElement("style");
                ss.id = "__shake-style";
                ss.textContent =
                  "@keyframes __shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}";
                document.head.appendChild(ss);
              }
              card.style.animation = "__shake 0.5s ease";
              card.addEventListener(
                "animationend",
                function () {
                  card.style.animation = "";
                },
                { once: true },
              );
            }
          }
        }

        DL.Core.loginWithData(u, p, {
          onSuccess: _handleLoginResult,
          onError: _handleLoginResult,
        });
      }); // end inner rAF
    }); // end outer rAF
  }

  /**
   * ✅ [FORCE-PW-1] كل ما كان يحدث بعد نجاح الدخول مباشرة (تحميل بيانات،
   * صلاحيات، رسم الصفحة...) — استُخرج في دالة مستقلة حتى يُعاد استخدامها
   * في مسارين: (أ) دخول ناجح عادي، (ب) بعد نجاح تغيير كلمة المرور
   * الإلزامي (حيث لا تتوفر عادةً res.data لأن loginWithData تخطّت تحميل
   * البيانات في هذه الحالة — فتُستكمل هنا عبر loadAllData العادية).
   */
  function _afterLoginSuccess(res) {
    // §AS — صوت تسجيل الدخول الناجح
    if (typeof AS !== "undefined") {
      try {
        AS.loginSuccess();
      } catch (e) {}
    }
    // ── [PRELOAD-ALL] تحميل كل البيانات بعد اللوجين مباشرة ──
    // يضمن إن 100% من الشاشات تلاقي بياناتها جاهزة في الكاش
    if (typeof _preloadAllAfterLogin === "function") {
      _preloadAllAfterLogin();
    }
    // ── [USER-PREFS] تحميل تفضيلات المستخدم بعد اللوجين ──
    // [PREFS-WIRING] default_page: أول ما التفضيلات توصل (لوكال أو من
    // السيرفر)، لو فيها صفحة افتراضية مختلفة عن "dashboard" وكان المستخدم
    // لسه واقف على الداشبورد (يعني ما زحلقش بنفسه لصفحة تانية أثناء
    // التحميل)، نوديه لصفحته المفضّلة تلقائيًا.
    if (typeof PreferenceService !== "undefined") {
      PreferenceService.load(function (prefs) {
        try {
          var dp = prefs && prefs.default_page;
          if (
            dp &&
            dp !== "dashboard" &&
            APP.currentPage === "dashboard" &&
            typeof renderPage === "function"
          ) {
            APP.currentPage = dp;
            renderPage(dp);
          }
        } catch (e) {}
      });
    }
    // ── [I18N] تحميل قاموس اللغة بعد اللوجين مباشرة (Lazy Loading لقاموس
    // لغة واحدة فقط — راجع 32_JS_i18n_Client.html) ثم تطبيقه على أي عناصر
    // data-i18n موجودة بالفعل في الـ DOM (مثل شاشة اللوجين نفسها لو كانت
    // مبنية بـ data-i18n قبل النجاح) —
    if (
      typeof I18N !== "undefined" &&
      APP.currentUser &&
      APP.currentUser.username
    ) {
      I18N.bootstrap(APP.currentUser.username, SESSION ? SESSION.token : null);
    }
    // [PERF-HR-DASH] إحصائيات لوحة HR
    if (typeof _silentPrefetchHRDash === "function") {
      setTimeout(_silentPrefetchHRDash, 2000);
    }
    render();
    // ── [UPDATE-MGMT-MODULE] فحص "What's New" + البانر العلوي بعد اللوجين ──
    // مؤجَّل شوية عشان الواجهة الأساسية (renderLayout/render) تفضل هي
    // الأولوية أولاً، ومتوقف على وجود 41_JS_UpdateManagement (ملف مؤجل).
    setTimeout(function () {
      if (typeof UM !== "undefined" && UM.checkOnLogin) UM.checkOnLogin();
    }, 1200);
    // ── تهيئة المساعد الذكي بعد تسجيل الدخول ──
    // [PERF-LAZY-LOAD] initFloatingAI معرّفة في 09_JS_AIAssistant.html
    // (ملف مؤجل) — بنحرس النداء لو لسه ما اتحملش.
    setTimeout(function () {
      if (typeof initFloatingAI === "function") initFloatingAI();
    }, 600);
    // ── رسالة ترحيب من أيقون المساعد ──
    setTimeout(function () {
      var userName =
        APP.currentUser && APP.currentUser.full_name
          ? APP.currentUser.full_name.split(" ")[0]
          : "";
      var lowItems =
        APP.data && APP.data.items
          ? APP.data.items.filter(function (it) {
              var qty = 0;
              (APP.data.stock || []).forEach(function (s) {
                if (String(s.item_id) === String(it.id))
                  qty += Number(s.quantity || 0);
              });
              return Number(it.min_qty || 0) > 0 && qty <= Number(it.min_qty);
            }).length
          : 0;
      var msg =
        lowItems > 0
          ? "⚠️ " + lowItems + " أصناف تحت الحد الأدنى\nاضغط عليّ للتفاصيل!"
          : "👋 أهلاً" +
            (userName ? " " + userName : "") +
            "!\nأنا هنا لو احتجت شيء 🤖";
      showFABMessage(msg, 4000);
    }, 2000);

    // ── [LOGIN-STABLE] render واحد بس بعد اللوجين ──────────
    // نطبق أفضل البيانات المتاحة (res.data أو prefetch) ثم renderPage
    // مرة واحدة فقط — لا rerenders من loadAllData أو _light callbacks.

    var _bestData = null;

    // الأولوية: res.data (كاملة مع الـ response) > prefetch
    if (res.data && res.data.success !== false) {
      _bestData = _parseData(res.data);
    } else if (_prefetch.done && _prefetch.data) {
      _bestData = _parseData(_prefetch.data);
    }

    if (_bestData) {
      _saveCache(_bestData);
      APP.data = _bestData;
      APP.data._loaded = true;
      APP.companySettings =
        _bestData.companySettings || APP.companySettings || {};
      // [PERF-LAZY-LOAD] دوال من ملفات مؤجلة — بنحرس النداء (النظام
      // بينتظر جاهزية الحزمة المؤجلة قبل renderPage أصلاً، فالمفروض
      // دايمًا تكون جاهزة هنا، بس الحراسة هنا احتياط إضافي).
      if (typeof _applyCompanyBranding === "function") _applyCompanyBranding();
      if (typeof _syncColorsFromData === "function") _syncColorsFromData();

      // تطبيق البيانات الموسعة لو جاية مع الـ response
      if (res.extendedData && typeof _applyExtData === "function") {
        try {
          _applyExtData(res.extendedData);
          if (typeof _saveExtCache === "function")
            _saveExtCache(res.extendedData);
          APP.extLoaded = true;
          APP.extLoading = false;
        } catch (e) {
          APP.extLoaded = false;
        }
      }

      // الصلاحيات
      if (_bestData.roles && _bestData.roles.length) {
        PM_STATE.roles = _bestData.roles;
        PM_STATE.permissions = _bestData.permissions || [];
        PM_STATE.userOverrides = _bestData.userOverrides || {};
        PM_STATE.users = _bestData.users || [];
        PM_STATE.loaded = true;
        _syncRolePermissions();
      }

      if (typeof _hideAppLoader === "function") _hideAppLoader();
      // [LOGIN-STABLE] سجّل وقت اللوجين لمنع silentRefresh المبكر
      APP._loginTime = Date.now();
      // ✅ render واحد فقط
      renderPage(APP.currentPage);
      updateAlertBadge();
      updateNotifBell();

      // لو البيانات خفيفة أو جاية من prefetch خفيف فقط — جيب الكاملة صامتاً
      // لو الـ prefetch كان كامل (_prefetch_full) — مفيش داعي لـ loadAllData إضافية
      var _prefetchWasFull = _prefetch.data && _prefetch.data._prefetch_full;
      if (
        !_prefetchWasFull &&
        ((res.data && res.data._light) || (!res.data && _prefetch.done))
      ) {
        setTimeout(function () {
          loadAllData(null, true); // null = no callback = no re-render
        }, 1500);
      }
    } else if (_prefetch.loading) {
      _prefetch._onReady = function (data) {
        APP.data = data;
        APP.data._loaded = true;
        if (typeof _hideAppLoader === "function") _hideAppLoader();
        renderPage(APP.currentPage);
      };
    } else {
      loadAllData();
    }
  }

  function showLoginErr(msg) {
    var el = document.getElementById("login-err");
    if (!el) return;
    el.style.display = "block";
    el.setAttribute("role", "alert");
    el.setAttribute("aria-live", "assertive");
    el.setAttribute("data-testid", "login-error");
    el.textContent = msg;
  }

  // ✅ [FIX-LOGOUT-DUP-CONFIRM] الخطوات الفعلية لإنهاء الجلسة — اتفصلت هنا
  // عشان تتنادى مباشرة من أماكن اختار فيها المستخدم "تسجيل الخروج" بشكل
  // صريح ولا محتاجة تأكيد إضافي (زي رابط "تسجيل الخروج بدلاً من ذلك" في
  // شاشة إجبار تغيير كلمة المرور) — قبل كده كانت بتنادي doLogout() اللي
  // بتفتح modal "هل تريد تسجيل الخروج؟" فوق شاشة كانت أصلاً بتعرض
  // شاشة الدخول (لأن #root كان لسه شاشة اللوجين القديمة تحت الـ overlay)،
  // فيبان وكأن نافذة التأكيد ظهرت "بعد" الخروج مش قبله.
  function _performLogout() {
    var token = SESSION.token;
    var username = APP.currentUser ? APP.currentUser.username : null;
    if (token) {
      DL.Users.logout(token, username, {
        onSuccess: function () {},
        onError: function () {},
      });
    }
    // ── أغلق أي شاشة منسدلة (drawer) وأي قائمة منسدلة من الشمال قبل إنهاء الجلسة ──
    if (typeof closeDrawer === "function") closeDrawer(true);
    if (typeof _closeAllDropdowns === "function") _closeAllDropdowns();
    _clearSession();
    APP.currentUser = null;
    // ── [USER-PREFS] مسح الكاش عند تسجيل الخروج ──
    if (typeof PreferenceService !== "undefined") PreferenceService.clear();
    APP.currentPage = "dashboard";
    try {
      sessionStorage.clear();
    } catch (e) {}
    // ── إزالة المساعد الذكي عند الخروج (لإعادة تهيئته بشكل سليم عند الدخول التالي) ──
    var fabRoot = document.getElementById("ai-float-root");
    if (fabRoot) fabRoot.remove();
    // §AS — صوت تسجيل الخروج
    if (typeof AS !== "undefined") {
      try {
        AS.logout();
      } catch (e) {}
    }
    render();
  }

  function doLogout() {
    showConfirm({
      icon: "ti-logout",
      iconColor: "#475569",
      title: I18N.t("SHELL_MSG_LOGOUT_TITLE"),
      message: I18N.t("SHELL_MSG_LOGOUT_CONFIRM"),
      confirmText: I18N.t("SHELL_BTN_LOGOUT"),
      confirmClass: "btn-danger",
      onConfirm: function (unfreeze) {
        unfreeze();
        _performLogout();
      },
    });
  }

  // ── Dismissed Alerts Helpers ──
  function _getDismissedAlerts() {
    try {
      return JSON.parse(localStorage.getItem("dismissedAlerts") || "[]");
    } catch (e) {
      return [];
    }
  }
  function _dismissAlert(key) {
    var list = _getDismissedAlerts();
    if (list.indexOf(key) === -1) list.push(key);
    localStorage.setItem("dismissedAlerts", JSON.stringify(list));
  }
  function _alertKey(item, colorName) {
    return item.id + "__" + (colorName || "__nocolor__");
  }

  function alertCount() {
    // ✅ [FIX-LAZY-LAYOUT] دفاع إضافي: لو اتنادت قبل ما 03_JS_Dashboard_Items
    // (اللي فيها getItemColors) تتحمّل، رجّع صفر بدل ما ترمي ReferenceError.
    if (typeof getItemColors !== "function") return 0;
    var dismissed = _getDismissedAlerts();
    var count = 0;
    APP.data.items.forEach(function (item) {
      var itemMinQ = Number(item.min_qty || 0);
      var colors = getItemColors(item.id);
      if (colors.length > 0) {
        colors.forEach(function (c) {
          var colorMinQ = Number(c.min_qty || 0);
          if (colorMinQ <= 0) colorMinQ = itemMinQ;
          if (colorMinQ <= 0) return;
          var colorQty = getColorQty(item.id, c.name);
          if (
            colorQty < colorMinQ &&
            dismissed.indexOf(_alertKey(item, c.name)) === -1
          )
            count++;
        });
      } else {
        if (itemMinQ <= 0) return;
        var currentQty = APP.data.stock
          .filter(function (s) {
            return s.item_id === item.id;
          })
          .reduce(function (a, s) {
            return a + Number(s.quantity || 0);
          }, 0);
        var totalQty = currentQty + getOpeningQty(item.id);
        if (
          totalQty < itemMinQ &&
          dismissed.indexOf(_alertKey(item, null)) === -1
        )
          count++;
      }
    });
    return count;
  }

  function updateAlertBadge() {
    // ✅ v4.2: المصدر الموحّد — غير المقروء فقط يظهر في الـ badge
    // لو الكل مقروء → الـ badge يختفي تماماً (السلوك المتوقع)
    var notifs = _buildNotifications();
    var readIds = _getReadIds();
    var count = notifs.filter(function (n) {
      return readIds.indexOf(n.id) === -1;
    }).length;
    var navItem = document.querySelector('.nav-item[data-page="alerts"]');
    if (!navItem) return;
    var old = navItem.querySelector(".nav-badge");
    if (old) old.remove();
    if (count > 0) {
      var badge = document.createElement("span");
      badge.className = "nav-badge";
      badge.textContent = count > 99 ? "99+" : count;
      navItem.appendChild(badge);
    }
  }
  function dismissAlert(key) {
    _dismissAlert(key);
    // أخفي البطاقة بأنيميشن
    var card = document.querySelector('[data-alert-key="' + key + '"]');
    if (card) {
      card.style.opacity = "0";
      card.style.transform = "translateX(20px)";
      card.style.transition = "opacity .3s,transform .3s";
      setTimeout(function () {
        card.remove();
        // حدّث الـ badges والإحصائيات
        updateAlertBadge();
        _refreshAlertStats();
      }, 300);
    }
  }

  function _refreshAlertStats() {
    // إعادة رسم الصفحة لو مفتوحة عشان الأرقام تتحدث
    if (APP.currentPage === "alerts") {
      renderPage("alerts");
    }
  }

  // ─────────────────────────────────────────────────────────────
  // 🔔  وظائف صفحة التنبيهات الكاملة v4.2

  /** فلتر التبويبات في صفحة التنبيهات */
  function notifPageFilter(tab) {
    // تحديث أزرار التبويب
    ["all", "unread", "stock", "other"].forEach(function (t) {
      var btn = document.getElementById("ntab-" + t);
      if (btn) btn.classList.toggle("active", t === tab);
    });

    var items = document.querySelectorAll(".notif-full-item");
    var readIds = _getReadIds();

    items.forEach(function (el) {
      var nid = el.getAttribute("data-notif-id");
      var page = el.getAttribute("data-page");
      var isUnread = readIds.indexOf(nid) === -1;
      var isStock = page === "alerts";

      var show = false;
      if (tab === "all") show = true;
      if (tab === "unread") show = isUnread;
      if (tab === "stock") show = isStock;
      if (tab === "other") show = !isStock;

      el.style.display = show ? "" : "none";
    });

    // عرض حالة فارغة لو لا يوجد نتائج
    var list = document.getElementById("notif-page-list");
    if (list) {
      var visible = Array.from(items).filter(function (el) {
        return el.style.display !== "none";
      });
      var existing = list.querySelector(".notif-full-empty");
      if (!visible.length && !existing) {
        var empty = document.createElement("div");
        empty.className = "notif-full-empty _filter-empty";
        empty.innerHTML =
          '<span class="empty-icon">✅</span><p style="font-weight:700;color:var(--text)">لا توجد تنبيهات في هذا التصنيف</p>';
        list.appendChild(empty);
      } else if (visible.length) {
        var fe = list.querySelector("._filter-empty");
        if (fe) fe.remove();
      }
    }
  }

  /** عند الضغط على إشعار في الصفحة الكاملة */
  function notifPageItemClick(el) {
    var nid = el.getAttribute("data-notif-id");
    var page = el.getAttribute("data-page");
    if (!nid) return;

    // سجّل كمقروء
    var ids = _getReadIds();
    if (ids.indexOf(nid) === -1) {
      ids.push(nid);
      _saveReadIds(ids);
    }

    // تحديث مظهر العنصر فوراً
    el.classList.remove("unread");
    var strip = el.querySelector(".notif-full-unread-strip");
    if (strip) strip.remove();
    var ubadge = el.querySelector(".unread-badge");
    if (ubadge) {
      ubadge.classList.remove("unread-badge");
      ubadge.classList.add("read-badge");
      ubadge.textContent = "✓ مقروء";
    }
    var markBtn = el.querySelector(".notif-full-item-btn");
    if (markBtn) markBtn.remove();

    // تحديث الـ bell
    updateNotifBell();
    updateAlertBadge();

    // انتقل للصفحة المرتبطة
    if (page && page !== "alerts") navigate(page);
  }

  /** تحديد إشعار واحد كمقروء من زر ✓ */
  function notifPageMarkOneRead(nid) {
    var ids = _getReadIds();
    if (ids.indexOf(nid) === -1) {
      ids.push(nid);
      _saveReadIds(ids);
    }
    // تحديث UI بدون إعادة رسم كاملة
    var el = document.querySelector(
      '.notif-full-item[data-notif-id="' + nid + '"]',
    );
    if (el) {
      el.classList.remove("unread");
      var strip = el.querySelector(".notif-full-unread-strip");
      if (strip) strip.remove();
      var ubadge = el.querySelector(".unread-badge");
      if (ubadge) {
        ubadge.classList.remove("unread-badge");
        ubadge.classList.add("read-badge");
        ubadge.textContent = "✓ مقروء";
      }
      var markBtn = el.querySelector(".notif-full-item-btn");
      if (markBtn) markBtn.remove();
    }
    updateNotifBell();
    updateAlertBadge();
    // تحديث شريط الأكشن (زر "تحديد الكل كمقروء")
    var actBar = document.querySelector(".notif-actions-bar");
    if (actBar) {
      var remaining = _buildNotifications().filter(function (n) {
        return _getReadIds().indexOf(n.id) === -1;
      }).length;
      if (!remaining) {
        var btn = actBar.querySelector("button");
        if (btn && btn.textContent.indexOf("تحديد الكل") !== -1) btn.remove();
      }
    }
    // تحديث badge التبويبات
    var unreadTab = document.getElementById("ntab-unread");
    if (unreadTab) {
      var remaining2 = _buildNotifications().filter(function (n) {
        return _getReadIds().indexOf(n.id) === -1;
      }).length;
      var badge = unreadTab.querySelector(".tab-badge");
      if (remaining2 > 0) {
        if (badge) badge.textContent = remaining2;
        else
          unreadTab.innerHTML =
            "غير مقروء <span class='tab-badge'>" + remaining2 + "</span>";
      } else {
        if (badge) badge.remove();
      }
    }
  }

  /** تحديد الكل كمقروء من صفحة التنبيهات */
  function notifPageMarkAllRead() {
    var notifs = _buildNotifications();
    var ids = notifs.map(function (n) {
      return n.id;
    });
    _saveReadIds(ids);
    // تحديث مظهر كل العناصر بدون إعادة رسم
    document.querySelectorAll(".notif-full-item.unread").forEach(function (el) {
      el.classList.remove("unread");
      var strip = el.querySelector(".notif-full-unread-strip");
      if (strip) strip.remove();
      var ubadge = el.querySelector(".unread-badge");
      if (ubadge) {
        ubadge.classList.remove("unread-badge");
        ubadge.classList.add("read-badge");
        ubadge.textContent = "✓ مقروء";
      }
      var markBtn = el.querySelector(".notif-full-item-btn");
      if (markBtn) markBtn.remove();
    });
    // إخفاء زر "تحديد الكل"
    var actBar = document.querySelector(".notif-actions-bar");
    if (actBar) {
      var btn = actBar.querySelector("button");
      if (btn && btn.textContent.indexOf("تحديد الكل") !== -1) {
        btn.style.opacity = "0";
        setTimeout(function () {
          btn.remove();
        }, 300);
      }
    }
    // تحديث badge التبويبات
    ["ntab-unread"].forEach(function (id) {
      var tab = document.getElementById(id);
      if (tab) {
        var b = tab.querySelector(".tab-badge");
        if (b) b.remove();
      }
    });
    updateNotifBell();
    updateAlertBadge();
    showToast(I18N.t("SHELL_MSG_ALL_ALERTS_READ"), "success");
  }

  function onRenameInput(input) {
    var val = input.value.trim();
    var btn = document.getElementById("rename-save-btn");
    var warning = document.getElementById("rename-warning");
    if (btn) btn.disabled = !val;
    if (warning) warning.classList.toggle("show", val.length > 0);
  }

  function saveRenameUser(username) {
    var newName = (document.getElementById("rename-new-name") || {}).value;
    if (!newName || !newName.trim()) {
      showToast(I18N.t("SHELL_MSG_NEW_NAME_REQUIRED"), "error");
      return;
    }
    newName = newName.trim();

    var u = APP.data.users.find(function (x) {
      return x.username === username;
    });
    if (u && u.full_name === newName) {
      showToast(I18N.t("SHELL_MSG_NEW_NAME_SAME"), "warning");
      return;
    }

    var btn = document.getElementById("rename-save-btn");
    if (btn) {
      btn.disabled = true;
      btn.textContent = SAVE_MESSAGES.SAVING;
    }

    // ✅ UX: إغلاق فوري + مؤشر خلفي بدل انتظار الـ Modal
    closeModal();
    _freezeUI(SAVE_MESSAGES.SAVING);

    DL.Users.renameUser(
      {
        username: username,
        new_name: newName,
        callerUser: APP.currentUser ? APP.currentUser.username : "",
      },
      {
        onSuccess: function (result) {
          _unfreezeUI();
          var r = result.data;
          showToast(
            result.message || I18N.t("SHELL_MSG_NAME_CHANGE_SUCCESS"),
            "success",
          );
          // ── تحديث فوري في APP.data بدون إعادة تحميل كاملة ──
          var userInData = APP.data.users.find(function (x) {
            return x.username === username;
          });
          if (userInData) userInData.full_name = (r && r.new_name) || newName;

          // لو كان هو المستخدم الحالي → حدّث currentUser أيضاً
          if (APP.currentUser && APP.currentUser.username === username) {
            APP.currentUser.full_name = (r && r.new_name) || newName;
            // تحديث الـ top bar avatar إذا وُجد
            var avatarEl = document.getElementById("user-avatar-label");
            if (avatarEl)
              avatarEl.textContent = ((r && r.new_name) || newName)[0] || "م";
            var nameEl = document.getElementById("user-display-name");
            if (nameEl) nameEl.textContent = (r && r.new_name) || newName;
          }

          // تحديث الصفحة الحالية لو كانت users أو alerts
          reloadAfterMutation(function () {
            if (APP.currentPage === "users" || APP.currentPage === "alerts")
              renderPage(APP.currentPage);
          });
        },
        onError: function (result) {
          _unfreezeUI();
          showToast(
            result.message || I18N.t("SHELL_MSG_NAME_CHANGE_ERROR"),
            "error",
          );
        },
      },
    );
  }

  // ─────────────────────────────────────────────────────────────
  // 🔔  نظام الإشعارات الذكية — Smart Notification System
  // ─────────────────────────────────────────────────────────────

  var NOTIF_STORAGE_KEY = "wms_notifications_v1";
  var NOTIF_READ_KEY = "wms_notif_read_ids_v1";
  var _notifPollTimer = null;
  var _notifLastCount = -1;

  /** استخراج إشعارات من APP.data — مخزون منخفض + أوامر إنتاج معلقة + شحنات جديدة */
  // [PREFS-WIRING] notif_* : بوابة موحّدة لتفضيلات التنبيهات (Security/
  // Notifications tab). كانت الـ 7 مفاتيح دي (notif_system/email/financial/
  // inventory/customers/suppliers/approvals) مُعرَّفة ومحفوظة بس محدش
  // بيقرأها — أي مفتاح غير معرَّف صراحة كـ false يُعتبر مفعّل افتراضيًا
  // (يحافظ على نفس السلوك القديم لأي مستخدم لسه ما فتحش شاشة التفضيلات).
  function _notifAllowed(category) {
    if (typeof PreferenceService === "undefined") return true;
    return PreferenceService.get("notif_" + category, true) !== false;
  }

  function _buildNotifications() {
    // ✅ [FIX-LAZY-LAYOUT] دفاع إضافي: لو اتنادت قبل ما 03_JS_Dashboard_Items
    // (اللي فيها getItemColors) تتحمّل، رجّع قايمة فاضية بدل ما ترمي ReferenceError.
    if (typeof getItemColors !== "function") return [];
    var d = APP.data || {};
    var notifs = [];
    var now = Date.now();
    var _allowInventory = _notifAllowed("inventory");
    var _allowFinancial = _notifAllowed("financial");
    var _allowCustomers = _notifAllowed("customers");
    var _allowSuppliers = _notifAllowed("suppliers");
    var _allowApprovals = _notifAllowed("approvals");
    var _allowSystem = _notifAllowed("system");

    // ── [BANKING-INTEGRATION] تأكيد تحميل البيانات الموسّعة (محاسبة/بنوك) ──
    // بنود 6b/6c تحت (وكذلك بند 6 الحالي) بتعتمد على حقول ضمن EXT_FIELDS
    // (cheques, bankReconciliations, receiptVouchers, paymentVouchers...)
    // اللي متحمّلة "كسول" (lazy) عن طريق ensureExtendedData ومش بالضرورة
    // موجودة في APP.data أول ما المستخدم يسجّل دخول لو لسه مازار شاشة
    // محاسبة/بنوك من الأساس. تشغيل ensureExtendedData هنا (بدون حجب أي
    // نداء) يضمن إن بيانات الشيكات/المطابقات تتحمّل مرة واحدة في الخلفية
    // وتظهر في الجرس مع أول تحديث تالي (polling) من غير ما نضطر نحوّل
    // _buildNotifications نفسها لدالة async.
    if (
      !d._extLoadedFromServer &&
      !APP.extLoading &&
      typeof ensureExtendedData === "function"
    ) {
      ensureExtendedData(function () {
        if (typeof updateNotifBell === "function") updateNotifBell();
      });
    }

    // ── 1. مخزون منخفض / نافد ── [PREFS-WIRING] gated by notif_inventory ──
    if (_allowInventory)
      (d.items || []).forEach(function (item) {
        var colors = getItemColors(item.id);
        if (colors.length > 0) {
          colors.forEach(function (c) {
            var colorMinQ = Number(c.min_qty || 0) || Number(item.min_qty || 0);
            if (colorMinQ <= 0) return;
            var colorQty = getColorQty(item.id, c.name);
            if (colorQty >= colorMinQ) return;
            var isOut = colorQty <= 0;
            notifs.push({
              id: "stock_" + item.id + "_" + c.name,
              type: isOut ? "danger" : "warning",
              icon: isOut ? "🚫" : "⚠️",
              iconBg: isOut ? "var(--danger-soft)" : "var(--warning-soft)",
              title: esc(item.name) + (c.name ? " — " + esc(c.name) : ""),
              desc: isOut
                ? "نفد المخزون تماماً (الحد الأدنى: " + colorMinQ + ")"
                : "الرصيد " + colorQty + " — الحد الأدنى " + colorMinQ,
              page: "alerts",
              ts: now,
            });
          });
        } else {
          var itemMinQ = Number(item.min_qty || 0);
          if (itemMinQ <= 0) return;
          var currentQty = (d.stock || [])
            .filter(function (s) {
              return s.item_id === item.id;
            })
            .reduce(function (a, s) {
              return a + Number(s.quantity || 0);
            }, 0);
          var totalQty = currentQty + getOpeningQty(item.id);
          if (totalQty >= itemMinQ) return;
          var isOut = totalQty <= 0;
          notifs.push({
            id: "stock_" + item.id,
            type: isOut ? "danger" : "warning",
            icon: isOut ? "🚫" : "⚠️",
            iconBg: isOut ? "var(--danger-soft)" : "var(--warning-soft)",
            title: esc(item.name),
            desc: isOut
              ? "نفد المخزون تماماً (الحد الأدنى: " + itemMinQ + ")"
              : "الرصيد " + totalQty + " — الحد الأدنى " + itemMinQ,
            page: "alerts",
            ts: now,
          });
        }
      });

    // ── 2. أوامر إنتاج معلقة (pending) ── [PREFS-WIRING] gated by notif_system ──
    if (_allowSystem)
      (d.productionOrders || []).forEach(function (po) {
        if (po.status !== "pending") return;
        var itemName = "";
        var it = (d.items || []).find(function (x) {
          return x.id === po.product_id;
        });
        if (it) itemName = it.name;
        notifs.push({
          id: "po_" + po.id,
          type: "info",
          icon: "🏭",
          iconBg: "var(--accent-soft)",
          title: "أمر إنتاج معلق",
          desc:
            (itemName ? esc(itemName) + " — " : "") +
            "الكمية: " +
            (po.quantity || 0),
          page: "production",
          ts: now,
        });
      });

    // ── 3. شحنات قيد التوصيل (in_transit) ── [PREFS-WIRING] gated by notif_system ──
    if (_allowSystem)
      (d.shipments || []).forEach(function (sh) {
        if (sh.status !== "in_transit") return;
        notifs.push({
          id: "ship_" + sh.id,
          type: "info",
          icon: "ti-truck-off",
          iconColor: "#dc2626",
          iconBg: "var(--accent-soft)",
          title: "شحنة قيد التوصيل",
          desc:
            "العميل: " +
            esc(sh.customer || "—") +
            (sh.expected_date ? " — موعد التسليم: " + sh.expected_date : ""),
          page: "shipping",
          ts: now,
        });
      });

    // ── 4. فواتير بيع مستحقة / متأخرة السداد ───────────────────
    var _todayStr0 = new Date().toISOString().slice(0, 10);
    // [PREFS-WIRING] gated by notif_customers
    if (_allowCustomers)
      (d.saleInvoices || []).forEach(function (inv) {
        if (inv.status === "cancelled") return;
        if (inv.payment_status === "paid") return;
        if (!inv.due_date) return;
        if (String(inv.due_date).slice(0, 10) > _todayStr0) return;
        notifs.push({
          id: "si_due_" + inv.id,
          type: "danger",
          icon: "🧾",
          iconBg: "var(--danger-soft)",
          title: "فاتورة بيع مستحقة",
          desc:
            esc(inv.party || "—") +
            " — " +
            formatMoney(inv.net_total || 0, { decimals: 0 }),
          page: "sale-invoices",
          ts: now,
        });
      });

    // ── 5. فواتير شراء متأخرة السداد ── [PREFS-WIRING] gated by notif_suppliers ──
    if (_allowSuppliers)
      (d.purchaseInvoices || []).forEach(function (inv) {
        if (inv.status === "cancelled") return;
        if (inv.payment_status === "paid") return;
        if (!inv.due_date) return;
        if (String(inv.due_date).slice(0, 10) > _todayStr0) return;
        notifs.push({
          id: "pi_due_" + inv.id,
          type: "warning",
          icon: "🧾",
          iconBg: "var(--warning-soft)",
          title: "فاتورة شراء متأخرة السداد",
          desc:
            esc(inv.party || "—") +
            " — " +
            formatMoney(inv.net_total || 0, { decimals: 0 }),
          page: "purchase-invoices",
          ts: now,
        });
      });

    // ── 6. شيكات مستحقة (سندات قبض/صرف بشيك قريبة الاستحقاق) ───
    // [PREFS-WIRING] gated by notif_financial
    if (_allowFinancial)
      ["receiptVouchers", "paymentVouchers"].forEach(function (key) {
        (d[key] || []).forEach(function (v) {
          if (!v.check_number || !v.due_date) return;
          if (v.status === "cancelled") return;
          var dueStr = String(v.due_date).slice(0, 10);
          if (dueStr > _todayStr0) return; // لسه مايجيش معادها
          notifs.push({
            id: "chk_" + key + "_" + v.id,
            type: "warning",
            icon: "💵",
            iconBg: "var(--warning-soft)",
            title: "شيك مستحق",
            desc:
              "شيك رقم " +
              esc(v.check_number) +
              " — " +
              formatMoney(v.amount || 0, { decimals: 0 }),
            page:
              key === "receiptVouchers"
                ? "receipt-vouchers"
                : "payment-vouchers",
            ts: now,
          });
        });
      });

    // ── 6b. شيكات موديول البنوك المستحقة/المتأخرة ────────────────
    // [BANKING-INTEGRATION — المرحلة 11] نفس منطق "شيكات مستحقة خلال 7 أيام"
    // المستخدم في لوحة تحكم البنوك (bindBankingDashboard) — مصدر مختلف عن
    // بند 6 فوق: هنا من جدول الشيكات المخصوص لموديول البنوك (APP.data.cheques)
    // مش من حقل check_number القديم في سندات القبض/الصرف، فمفيش تكرار
    // (الـ id مختلف: "bchq_" بدل "chk_").
    var _soonStr0 = new Date(Date.now() + 7 * 86400000)
      .toISOString()
      .slice(0, 10);
    // [PREFS-WIRING] gated by notif_financial
    if (_allowFinancial)
      (d.cheques || []).forEach(function (c) {
        if (c.status !== "PENDING" || !c.due_date) return;
        var dueStr = String(c.due_date).slice(0, 10);
        if (dueStr > _soonStr0) return; // لسه بعيد عن الاستحقاق
        var isOverdue = dueStr < _todayStr0;
        notifs.push({
          id: "bchq_" + c.id,
          type: isOverdue ? "danger" : "warning",
          icon: isOverdue ? "🚫" : "💵",
          iconBg: isOverdue ? "var(--danger-soft)" : "var(--warning-soft)",
          title: isOverdue
            ? "شيك بنكي متأخر الاستحقاق"
            : "شيك بنكي مستحق قريباً",
          desc:
            "شيك رقم " +
            esc(c.cheque_number || "") +
            (c.party_name ? " — " + esc(c.party_name) : "") +
            " — " +
            formatMoney(c.amount || 0, { decimals: 0 }),
          page: "cheques",
          ts: now,
        });
      });

    // ── 6c. جلسات مطابقة بنكية معتمدة بفرق يستحق المراجعة ─────────
    // [BANKING-INTEGRATION — المرحلة 11] نفس منطق بطاقة "مطابقات معتمدة
    // بفرق" في لوحة تحكم البنوك — إشعار مباشر لأي حساب بنكي محتاج مراجعة.
    // [PREFS-WIRING] gated by notif_financial
    if (_allowFinancial)
      (d.bankReconciliations || []).forEach(function (r) {
        if (r.status !== "COMPLETED") return;
        var diff = parseFloat(r.difference || 0);
        if (Math.abs(diff) < 0.01) return;
        var acc = (d.bankAccounts || []).find(function (a) {
          return a.id === r.bank_account_id;
        });
        notifs.push({
          id: "brec_" + r.id,
          type: "warning",
          icon: "⚠️",
          iconBg: "var(--warning-soft)",
          title: "مطابقة بنكية بفرق يستحق المراجعة",
          desc:
            esc(acc ? acc.name : r.bank_account_id || "—") +
            " — فرق " +
            formatMoney(diff, { decimals: 0 }),
          page: "bank-reconciliation",
          ts: now,
        });
      });

    // ── 7. طلبات إجازة معلقة تحتاج اعتماد ── [PREFS-WIRING] gated by notif_approvals ──
    if (_allowApprovals)
      (d.leaveRequests || []).forEach(function (lr) {
        if (lr.status !== "PENDING") return;
        var emp = (d.employees || []).find(function (e) {
          return e.id === lr.employee_id;
        });
        notifs.push({
          id: "leave_" + lr.id,
          type: "info",
          icon: "🗓️",
          iconBg: "var(--accent-soft)",
          title: "طلب إجازة يحتاج اعتماد",
          desc: esc(emp ? emp.full_name : lr.employee_id || "—"),
          page: "leave-requests",
          ts: now,
        });
      });

    // رتّب: danger أولاً ثم warning ثم info
    var order = { danger: 0, warning: 1, info: 2 };
    notifs.sort(function (a, b) {
      return (order[a.type] || 3) - (order[b.type] || 3);
    });
    return notifs;
  }

  /** اقرأ قائمة الـ IDs المقروءة من localStorage */
  function _getReadIds() {
    try {
      return JSON.parse(localStorage.getItem(NOTIF_READ_KEY) || "[]");
    } catch (e) {
      return [];
    }
  }

  /** احفظ قائمة الـ IDs المقروءة */
  function _saveReadIds(ids) {
    try {
      localStorage.setItem(NOTIF_READ_KEY, JSON.stringify(ids));
    } catch (e) {}
  }

  /** عدد الإشعارات غير المقروءة */
  function _unreadCount(notifs, readIds) {
    return notifs.filter(function (n) {
      return readIds.indexOf(n.id) === -1;
    }).length;
  }

  /** تحديث الـ bell badge بعدد الإشعارات غير المقروءة */
  function updateNotifBell() {
    var notifs = _buildNotifications();
    var readIds = _getReadIds();
    var unread = _unreadCount(notifs, readIds);

    var bubble = document.getElementById("notif-count-bubble");
    if (!bubble) return;

    if (unread > 0) {
      bubble.textContent = unread > 99 ? "99+" : unread;
      bubble.classList.add("show");
    } else {
      bubble.classList.remove("show");
    }

    // لو فيه إشعارات جديدة أكثر من المرة السابقة → نبّه بـ toast خفيف
    if (_notifLastCount >= 0 && unread > _notifLastCount) {
      var diff = unread - _notifLastCount;
      showToast(
        I18N.t(
          diff > 1
            ? "SHELL_MSG_NEW_ALERT_PLURAL"
            : "SHELL_MSG_NEW_ALERT_SINGULAR",
          { count: diff },
        ),
        "warning",
      );
    }
    _notifLastCount = unread;

    // ✅ v4.2: لو صفحة التنبيهات مفتوحة → حدّث badges التبويبات فوراً
    if (APP.currentPage === "alerts") {
      var unreadTabBadge = document.getElementById("ntab-unread");
      if (unreadTabBadge) {
        var b = unreadTabBadge.querySelector(".tab-badge");
        if (unread > 0) {
          if (b) b.textContent = unread;
          else
            unreadTabBadge.innerHTML =
              "غير مقروء <span class='tab-badge'>" + unread + "</span>";
        } else {
          if (b) b.remove();
        }
      }
      var allTabBadge = document.getElementById("ntab-all");
      if (allTabBadge) {
        var notifTotal = _buildNotifications().length;
        var ab = allTabBadge.querySelector(".tab-badge");
        if (notifTotal > 0) {
          if (ab) ab.textContent = notifTotal;
        } else {
          if (ab) ab.remove();
        }
      }
    }
  }

  /** ارسم قائمة الإشعارات داخل الـ dropdown */
  function _renderNotifList() {
    var body = document.getElementById("notif-list-body");
    if (!body) return;
    var notifs = _buildNotifications();
    var readIds = _getReadIds();

    if (!notifs.length) {
      body.innerHTML =
        '<div class="notif-empty"><div>✅</div>لا توجد إشعارات جديدة<br><small>كل شيء على ما يرام</small></div>';
      return;
    }

    body.innerHTML = notifs
      .map(function (n) {
        var isUnread = readIds.indexOf(n.id) === -1;
        return (
          '<div class="notif-item' +
          (isUnread ? " unread" : "") +
          '" data-page="' +
          n.page +
          '" data-id="' +
          n.id +
          '">' +
          (isUnread ? '<span class="notif-unread-dot"></span>' : "") +
          '<div class="notif-icon-wrap" style="background:' +
          n.iconBg +
          '">' +
          n.icon +
          "</div>" +
          '<div class="notif-body">' +
          '<div class="notif-title">' +
          n.title +
          "</div>" +
          '<div class="notif-desc">' +
          n.desc +
          "</div>" +
          "</div>" +
          "</div>"
        );
      })
      .join("");

    // click على item → انتقل للصفحة وحدّده كمقروء
    body.querySelectorAll(".notif-item").forEach(function (el) {
      el.addEventListener("click", function () {
        var nid = el.getAttribute("data-id");
        var page = el.getAttribute("data-page");
        var ids = _getReadIds();
        if (ids.indexOf(nid) === -1) {
          ids.push(nid);
          _saveReadIds(ids);
        }
        // ✅ v4.2: لو صفحة التنبيهات مفتوحة → حدّث UI فوراً (مصدر موحّد)
        if (APP.currentPage === "alerts") {
          var pageItem = document.querySelector(
            '.notif-full-item[data-notif-id="' + nid + '"]',
          );
          if (pageItem) {
            pageItem.classList.remove("unread");
            var strip = pageItem.querySelector(".notif-full-unread-strip");
            if (strip) strip.remove();
            var ubadge = pageItem.querySelector(".unread-badge");
            if (ubadge) {
              ubadge.classList.remove("unread-badge");
              ubadge.classList.add("read-badge");
              ubadge.textContent = "✓ مقروء";
            }
            var markBtn = pageItem.querySelector(".notif-full-item-btn");
            if (markBtn) markBtn.remove();
          }
        }
        updateNotifBell();
        updateAlertBadge();
        closeNotifDropdown();
        navigate(page);
      });
    });
  }

  /** افتح / أغلق الـ dropdown */
  // [REFACTOR-P7] toggleNotifDropdown اتنقلت لـ Core_UIManagers.html (Global، بنفس الاسم)

  // [REFACTOR-P7] closeNotifDropdown اتنقلت لـ Core_UIManagers.html (Global، بنفس الاسم)

  /** ربط أحداث الـ top bar (يُستدعى بعد renderLayout) */
  function bindTopBar() {
    // Bell button
    var bell = document.getElementById("notif-bell-btn");
    if (bell)
      bell.addEventListener("click", function (e) {
        e.stopPropagation();
        toggleNotifDropdown();
      });

    // Backdrop
    var bd = document.getElementById("notif-backdrop");
    if (bd) bd.addEventListener("click", closeNotifDropdown);

    // Mark all as read
    var markAll = document.getElementById("notif-mark-all-btn");
    if (markAll)
      markAll.addEventListener("click", function () {
        var notifs = _buildNotifications();
        var ids = notifs.map(function (n) {
          return n.id;
        });
        _saveReadIds(ids);
        _renderNotifList();
        updateNotifBell();
        updateAlertBadge();
        // ✅ v4.2: لو صفحة التنبيهات مفتوحة → حدّث مباشرة (مصدر موحّد)
        if (APP.currentPage === "alerts") {
          if (typeof notifPageMarkAllRead === "function")
            notifPageMarkAllRead();
        }
      });

    // Go to alerts page
    var goAlerts = document.getElementById("notif-go-alerts-btn");
    if (goAlerts)
      goAlerts.addEventListener("click", function () {
        closeNotifDropdown();
        navigate("alerts");
      });

    // polling كل 5 دقائق
    if (_notifPollTimer) clearInterval(_notifPollTimer);
    _notifPollTimer = setInterval(
      function () {
        // نحدّث البيانات بصمت ثم نحدث الـ bell
        if (typeof _silentRefresh === "function") _silentRefresh();
        else updateNotifBell();
      },
      5 * 60 * 1000,
    );

    // تحديث فوري
    updateNotifBell();

    // ── ربط زر تبديل اللغة (AR/EN) ──
    var langBtn = document.getElementById("lang-switch-btn");
    if (langBtn) {
      langBtn.addEventListener("click", function () {
        if (langBtn.disabled) return;
        var next = I18N.getLang() === "ar" ? "en" : "ar";
        var icon = langBtn.querySelector(".lang-switch-icon");
        langBtn.disabled = true;
        if (icon) {
          icon.className = "ti ti-loader-2 lang-switch-icon";
          icon.style.animation = "spin 1s linear infinite";
        }
        I18N.switchLanguage(
          APP.currentUser && APP.currentUser.username,
          SESSION ? SESSION.token : null,
          next,
          function () {
            langBtn.disabled = false;
            if (icon) {
              icon.className = "ti ti-language lang-switch-icon";
              icon.style.animation = "";
            }
            var label = document.getElementById("lang-switch-label");
            if (label)
              label.textContent = I18N.getLang() === "ar" ? "EN" : "AR";
          },
          function (err) {
            langBtn.disabled = false;
            if (icon) {
              icon.className = "ti ti-language lang-switch-icon";
              icon.style.animation = "";
            }
            if (typeof showToast === "function") {
              showToast((err && err.message) || "تعذر تغيير اللغة", "error");
            }
          },
        );
      });
    }

    // ── ربط زر واتساب في Top Bar ──
    var waBtn = document.getElementById("wa-topbar-btn");
    if (waBtn) {
      waBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (typeof WA_HUB !== "undefined" && WA_HUB.toggleDropdown) {
          WA_HUB.toggleDropdown();
        }
      });
    }
    // إغلاق قائمة WA عند الضغط خارجها
    document.addEventListener("click", function (e) {
      var dd = document.getElementById("wa-topbar-dropdown");
      var wrap = document.getElementById("wa-topbar-wrap");
      if (
        dd &&
        dd.style.display !== "none" &&
        wrap &&
        !wrap.contains(e.target)
      ) {
        dd.style.display = "none";
      }
    });
  }

  /** تحديث عنوان الصفحة في الـ top bar */
  function updateTopBarTitle(title) {
    var el = document.getElementById("top-bar-title");
    if (el) el.textContent = title || "";
  }

  // [BREADCRUMB-IW] شاشات الفاتورة/المرتجع (صفحة كاملة، مش مودال) —
  // مش مسجّلة كـ item عادي في NAV_GROUPS (بتتفتح بدالة JS مباشرة
  // زي openSaleInvoiceWorkspace)، فبدونها كانت بترجع بريدكرمب ناقص
  // (لوحة التحكم > فاتورة بيع جديدة بس). هنا بنعرّف تبعيتها الصحيحة:
  // المجموعة (المبيعات/المشتريات) ← صفحة القائمة (فواتير البيع...) ← الحالية.
  var IW_WORKSPACE_BREADCRUMB = {
    sale_invoice_workspace: {
      group: "MENU_SALES",
      groupPage: "sales-dashboard",
      listLabel: "MENU_SALES_INVOICES",
      listPage: "sale-invoices",
      titleKey: "PAGE_SALE_INVOICE_WORKSPACE",
    },
    purchase_invoice_workspace: {
      group: "MENU_PURCHASES",
      groupPage: "purchases-dashboard",
      listLabel: "MENU_PURCHASE_INVOICES",
      listPage: "purchase-invoices",
      titleKey: "PAGE_PURCHASE_INVOICE_WORKSPACE",
    },
    sale_return_workspace: {
      group: "MENU_SALES",
      groupPage: "sales-dashboard",
      listLabel: "MENU_SALES_RETURN",
      listPage: "sale-returns",
      titleKey: "PAGE_SALE_RETURN_WORKSPACE",
    },
    purchase_return_workspace: {
      group: "MENU_PURCHASES",
      groupPage: "purchases-dashboard",
      listLabel: "MENU_PURCHASE_RETURN",
      listPage: "purchase-returns",
      titleKey: "PAGE_PURCHASE_RETURN_WORKSPACE",
    },
  };

  function _getPageNavMeta(page) {
    var groups = window.NAV_GROUPS || [];
    if (IW_WORKSPACE_BREADCRUMB[page]) {
      var iw = IW_WORKSPACE_BREADCRUMB[page];
      return {
        crumbs: [
          { label: I18N.t(iw.group), page: iw.groupPage },
          { label: I18N.t(iw.listLabel), page: iw.listPage },
        ],
        label: I18N.t(iw.titleKey) || page,
        icon: "",
      };
    }
    // ✅ [SIDEBAR-V3] لوحات تحكم الأقسام (dashboardPage) بقت مش موجودة
    // كـ item عادي جوه items[] — دلوقتي هي خاصية على مستوى المجموعة نفسها
    // (تتفتح بالضغط على اسم القسم في السايد بار). لازم نتأكد منها هنا الأول
    // عشان الـ breadcrumb يرجّع اسم ومجموعة صح لصفحات الداشبورد دي.
    for (var d = 0; d < groups.length; d++) {
      if (groups[d].dashboardPage === page) {
        // ✅ [FIX] لوحة تحكم القسم دي مستوى واحد بس تحت "لوحة التحكم"
        // الرئيسية — من غير ما نكرر اسم القسم مرتين (كرمب نصي + current)
        return {
          crumbs: [],
          label: I18N.t(groups[d].group) || page,
          icon: groups[d].icon || "",
        };
      }
    }
    for (var i = 0; i < groups.length; i++) {
      var items = groups[i].items || [];
      for (var j = 0; j < items.length; j++) {
        if (items[j].page === page) {
          return {
            // [BREADCRUMB-4-LEVEL] "crumbs" مصفوفة تمثّل كل المستويات
            // اللي قبل الصفحة الحالية. البند العادي في NAV_GROUPS بياخد
            // مستوى واحد بس (اسم المجموعة) زي ما كان قبل كده.
            // ✅ [BREADCRUMB-ALL-LINKS] لو المجموعة عندها dashboardPage
            // (زي "المحاسبة" → accounting-dashboard)، بقى كرمب اسم
            // المجموعة نفسه رابط قابل للضغط بيوديك للوحة تحكم القسم —
            // بدل ما يفضل نص عادي زي ما كان الوضع قبل كده. لو المجموعة
            // معندهاش داشبورد أصلاً، بيفضل نص عادي (مفيش حاجة تتربط بيها).
            crumbs: [
              {
                label: groups[i].group ? I18N.t(groups[i].group) : "",
                page: groups[i].dashboardPage || null,
              },
            ],
            label: items[j].label ? I18N.t(items[j].label) : page,
            icon: items[j].icon || "",
          };
        }
      }
    }
    // ✅ [FIX] لو الصفحة مش مسجّلة كـ item مباشر في NAV_GROUPS — غالبًا
    // ده تقرير تفصيلي بيُفتح من جوه أحد الـ Hubs (مثل sales_summary جوه
    // sales_hub) ومسجّل بس في ERP_PAGE_MAP. كان قبل كده الـ breadcrumb
    // بيرجّع page id الخام (مثلاً "sales_summary") لحد ما نوصل هنا.
    // دلوقتي بنحاول نجيب اسمه الحقيقي ومجموعته (اسم الـ Hub الأب) منها.
    if (typeof ERP_PAGE_MAP !== "undefined" && ERP_PAGE_MAP[page]) {
      var info = ERP_PAGE_MAP[page];
      var moduleHubMap = {
        reports: "reports_hub",
        inventory: "inventory_hub",
        sales: "sales_hub",
        customers: "customers_hub",
        suppliers: "suppliers_hub",
        purchases: "purchases_hub",
        production: "production_hub",
        accounting: "accounting_hub",
        hr: "hr_hub",
        banking: "banking_hub",
        shipping: "shipping_hub",
        assets: "assets_hub",
        tax: "tax_hub",
      };
      var hubPage = moduleHubMap[info.module];
      // [BREADCRUMB-4-LEVEL] بدل ما نرجّع مستوى واحد بس، بنبني المسار
      // الكامل: الرئيسية > التقارير > <اسم مركز التقارير> > <التقرير>.
      // كل مستوى فيه "page" يبقى رابط قابل للضغط (navigate)، وده اللي
      // كان ناقص قبل كده (كان بيتعرض كـ نص عادي مش رابط).
      var crumbs = [{ label: I18N.t("MENU_REPORTS"), page: "reports_hub" }];
      if (hubPage && hubPage !== page) {
        var hubMeta = _getPageNavMeta(hubPage);
        crumbs.push({ label: hubMeta.label || "", page: hubPage });
      }
      return { crumbs: crumbs, label: info.title || page, icon: "" };
    }
    // [FIX-BREADCRUMB-EN] كان الفallback هنا بيرجّع page id الخام
    // بالإنجليزي (مثلاً "user-preferences") لأي صفحة مش مسجّلة في
    // NAV_GROUPS ولا ERP_PAGE_MAP، فيظهر شريط التنقل مخلوط عربي/إنجليزي.
    // دلوقتي بنحاول نجيب الاسم العربي من PAGE_TITLES (نفس الخريطة
    // المستخدمة لعنوان الـ top bar) قبل ما نرجع للـ id الخام كملاذ أخير.
    var _fallbackLabel =
      (typeof window.PAGE_TITLES !== "undefined" && window.PAGE_TITLES[page]) ||
      page ||
      "";
    return { crumbs: [{ label: "" }], label: _fallbackLabel, icon: "" };
  }

  function _favoritesKey() {
    var u = APP.currentUser
      ? APP.currentUser.username || APP.currentUser.email || "user"
      : "guest";
    return "wms_favorite_pages_" + u;
  }

  function getFavoritePages() {
    try {
      var raw = localStorage.getItem(_favoritesKey());
      var arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      return [];
    }
  }

  function isFavoritePage(page) {
    return getFavoritePages().indexOf(page) !== -1;
  }

  function toggleFavoritePage(page) {
    page = page || APP.currentPage;
    if (!page) return;
    var arr = getFavoritePages();
    var idx = arr.indexOf(page);
    if (idx === -1) {
      arr.push(page);
      showToast(I18N.t("SHELL_MSG_PAGE_ADDED_FAVORITES"), "success");
    } else {
      arr.splice(idx, 1);
      showToast(I18N.t("SHELL_MSG_PAGE_REMOVED_FAVORITES"), "info");
    }
    try {
      localStorage.setItem(_favoritesKey(), JSON.stringify(arr));
    } catch (e) {}
    renderPageTrail(page);
  }

  /**
   * [BREADCRUMB-4-LEVEL]
   * page: الصفحة الحالية (زي "accounting_hub" أو "general-ledger").
   * extraCrumb (اختياري): { label, backAction } — بيتبعت لما يكون فيه
   * تقرير مفتوح محليًا جوه Report Center (عن طريق _openGroupReport)
   * من غير navigate كامل، عشان نضيف مستوى رابع باسم التقرير نفسه.
   * backAction: كود JS ينفّذ لما تدوس على كرمب الـ Hub (زي
   * "_closeGroupReport('accounting')") بدل navigate كامل.
   */
  function renderPageTrail(page, extraCrumb) {
    var wrap = document.getElementById("page-trail");
    if (!wrap) return;
    var meta = _getPageNavMeta(page);
    var favs = getFavoritePages()
      .map(function (p) {
        var m = _getPageNavMeta(p);
        return (
          '<button class="page-fav-chip" onclick="navigate(\'' +
          esc(p) +
          '\')" title="' +
          esc(m.label) +
          '">' +
          (m.icon || "") +
          "<span>" +
          esc(m.label) +
          "</span></button>"
        );
      })
      .join("");

    function _sep() {
      return '<i class="ti ti-chevron-left bc-sep"></i>';
    }
    function _link(label, onclickJs) {
      return (
        '<button class="bc-link" onclick="' +
        onclickJs +
        '"><span>' +
        esc(label) +
        "</span></button>"
      );
    }
    function _text(label) {
      return '<span class="bc-group">' + esc(label) + "</span>";
    }
    function _current(label, icon) {
      return (
        '<span class="bc-current">' +
        (icon || "") +
        "<span>" +
        esc(label) +
        "</span></span>"
      );
    }

    var trailHtml = "";
    if (page !== "dashboard") {
      (meta.crumbs || []).forEach(function (c) {
        if (!c.label) return;
        trailHtml +=
          _sep() +
          (c.page
            ? _link(c.label, "navigate('" + c.page + "')")
            : _text(c.label));
      });
      if (extraCrumb && extraCrumb.label) {
        // فيه تقرير مفتوح محليًا جوه الـ Hub: نحوّل كرمب الـ Hub لرابط
        // رجوع، ونضيف اسم التقرير كمستوى أخير (رابع) هو الـ current.
        trailHtml +=
          _sep() +
          _link(
            meta.label,
            extraCrumb.backAction || "navigate('" + esc(page) + "')",
          );
        trailHtml += _sep() + _current(extraCrumb.label, "");
      } else {
        trailHtml += _sep() + _current(meta.label, meta.icon);
      }
    }

    wrap.innerHTML =
      '<div class="page-trail-inner">' +
      '<div class="breadcrumbs">' +
      '<button class="bc-link" onclick="navigate(\'dashboard\')"><i class="ti ti-home"></i><span>' +
      I18N.t("MENU_DASHBOARD") +
      "</span></button>" +
      trailHtml +
      "</div>" +
      '<div class="page-trail-actions">' +
      (favs ? '<div class="page-fav-list">' + favs + "</div>" : "") +
      '<button class="page-fav-btn' +
      (isFavoritePage(page) ? " active" : "") +
      '" onclick="toggleFavoritePage(\'' +
      esc(page) +
      '\')" title="تثبيت في المفضلة"><i class="ti ' +
      (isFavoritePage(page) ? "ti-star-filled" : "ti-star") +
      '"></i></button>' +
      "</div>" +
      "</div>";
  }

        esc(fileId) +

  function _execRestore(fileId, fileName) {
    var btn = document.getElementById("confirm-restore-btn");
    if (btn) {
      btn.disabled = true;
      btn.innerHTML =
        "<i class='ti ti-loader-2' style='animation:spin 1s linear infinite'></i> جاري الاستعادة...";
    }
    DL.Backup.restore(fileId, currentUser && currentUser.name, {
      onSuccess: function (result) {
        var res = result.data;
        closeModal();
        if (res.success) {
          showToast(
            I18N.t("SHELL_MSG_RESTORE_SUCCESS_FROM") + " " + fileName,
            "success",
            5000,
          );
          setTimeout(function () {
            // [INTENTIONAL-RELOAD] إعادة تحميل كاملة مقصودة هنا:
            // استعادة النسخة الاحتياطية تغير البيانات بشكل جذري في السيرفر
            // ولا يمكن تحديث الـ cache المحلي بدون reload كامل لضمان سلامة البيانات
            location.reload();
          }, 2000);
        } else {
          showToast(
            "❌ فشل الاستعادة: " + (res.message || "خطأ غير معروف"),
            "error",
            6000,
          );
        }
      },
      onError: function (result) {
        closeModal();
        showToast(
          I18N.t("SHELL_MSG_ERROR_ICON_PREFIX") + " " + (result.message || ""),
          "error",
          6000,
        );
      },
    });
  }

  function _toggleBackupDayField(freq) {
    var wrap = document.getElementById("backup-day-wrap");
    var label = document.getElementById("backup-day-label");
    var dayEl = document.getElementById("backup-day");
    if (!wrap) return;
    if (freq === "weekly") {
      wrap.style.display = "";
      if (label) label.textContent = "اليوم (من الأسبوع)";
      // خيارات أيام الأسبوع
      if (dayEl)
        dayEl.innerHTML =
          '<option value="1">الاثنين</option><option value="2">الثلاثاء</option>' +
          '<option value="3">الأربعاء</option><option value="4">الخميس</option>' +
          '<option value="5">الجمعة</option><option value="6">السبت</option><option value="7">الأحد</option>';
    } else if (freq === "monthly") {
      wrap.style.display = "";
      if (label) label.textContent = "يوم من الشهر";
      // خيارات 1-28
      if (dayEl) {
        var opts = "";
        for (var i = 1; i <= 28; i++)
          opts += '<option value="' + i + '">' + i + "</option>";
        dayEl.innerHTML = opts;
      }
    } else {
      wrap.style.display = "none";
    }
  }

  function saveBackupSchedule() {
    var freqEl = document.getElementById("backup-frequency");
    var hourEl = document.getElementById("backup-hour");
    var dayEl = document.getElementById("backup-day");
    if (!freqEl || !hourEl) return;

    var schedule = {
      frequency: freqEl.value,
      hour: Number(hourEl.value),
      day: dayEl ? Number(dayEl.value) : 1,
    };

    var anim = showSaveAnim({
      title: "جاري حفظ جدول الباكاب...",
      emoji: "⏰",
      subtitle: "",
    });
    DL.Backup.setupTrigger(schedule, {
      onSuccess: function (result) {
        anim.done("✅ تم حفظ الجدول");
        showToast(result.message, "success");
      },
      onError: function (result) {
        anim.fail(result.message || "فشل الحفظ");
      },
    });
  }

  function bindNav() {
    // ── إضافة زر الباكاب للـ header لو المستخدم أدمن ──
    setTimeout(_addBackupIndicatorToHeader, 100);

    // ── دالة مساعدة: أغلق كل الـ dropdowns وامسح التلوين ──
    // [REFACTOR-P7] _closeAllDropdowns اتنقلت لـ Core_UIManagers.html (Global، بنفس الاسم)

    // ── flat nav items ──
    document.querySelectorAll(".nav-item").forEach(function (el) {
      if (el.classList.contains("nav-dropdown-toggle")) return;
      el.addEventListener("click", function () {
        _closeAllDropdowns();
        closeSidebar();
        renderPage(el.dataset.page);
      });
    });

    // ── دالة مساعدة: اعمل auto-scroll للسايد بار عشان الجروب اللي اتفتح يظهر كامل ──
    // ✅ [FIX] لما المستخدم يفتح جروب جديد من السايد بار، الجروب ممكن يطلع
    // جزء منه برا تحت حدود السايد بار المرئية، فبنستنى انتهاء أنيميشن
    // الفتح (0.32s زي ما محدد في CSS) وبعدين نحسب الفرق ونعمل scroll
    // باللي يلزم بالظبط — مع مراعاة إن عنوان الجروب نفسه يفضل ظاهر فوق.
    function _scrollGroupIntoView(wrapEl) {
      var navEl = document.querySelector(".sidebar-nav");
      if (!navEl || !wrapEl) return;
      setTimeout(function () {
        var navRect = navEl.getBoundingClientRect();
        var wrapRect = wrapEl.getBoundingClientRect();
        var overflowBottom = wrapRect.bottom - navRect.bottom;
        var overflowTop = navRect.top - wrapRect.top;
        if (overflowBottom > 0) {
          // الجروب طالع برا تحت — انزل بالسكرول، بس متخليش رأس الجروب يطلع برا فوق
          var scrollBy = Math.min(
            overflowBottom,
            Math.max(0, wrapRect.top - navRect.top),
          );
          if (scrollBy > 0)
            navEl.scrollBy({ top: scrollBy, behavior: "smooth" });
        } else if (overflowTop > 0) {
          // الجروب طالع جزئيًا فوق — اطلع لفوق بالقد اللازم
          navEl.scrollBy({ top: -overflowTop, behavior: "smooth" });
        }
      }, 340);
    }

    // ── [SIDEBAR-V3] رأس المجموعة بقى منطقتين مستقلتين ──
    //  1) .nav-grp-arrow  → دايمًا بيفتح/يقفل القائمة الفرعية بس (accordion).
    //  2) .nav-grp-label  → لو معاها data-dashboard-page: بتفتح داشبورد
    //     القسم مباشرة (زي أي nav-item عادي) من غير ما تفتح/تقفل القائمة.
    //     لو القسم لسه معندوش داشبورد (data-dashboard-page مش موجودة):
    //     بترجع لنفس سلوك الأول القديم (فتح/قفل القائمة) عشان الأقسام
    //     اللي لسه ملهاش Dashboard (مثلاً "العملاء"، "الموردين"، "الإدارة")
    //     تفضل شغالة عادي لحد ما نبني لها Dashboards في مرحلة لاحقة.
    function _toggleGroupMenu(gId) {
      var toggleEl = document.getElementById(gId + "-toggle");
      var menuEl = document.getElementById(gId + "-menu");
      if (!toggleEl || !menuEl) return;
      var open = menuEl.classList.contains("open");

      // أغلق كل الـ groups الأخرى وامسح تلوينها (بانتقال سلس)
      document
        .querySelectorAll(".nav-grp-toggle")
        .forEach(function (otherToggle) {
          if (otherToggle === toggleEl) return;
          var oId = otherToggle.id.replace("-toggle", "");
          var oMenu = document.getElementById(oId + "-menu");
          if (oMenu) oMenu.classList.remove("open");
          otherToggle.classList.remove("open", "has-active");
          if (oMenu) {
            oMenu
              .querySelectorAll(".nav-sub-item.active")
              .forEach(function (x) {
                x.classList.remove("active");
              });
          }
        });

      // فتح/إغلاق الـ group الحالية
      menuEl.classList.toggle("open", !open);
      toggleEl.classList.toggle("open", !open);
      if (open) {
        // بتقفل — امسح كل التحديد ووقف مؤقت الإغلاق التلقائي
        toggleEl.classList.remove("has-active");
        menuEl.querySelectorAll(".nav-sub-item.active").forEach(function (x) {
          x.classList.remove("active");
        });
      } else {
        // ✅ [FIX] بتفتح — اعمل auto-scroll للسايد بار عشان الجروب يظهر كامل
        var wrapEl = document.getElementById(gId + "-wrap");
        _scrollGroupIntoView(wrapEl);
      }
    }

    // السهم: يفتح/يقفل القائمة الفرعية بس — مفيش navigate خالص هنا
    document.querySelectorAll(".nav-grp-arrow").forEach(function (arrowEl) {
      var gId = arrowEl.id.replace("-arrow", "");
      arrowEl.addEventListener("click", function (e) {
        e.stopPropagation();
        // [FIX-SIDEBAR-SOUND] الـ stopPropagation فوق بيمنع صوت النقر العام
        // (المُفعَّل عبر delegation على document) من الوصول هنا — نشغّله يدوياً
        // عشان السهم يصوّت زي أي زر تاني في السايد بار.
        if (typeof AS !== "undefined") {
          try {
            AS.click();
          } catch (eX) {}
        }
        _toggleGroupMenu(gId);
      });
    });

    // اسم القسم: لو عنده Dashboard → افتحه مباشرة. لو مفيش → افتح/اقفل القائمة (سلوك قديم)
    document.querySelectorAll(".nav-grp-label").forEach(function (labelEl) {
      var wrapEl = labelEl.closest(".nav-dropdown");
      var gId = wrapEl ? wrapEl.id.replace("-wrap", "") : "";
      labelEl.addEventListener("click", function (e) {
        e.stopPropagation();
        // [FIX-SIDEBAR-SOUND] نفس مشكلة السهم — stopPropagation بيمنع صوت
        // النقر العام، فبنشغّله يدوياً هنا.
        if (typeof AS !== "undefined") {
          try {
            AS.click();
          } catch (eX) {}
        }
        var dashPage = labelEl.dataset.dashboardPage;
        if (dashPage) {
          _closeAllDropdowns();
          closeSidebar();
          renderPage(dashPage);
        } else {
          _toggleGroupMenu(gId);
        }
      });
    });

    // ── Sub-items ──
    document.querySelectorAll(".nav-sub-item").forEach(function (el) {
      el.addEventListener("click", function () {
        // امسح active من كل الـ sub-items فقط
        document.querySelectorAll(".nav-sub-item.active").forEach(function (x) {
          x.classList.remove("active");
        });
        el.classList.add("active");

        // حافظ على الـ group الأم مفتوحة وعليها highlight
        var parentMenu = el.closest("[id$='-menu']");
        if (parentMenu) {
          var gId = parentMenu.id.replace("-menu", "");
          var toggleEl = document.getElementById(gId + "-toggle");
          if (toggleEl) toggleEl.classList.add("open", "has-active");
          parentMenu.classList.add("open");
        }

        closeSidebar();

        // ✅ صفحات كشف الحساب لها pages منفصلة — لا حاجة لـ workaround

        renderPage(el.dataset.page);
      });
    });

    // Mobile sidebar toggle
    var toggleBtn = document.getElementById("sidebar-toggle");
    var backdrop = document.getElementById("sidebar-backdrop");
    if (toggleBtn)
      toggleBtn.addEventListener("click", function () {
        var sb = document.getElementById("main-sidebar");
        var bd = document.getElementById("sidebar-backdrop");
        if (!sb) return;
        var isOpen = sb.classList.contains("open");
        if (isOpen) {
          closeSidebar();
        } else {
          openSidebar();
        }
      });
    if (backdrop) backdrop.addEventListener("click", closeSidebar);

    // ✅ [SIDEBAR-COLLAPSE] زرار الطي/الفتح (ديسكتوب) + استرجاع آخر حالة محفوظة
    var collapseBtn = document.getElementById("sidebar-collapse-btn");
    if (collapseBtn)
      collapseBtn.addEventListener("click", toggleSidebarCollapse);
    _initSidebarCollapseState();

    var tog = document.getElementById("theme-toggle");
    if (tog)
      tog.addEventListener("click", function () {
        // ── [إصلاح P3/P4] مصدر الحقيقة الوحيد الآن هو PreferenceService.set().
        // كل ما كان يتكرر يدويًا هنا (data-theme, wms_theme, مزامنة تاب
        // التفضيلات، الـ pill icons) بقى مسؤولية _applyToUI + مشترك واحد
        // مسجَّل مرة واحدة (انظر _wireThemeSubscription أسفل) بدل تكراره
        // في كل نقطة تُغيّر فيها الثيم (toggle هنا + upSetTheme في شاشة
        // التفضيلات). هذا يقفل ثغرة تعدد مصادر الحقيقة الموثّقة في التقرير.
        var next = APP.isDark ? "light" : "dark";
        if (typeof PreferenceService !== "undefined") {
          PreferenceService.set("theme", next);

          // fallback نادر لو PreferenceService لم يُحمَّل بعد (قبل اللوجين)
          APP.isDark = next === "dark";

            "data-theme",

  // ─────────────────────────────────────────────────────────────
  // 🛠️  المساعدات العامة — Utilities
  // ─────────────────────────────────────────────────────────────

  // ══════════════════════════════════════════════════════════
  //  🔒 حماية الصفر الأول (Leading Zero Protection) — Frontend
  //  استخدمها مع: رقم الهاتف / الواتساب / الكود / SKU / Barcode / الرقم القومي
  //  ⚠️ ممنوع نهائيًا استخدام Number() أو parseInt() أو parseFloat() أو
  //  العامل + على أي قيمة من هذه الحقول — استخدم preserveTextNumber دايمًا
  // ══════════════════════════════════════════════════════════

  /**
   * preserveTextNumber — يحوّل أي قيمة إلى نص نظيف بدون أي تحويل رقمي
   * نفس الدالة موجودة في الباك إند (Code.js) لتوحيد المنطق بين الطرفين
   * @param {*} value
   * @returns {string}
   */
  function preserveTextNumber(value) {
    if (value === null || value === undefined) return "";
    return String(value).trim();
  }

  /**
   * sanitizeDigitsKeepLeadingZero — يسمح بالأرقام فقط (وعلامة + اختياريًا
   * في البداية للأرقام الدولية) بدون أي تحويل لـ Number — فيحافظ على
   * الصفر الأول والطول الأصلي للرقم كما كتبه المستخدم
   * @param {string} value
   * @param {boolean} [allowPlus]
   * @returns {string}
   */
  function sanitizeDigitsKeepLeadingZero(value, allowPlus) {
    var v = preserveTextNumber(value);
    if (!v) return "";
    var plus = allowPlus && v.charAt(0) === "+" ? "+" : "";
    return plus + v.replace(/\D/g, "");
  }

  /**
   * bindTextNumberInput — يربط حقل <input> برقم/كود نصي فيمنع أي حروف
   * غير رقمية أثناء الكتابة، ويحافظ على الصفر الأول تلقائيًا (بدون أي
   * Number()/parseInt() في أي مكان). يضمن أيضًا إن نوع الحقل text لا number.
   *
   * مثال: bindTextNumberInput('emp-d-phone', { allowPlus: true });
   * @param {string|HTMLElement} inputIdOrEl
   * @param {{allowPlus?: boolean}} [opts]
   */
  function bindTextNumberInput(inputIdOrEl, opts) {
    opts = opts || {};
    var el =
      typeof inputIdOrEl === "string"
        ? document.getElementById(inputIdOrEl)
        : inputIdOrEl;
    if (!el || el._textNumberBound) return;
    if (el.type === "checkbox" || el.type === "radio") return;
    el._textNumberBound = true;
    el.setAttribute("type", "text"); // تأكيد إنه مش input من نوع number
    el.setAttribute("inputmode", "numeric");
    el.addEventListener("input", function () {
      var pos = el.selectionStart;
      var before = el.value;
      el.value = sanitizeDigitsKeepLeadingZero(el.value, opts.allowPlus);
      if (pos != null && el.value.length === before.length) {
        try {
          el.setSelectionRange(pos, pos);
        } catch (e) {}
      }
    });
  }

  /**
   * autoProtectTextNumberInputs — يفحص الصفحة (أو جزء منها) ويربط تلقائيًا
   * كل حقل واضح إنه هاتف/كود برقم باستخدام bindTextNumberInput.
   * نادِها بعد أي render لفورم/مودال فيه حقول هاتف أو كود جديدة، مثال:
   *   openStyledDrawer({...}); autoProtectTextNumberInputs();
   *
   * ⚡ الأداء: الفحص نفسه مؤجَّل بـ setTimeout(0) داخليًا تلقائيًا، بحيث
   * يشتغل بعد ما المتصفح يخلّص رسم الشاشة/حركة الفتح، فمايعملش أي تهنيج
   * (jank) أثناء فتح أي درج/مودال — حتى لو الشاشة فيها مئات الحقول.
   * @param {HTMLElement|Document} [root]
   */
  function autoProtectTextNumberInputs(root) {
    var scope = root || document;
    setTimeout(function () {
      var selector =
        "input[data-text-number]:not([data-allow-alpha]), " +
        'input[id*="phone" i]:not([data-allow-alpha]), input[id*="mobile" i]:not([data-allow-alpha]), ' +
        'input[id*="whatsapp" i]:not([data-allow-alpha]), input[id*="-code"]:not([data-allow-alpha]), ' +
        'input[id*="_code"]:not([data-allow-alpha]), input[id$="code"]:not([data-allow-alpha]), ' +
        'input[id*="barcode" i]:not([data-allow-alpha]), input[id*="sku" i]:not([data-allow-alpha]), ' +
        'input[id*="national" i]:not([data-allow-alpha])';
      try {
        var els = scope.querySelectorAll(selector);
        for (var i = 0; i < els.length; i++) {
          var el = els[i];
          var isPhoneLike = /phone|mobile|whatsapp/i.test(el.id || "");
          bindTextNumberInput(el, { allowPlus: isPhoneLike });
        }
      } catch (e) {
        // المتصفح ممكن مايدعمش الـ "i" flag بالـ selector (نادرًا) —
        // جرّب تاني بدونها بأمان
        try {
          var fallbackSel =
            "input[data-text-number]:not([data-allow-alpha]), " +
            'input[id*="phone"]:not([data-allow-alpha]), input[id*="Phone"]:not([data-allow-alpha]), ' +
            'input[id*="mobile"]:not([data-allow-alpha]), input[id*="Mobile"]:not([data-allow-alpha]), ' +
            'input[id*="whatsapp"]:not([data-allow-alpha]), input[id*="Whatsapp"]:not([data-allow-alpha]), ' +
            'input[id*="-code"]:not([data-allow-alpha]), input[id*="_code"]:not([data-allow-alpha]), input[id$="code"]:not([data-allow-alpha]), ' +
            'input[id*="barcode"]:not([data-allow-alpha]), input[id*="Barcode"]:not([data-allow-alpha]), ' +
            'input[id*="sku"]:not([data-allow-alpha]), input[id*="SKU"]:not([data-allow-alpha]), ' +
            'input[id*="national"]:not([data-allow-alpha]), input[id*="National"]:not([data-allow-alpha])';
          var els2 = scope.querySelectorAll(fallbackSel);
          for (var j = 0; j < els2.length; j++) {
            var el2 = els2[j];
            bindTextNumberInput(el2, {

  /* ✅ [FIX-TOAST] الـ bubble يظهر فوق زرار الروبوت مباشرةً بمسافة محترمة */
  function _positionBubble(bubble) {
    var fab = document.getElementById("ai-fab");
    var bW = Math.min(300, window.innerWidth - 32);

    bubble.style.width = bW + "px";
    bubble.style.position = "fixed";

    if (fab) {
      var fr = fab.getBoundingClientRect();
      var fabCX = fr.left + fr.width / 2; // مركز الأيقون أفقياً

      var bH = bubble.offsetHeight || 60;

      // الرسالة تبدأ من يسار الأيقون (بداية الدائرة)
      var bubbleLeft = fr.left;
      bubbleLeft = Math.max(
        8,
        Math.min(bubbleLeft, window.innerWidth - bW - 8),
      );

      // السهم عند مركز الأيقون بالظبط
      var arrowX = fabCX - bubbleLeft;
      arrowX = Math.max(16, Math.min(arrowX, bW - 16));

      // هل في مكان كافي تحت الأيقون؟
      var spaceBelow = window.innerHeight - fr.bottom - 8;
      if (spaceBelow >= bH + 10) {
        // ← كافي: الرسالة تحت الأيقون، السهم فوقها يشير لأعلى
        bubble.style.top = fr.bottom + 10 + "px";
        bubble.style.bottom = "";
        bubble.setAttribute("data-pos", "below");
      } else {
        // ← مش كافي: الرسالة فوق الأيقون، السهم أسفلها يشير لأسفل
        bubble.style.top = fr.top - bH - 10 + "px";
        bubble.style.bottom = "";
        bubble.setAttribute("data-pos", "above");
      }

      bubble.style.left = bubbleLeft + "px";
      bubble.style.right = "";
      bubble.style.setProperty("--fab-arrow-x", arrowX + "px");
    } else {
      bubble.style.left = "10px";
      bubble.style.bottom = "90px";
      bubble.style.top = "";
      bubble.style.right = "";
      bubble.style.setProperty("--fab-arrow-x", "24px");
    }
  }

    var REQ_LABELS = {

    function _updateChecklistAndStrength() {
      var np = newInp.value;
      var cp = confirmInp.value;
      var state = VF.checkPasswordRequirements(np, cp);
      Object.keys(REQ_LABELS).forEach(function (key) {
        var li = overlay.querySelector('[data-req="' + key + '"]');
        if (!li) return;
        if (state[key]) {
          li.style.color = "#16a34a";
          li.textContent = "✔ " + REQ_LABELS[key];
        } else {
          li.style.color = "#94a3b8";
          li.textContent = "○ " + REQ_LABELS[key];
        }
      });
      var matchLi = overlay.querySelector('[data-req="match"]');
      if (matchLi) {
        if (cp.length > 0 && state.match) {
          matchLi.style.color = "#16a34a";
          matchLi.textContent = "✔ كلمتا المرور متطابقتان";
        } else if (cp.length > 0) {

      // مؤشر قوة كلمة المرور (لا يحتسب match)
      var meta = VF.passwordStrengthMeta(state.passCount, np.length);
      strengthBar.style.width = meta.pct + "%";
      strengthBar.style.background = meta.color;
      strengthLabel.textContent = meta.label;
      strengthLabel.style.color = meta.color;

      var allOk = state.allOk;
      submitBtn.disabled = !allOk;
      submitBtn.style.cursor = allOk ? "pointer" : "not-allowed";
      return allOk;
    }

            // وأي تغييرات حصلت أثناء تغيير كلمة المرور (زي last_login في
            // Users) ما كانتش بتظهر إلا بعد تحديث الصفحة يدويًا. إبطال
            // الـ prefetch هنا يجبر _afterLoginSuccess إنها تعمل
            // loadAllData() حقيقية وتجيب أحدث نسخة من السيرفر.
            _prefetch.done = false;
            _prefetch.data = null;
            _afterLoginSuccess(loginRes);
          },
          onError: function (result) {
            _showErr(
              (result && result.message) ||
                "تعذّر تغيير كلمة المرور — حاول مرة أخرى",
            );
            submitBtn.disabled = false;
            submitBtn.textContent = "تغيير كلمة المرور والمتابعة";
            _updateChecklistAndStrength();
          },
        },
      );
